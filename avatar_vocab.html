overed with clouds; dull and grey sky with no sun","russian":"пасмурно, затянуто облаками","example":"It's overcast today but no rain is expected.\nСегодня пасмурно, но дождя не ожидается."},{"word":"muggy","definition":"unpleasantly warm and humid","russian":"душно и влажно, парит","example":"It was so muggy that my shirt was soaked within minutes.\nБыло так душно, что моя рубашка промокла за несколько минут."},{"word":"mild","definition":"moderately warm; not extreme — neither too hot nor too cold","russian":"мягкий (о погоде), тёплый для сезона","example":"It was a mild winter — barely any snow.\nЗима была мягкой — почти без снега."},{"word":"bucket down","definition":"to rain very heavily (British informal)","russian":"лить как из ведра","example":"It was absolutely bucketing down — we got soaked.\nЛило как из ведра — мы промокли насквозь."},{"word":"sweltering","definition":"uncomfortably hot; oppressively warm","russian":"изнуряюще жаркий, раскалённый","example":"It was sweltering in the city — over 40 degrees.\nВ городе было изнуряюще жарко — больше 40 градусов."},{"word":"boiling","definition":"extremely hot (informal intensifier for weather)","russian":"кипяток (разг.) — невыносимо жарко","example":"I'm absolutely boiling — can we find some shade?\nМне невыносимо жарко — давай найдём тень."},{"word":"humid","definition":"having a lot of moisture in the air","russian":"влажный (о воздухе, климате)","example":"The jungle was hot and incredibly humid.\nВ джунглях было жарко и невероятно влажно."},{"word":"blistering","definition":"extremely hot; also used for fierce criticism","russian":"жгучий, палящий (о жаре); сокрушительный","example":"We worked outside in blistering heat all day.\nМы работали на улице весь день в палящий зной."},{"word":"catch some rays","definition":"to sit or lie in the sun to get a tan","russian":"позагорать, поймать лучи солнца","example":"We spent the afternoon catching some rays on the beach.\nМы провели вторую половину дня, загорая на пляже."},{"word":"go brown","definition":"to get a suntan; skin becoming darker from sun exposure","russian":"загореть, покрыться загаром","example":"She goes brown so easily — just one day in the sun.\nОна загорает так легко — один день на солнце."},{"word":"soak up the sun","definition":"to enjoy the sunshine, lying or sitting in the sun","russian":"нежиться на солнце, впитывать солнечные лучи","example":"We soaked up the sun on the terrace all morning.\nМы нежились на солнце на террасе всё утро."},{"word":"autumnal","definition":"relating to or characteristic of autumn","russian":"осенний (поэтично, формально)","example":"The park had a beautiful autumnal atmosphere.\nВ парке царила прекрасная осенняя атмосфера."},{"word":"blustery","definition":"with strong, gusty winds","russian":"порывистый, ветреный, с шквалами","example":"A blustery November day — leaves flying everywhere.\nВетреный ноябрьский день — листья летят повсюду."},{"word":"misty","definition":"covered with or full of mist; slightly foggy","russian":"туманный, затянутый дымкой","example":"The mountains were misty in the early morning.\nГоры были окутаны туманом ранним утром."},{"word":"foggy","definition":"thick with fog, making it hard to see clearly","russian":"туманный (гуще, чем misty)","example":"It was so foggy the flight was delayed.\nБыло так туманно, что рейс задержали."},{"word":"howl","definition":"to make a long loud cry; wind howling means a strong wail of wind","russian":"выть (о ветре, волке); реветь","example":"The wind howled through the empty streets all night.\nВетер выл на пустых улицах всю ночь."},{"word":"gale","definition":"a very strong wind","russian":"шторм, шквальный ветер, буря","example":"The gale brought down several trees overnight.\nЗа ночь буря повалила несколько деревьев."},{"word":"mist","definition":"thin fog; tiny water droplets in the air making visibility low","russian":"дымка, лёгкий туман","example":"A fine mist hung over the river at dawn.\nНа рассвете над рекой висела лёгкая дымка."},{"word":"spot on","definition":"completely accurate or correct — British expression","russian":"в точку, абсолютно верно, точь-в-точь","example":"Your impression of him was spot on.\nТвоё подражание ему было в точку."},{"word":"precise / exact / flawless","definition":"technically correct; matching exactly to the smallest detail","russian":"точный, конкретный / точный, совпадающий / безупречный, идеальный","example":"Her performance was absolutely flawless.\nЕё выступление было абсолютно безупречным."},{"word":"forceful / overconfident","definition":"continuing firmly, persuasive; OR overly self-assured to a fault","russian":"напористый, убедительный / самонадеянный, слишком уверенный в себе","example":"He was overconfident and made costly mistakes.\nОн был самонадеянным и допустил дорогостоящие ошибки."},{"word":"shocked / astonished / astounded","definition":"surprised intensely — a scale from mild to extreme","russian":"шокированный / поражённый, изумлённый / ошеломлённый","example":"I was absolutely astounded — I had no words.\nЯ был абсолютно ошеломлён — у меня не было слов."},{"word":"furious / fuming / enraged / livid","definition":"extremely angry — a scale from strong to extreme rage","russian":"в ярости / кипящий от злости / взбешённый / вне себя от злости","example":"My mum was livid when she saw the car.\nМоя мама была вне себя, когда увидела машину."},{"word":"conscious / mindful","definition":"aware of something; or intentionally paying attention","russian":"осознающий, сознательный / внимательный, осознанный","example":"Be mindful of others around you.\nБудь внимательным к людям вокруг тебя."},{"word":"rotten / deplorable","definition":"very bad or unacceptable — informal or formal","russian":"гнилой, отвратительный (разг.) / достойный осуждения (офиц.)","example":"The conditions in the camp were deplorable.\nУсловия в лагере были недопустимыми."},{"word":"primary / rudimentary","definition":"basic or foundational — neutral or slightly negative","russian":"первичный, начальный / рудиментарный, зачаточный","example":"His knowledge of French is rudimentary at best.\nЕго знания французского — в лучшем случае зачаточные."},{"word":"uninteresting / tedious / dreary / mind-numbing","definition":"boring or dull — a scale of increasing dreariness","russian":"неинтересный / утомительный, нудный / уныло скучный / отупляющий","example":"Eight hours of mind-numbing data entry.\nВосемь часов отупляющего ввода данных."},{"word":"radiant / dazzling / blinding","definition":"very bright — from warm and beautiful to painfully blinding","russian":"лучезарный, сияющий / ослепительный, поражающий / слепящий","example":"A dazzling display of fireworks lit up the sky.\nОслепительный фейерверк осветил небо."},{"word":"at first glance","definition":"when you first look at something, before examining it closely","russian":"на первый взгляд","example":"At first glance it looked fine, but the details were wrong.\nНа первый взгляд всё выглядело нормально, но детали были неверны."},{"word":"paranoid","definition":"excessively suspicious or fearful that others are out to harm you","russian":"параноидальный, охваченный паранойей","example":"Stop being so paranoid — nobody is talking about you.\nПрекрати быть таким параноиком — никто не говорит о тебе."},{"word":"pound away","definition":"to hit something repeatedly with force; to work hard persistently","russian":"колотить, бить снова и снова; упорно работать","example":"He pounded away at the punching bag for an hour.\nОн колотил грушу целый час."},{"word":"bruise someone","definition":"to injure someone causing discolouration of the skin without breaking it","russian":"ударить до синяков; оставить синяк","example":"The fall bruised her arm badly.\nПадение сильно ударило её руку и оставило синяк."},{"word":"stay awake","definition":"to remain conscious and not fall asleep","russian":"не спать, бодрствовать","example":"I can't stay awake — I've been up since four.\nЯ не могу не спать — я на ногах с четырёх утра."},{"word":"sounds neat","definition":"that seems cool, nice, or interesting — an informal positive reaction","russian":"звучит круто / здорово (разг.)","example":"\"We're going to the mountains this weekend.\" \"Sounds neat!\"\n«Мы едем в горы на выходных.» «Звучит здорово!»"},{"word":"naval / navel","definition":"naval = relating to a navy or warships; navel = belly button","russian":"военно-морской (naval) / пупок (navel)","example":"A naval battle was fought in these waters centuries ago.\nМорское сражение проходило в этих водах несколько веков назад."},{"word":"flop","definition":"to fail completely; to drop or fall heavily and loosely","russian":"провалиться, потерпеть неудачу; плюхнуться","example":"The film flopped at the box office.\nФильм провалился в прокате."},{"word":"resurface","definition":"to come back to the surface; to appear again after being gone","russian":"всплывать снова; появляться снова","example":"Old feelings resurfaced when he saw her again.\nСтарые чувства всплыли снова, когда он увидел её."},{"word":"submerge","definition":"to go below the surface of water; to hide something","russian":"погружать(ся) под воду; скрывать","example":"The submarine submerged silently beneath the waves.\nПодводная лодка бесшумно погрузилась под волны."},{"word":"launch","definition":"to send something into motion; to start something new officially","russian":"запускать, начинать (атаку, корабль, продукт)","example":"They launched an attack at midnight.\nОни начали атаку в полночь."},{"word":"where have you been?","definition":"asking where someone has been — can be concerned or accusatory","russian":"где ты был(а)? / куда пропал(а)?","example":"\"Where have you been? I've been calling for hours!\"\n«Где ты был? Я звоню уже несколько часов!»"},{"word":"wedge formation","definition":"a V-shaped military or tactical formation","russian":"клиновой строй, построение клином","example":"The cavalry charged in wedge formation to break through the lines.\nКавалерия атаковала в клиновом строю, чтобы прорвать линии."},{"word":"charge","definition":"to rush forward in attack; to power a battery; to ask a price","russian":"атаковать стремительно; заряжать; взимать плату","example":"The soldiers charged forward with a battle cry.\nСолдаты бросились вперёд с боевым кличем."},{"word":"dense","definition":"closely packed together; thick; also: slow to understand (informal)","russian":"густой, плотный; тупой (о человеке, разг.)","example":"The forest was so dense you couldn't see ten metres ahead.\nЛес был таким густым, что нельзя было видеть на десять метров вперёд."},{"word":"perish","definition":"to die, especially in a sudden or terrible way","russian":"погибать, гибнуть (торжественно/литературно)","example":"Many perished in the eruption.\nМногие погибли при извержении."},{"word":"obey someone","definition":"to follow the instructions or commands of someone","russian":"слушаться, подчиняться кому-то","example":"The soldiers obeyed their commander without question.\nСолдаты беспрекословно подчинялись своему командиру."},{"word":"speak one's mind","definition":"to say honestly what you think, even if it's uncomfortable","russian":"говорить то, что думаешь, высказываться прямо","example":"She always speaks her mind — you always know where you stand.\nОна всегда говорит то, что думает — с ней всегда ясно, где ты стоишь."},{"word":"full-blown","definition":"fully developed; at its most complete or severe stage","russian":"полноценный, развившийся в полную силу","example":"What started as a disagreement turned into a full-blown argument.\nТо, что началось как разногласие, переросло в полноценный скандал."},{"word":"be spared","definition":"to be allowed to escape death, punishment, or suffering","russian":"быть пощажённым, избежать чего-то плохого","example":"The village was spared — the fire stopped just in time.\nДеревня была пощажена — огонь остановился как раз вовремя."},{"word":"vicious","definition":"deliberately cruel or violent; fierce and dangerous","russian":"жестокий, свирепый, злобный","example":"It was a vicious attack that left him in hospital.\nЭто было жестокое нападение, после которого он оказался в больнице."},{"word":"treason","definition":"the crime of betraying your country or ruler","russian":"измена, государственная измена","example":"He was convicted of treason and sentenced to life.\nОн был осуждён за государственную измену и приговорён к пожизненному заключению."},{"word":"invention","definition":"something new that has been created; also: a false story","russian":"изобретение; выдумка, вымысел","example":"The wheel is one of humanity's greatest inventions.\nКолесо — одно из величайших изобретений человечества."},{"word":"bust out","definition":"to escape from a place; to suddenly start doing something","russian":"вырваться, сбежать; внезапно начать что-то","example":"They busted out of the prison using a tunnel.\nОни вырвались из тюрьмы через туннель."},{"word":"stay behind","definition":"to remain somewhere after others have left","russian":"остаться, не уходить вместе со всеми","example":"Can you stay behind after class? I need to talk to you.\nМожешь остаться после урока? Мне нужно с тобой поговорить."},{"word":"blisters","definition":"painful bubbles of skin filled with fluid, caused by rubbing or burning","russian":"волдыри, мозоли (от трения)","example":"I got blisters from hiking in new boots all day.\nУ меня появились мозоли от целодневного похода в новых ботинках."},{"word":"scour","definition":"to search a place thoroughly; to clean by rubbing hard","russian":"тщательно обыскивать; отмывать до блеска (скрести)","example":"She scoured the internet for hours looking for the answer.\nОна часами рыскала по интернету в поисках ответа."},{"word":"race","definition":"to move very fast; to compete in a speed contest","russian":"мчаться, нестись; соревноваться в скорости","example":"He raced across the field to catch the ball.\nОн помчался через поле, чтобы поймать мяч."},{"word":"convince","definition":"to persuade someone to believe something or do something","russian":"убедить кого-то в чём-то / сделать что-то","example":"He convinced me to try the spicy food.\nОн убедил меня попробовать острую еду."},{"word":"blow up","definition":"to explode; to inflate; to lose your temper; to enlarge a photo","russian":"взрываться; раздуваться; выйти из себя; увеличить (фото)","example":"He blew up at me for being five minutes late.\nОн вышел из себя из-за того, что я опоздал на пять минут."},{"word":"guttural","definition":"produced in the throat; a deep, harsh-sounding voice or sound","russian":"гортанный (о звуке, голосе)","example":"He spoke in a low, guttural voice.\nОн говорил низким гортанным голосом."},{"word":"hooray","definition":"an exclamation of joy, approval, or celebration","russian":"ура! (восклицание радости)","example":"Hooray! We won the championship!\nУра! Мы выиграли чемпионат!"},{"word":"crafty","definition":"clever at achieving things in a slightly sneaky way; also: skilled with hands","russian":"хитрый, изворотливый; умелый (в хорошем смысле)","example":"That was a crafty move — nobody saw it coming.\nЭто был хитрый ход — никто его не ожидал."},{"word":"that's the stuff","definition":"said to encourage someone or express that something is exactly right","russian":"вот это да! вот то, что надо! так держать!","example":"\"I ate the whole plate!\" \"That's the stuff!\"\n«Я съел всю тарелку!» «Вот это да!»"},{"word":"don't fail me now","definition":"a plea to something or someone not to let you down at a critical moment","russian":"только не подведи меня сейчас","example":"Come on legs, don't fail me now — just one more mile.\nНу же, ноги, только не подведите меня сейчас — ещё одна миля."},{"word":"wild","definition":"living in nature; uncontrolled; crazy; extremely enthusiastic","russian":"дикий; неуправляемый; безумный; восторженный","example":"The crowd went wild when the band came on stage.\nТолпа сошла с ума, когда группа вышла на сцену."},{"word":"slip up","definition":"to make a careless mistake","russian":"оступиться, допустить ошибку, проколоться","example":"He slipped up and sent the email to the wrong person.\nОн проколол и отправил письмо не тому человеку."},{"word":"right then and there","definition":"immediately and in that exact place, without delay","russian":"прямо тут же, на месте, немедленно","example":"She made the decision right then and there — no waiting.\nОна приняла решение прямо тут же — без ожидания."},{"word":"chew up","definition":"to chew something thoroughly; to damage or destroy something","russian":"разжевать; уничтожить; сожрать (перен.)","example":"The machine chewed up the paper and jammed.\nМашина сжевала бумагу и заклинила."},{"word":"altitude","definition":"the height of a place above sea level or the ground","russian":"высота (над уровнем моря или земли)","example":"At this altitude the air is thin and breathing is hard.\nНа такой высоте воздух разреженный и дышать тяжело."},{"word":"patronise me","definition":"to treat someone as if they are less intelligent or capable than they are","russian":"относиться свысока, снисходить; объяснять как ребёнку","example":"Don't patronise me — I understand exactly what's happening.\nНе относись ко мне свысока — я отлично понимаю, что происходит."},{"word":"cut something out","definition":"to remove by cutting; to stop doing something; to leave out","russian":"вырезать; прекращать (привычку); хватит!","example":"Cut it out! I'm trying to concentrate.\nХватит! Я пытаюсь сосредоточиться."},{"word":"extinct","definition":"no longer existing; a species that has died out completely","russian":"вымерший, исчезнувший (о виде, вулкане)","example":"Dinosaurs went extinct about 66 million years ago.\nДинозавры вымерли около 66 миллионов лет назад."},{"word":"die off","definition":"to die one by one until none are left","russian":"вымирать постепенно, исчезать один за другим","example":"The bees in this region are dying off at an alarming rate.\nПчёлы в этом регионе вымирают с тревожной скоростью."},{"word":"get the hang of something","definition":"to learn how to do something through practice","russian":"освоить, набить руку, понять как что-то делается","example":"It took a week, but I finally got the hang of it.\nПрошла неделя, но я наконец освоил это."},{"word":"hear someone out","definition":"to listen to someone completely without interrupting","russian":"выслушать кого-то до конца","example":"Just hear me out before you make your decision.\nПросто выслушай меня до конца, прежде чем принять решение."},{"word":"ancestry","definition":"the family or ethnic origins that someone comes from","russian":"происхождение, родословная, предки","example":"She traced her ancestry back to West Africa.\nОна проследила свою родословную вплоть до Западной Африки."},{"word":"stingy","definition":"unwilling to spend money or share; mean with money","russian":"скупой, жадный, прижимистый","example":"Don't be so stingy — it's just a few coins.\nНе будь таким скупым — это всего несколько монет."},{"word":"inescapable","definition":"impossible to avoid or deny","russian":"неизбежный, неминуемый, от чего не убежать","example":"The inescapable truth is that we made a mistake.\nНеизбежная правда состоит в том, что мы допустили ошибку."},{"word":"regain one's honour","definition":"to restore your reputation or dignity after it has been damaged","russian":"восстановить честь, вернуть себе достоинство","example":"He spent years trying to regain his honour after the scandal.\nОн годами пытался восстановить честь после скандала."},{"word":"hop / squat","definition":"to jump on one foot / to crouch low with bent knees","russian":"прыгать на одной ноге / приседать, сидеть на корточках","example":"He hopped over the puddle and then squatted to look at it.\nОн перепрыгнул лужу, а потом присел на корточки, чтобы разглядеть её."},{"word":"gloomy","definition":"dark and depressing; feeling sad and without hope","russian":"мрачный, унылый, пасмурный","example":"The weather matched her gloomy mood perfectly.\nПогода идеально совпадала с её мрачным настроением."},{"word":"lounge","definition":"a comfortable room for relaxing; an airport waiting area; to relax lazily","russian":"гостиная; зал ожидания; лениво сидеть/лежать","example":"We spent the afternoon lounging by the pool.\nМы провели вторую половину дня, лениво отдыхая у бассейна."},{"word":"squealer","definition":"someone who informs on others to authority — informal, slightly insulting","russian":"ябеда, стукач, доносчик","example":"Nobody trusts him — he's a squealer.\nЕму никто не доверяет — он стукач."},{"word":"cronies","definition":"close friends or associates who use their connection for personal gain","russian":"дружки, приближённые (с негативным оттенком)","example":"The corrupt mayor gave all the contracts to his cronies.\nКоррумпированный мэр отдал все контракты своим дружкам."},{"word":"feeble","definition":"lacking strength or power; not convincing","russian":"слабый, немощный; жалкий, неубедительный","example":"That was a feeble excuse — nobody believed it.\nЭто было жалкое оправдание — никто ему не поверил."},{"word":"way to think ahead","definition":"said to praise someone for planning in advance","russian":"молодец, что думаешь наперёд!","example":"You already booked the tickets? Way to think ahead!\nТы уже забронировал билеты? Молодец, что думаешь наперёд!"},{"word":"miscalculate","definition":"to calculate or judge something incorrectly","russian":"просчитаться, неверно рассчитать","example":"He miscalculated the distance and ran out of fuel.\nОн просчитался с расстоянием и остался без топлива."},{"word":"rage","definition":"violent uncontrollable anger; also: to continue with great force (fire, storm)","russian":"ярость, бешенство; свирепствовать (о буре, огне)","example":"The fire raged through the forest for three days.\nОгонь бушевал в лесу три дня."},{"word":"bush","definition":"a shrub or thick plant; wild uncultivated land (Australia/Africa)","russian":"куст; буш (дикая природа Австралии/Африки)","example":"He hid behind a bush and waited.\nОн спрятался за кустом и ждал."},{"word":"incurable","definition":"impossible to cure or change","russian":"неизлечимый; неисправимый (о характере)","example":"He's an incurable optimist — nothing gets him down.\nОн неисправимый оптимист — ничто его не сбивает с толку."},{"word":"intermission","definition":"a pause or break between parts of a performance or event","russian":"антракт, перерыв (в спектакле, фильме)","example":"We grabbed drinks during the intermission.\nМы взяли напитки во время антракта."},{"word":"roughly","definition":"approximately; also: in a rough or harsh manner","russian":"примерно, приблизительно; грубо, жёстко","example":"It takes roughly two hours to get there.Туда добираться примерно два часа."},{"word":"take over","definition":"to gain control of something; to take responsibility from someone else","russian":"захватывать власть; перенимать управление","example":"The new CEO took over the company last month.Новый генеральный директор взял управление компанией в прошлом месяце."},{"word":"viable","definition":"capable of working or being done successfully","russian":"жизнеспособный, реалистичный, осуществимый","example":"Is this a viable solution or just a temporary fix?Это жизнеспособное решение или просто временная мера?"},{"word":"get out","definition":"to leave; to escape; also: for a secret to become known","russian":"выбираться, уходить; выходить наружу; утечь (об информации)","example":"We need to get out of here before it gets dark.Нам нужно выбраться отсюда до темноты."},{"word":"vary widely","definition":"to differ greatly between cases or situations","russian":"сильно различаться, разбегаться","example":"Prices vary widely depending on the region.Цены сильно различаются в зависимости от региона."},{"word":"high stakes","definition":"a situation where the outcome has major consequences, positive or negative","russian":"высокие ставки — ситуация с серьёзными последствиями","example":"This is a high-stakes negotiation — one wrong move and the deal falls apart.Это переговоры с высокими ставками — один неверный шаг, и сделка рухнет."},{"word":"upskill / reskill","definition":"upskill = learn new skills in your field; reskill = learn skills for a completely different job","russian":"повышать квалификацию / переобучаться на новую специальность","example":"Many workers are reskilling as automation takes over their roles.Многие работники переобучаются по мере того, как автоматизация вытесняет их должности."},{"word":"durable","definition":"able to last a long time without breaking or wearing out","russian":"прочный, долговечный; устойчивый","example":"We need durable materials that can withstand harsh weather.Нам нужны прочные материалы, способные выдержать суровую погоду."},{"word":"oppression","definition":"prolonged cruel or unjust treatment; the state of being subject to authority","russian":"угнетение, притеснение, гнёт","example":"They fought for generations against political oppression.Они поколениями боролись против политического угнетения."},{"word":"mainstream","definition":"the ideas, attitudes, or activities considered normal by most people","russian":"мейнстрим, господствующее течение; общепринятый","example":"Electric cars have finally entered the mainstream.Электромобили наконец вошли в мейнстрим."},{"word":"as a consequence of","definition":"because of; as a result of something that happened","russian":"вследствие, как следствие, в результате","example":"As a consequence of the storm, hundreds lost power.Вследствие шторма сотни домов остались без электричества."},{"word":"restore","definition":"to bring back to a previous condition; to return something that was lost","russian":"восстанавливать, возвращать в прежнее состояние","example":"The team worked hard to restore the old painting.Команда упорно трудилась, чтобы восстановить старую картину."},{"word":"have got a lot on one's mind","definition":"to be preoccupied with many worries or thoughts","russian":"голова занята, много всего на уме, много забот","example":"Sorry I've been distracted — I've got a lot on my mind lately.Прости, что рассеян — в последнее время много всего на уме."},{"word":"privacy","definition":"the right to keep personal information and life away from public access","russian":"конфиденциальность, личное пространство, неприкосновенность","example":"He values his privacy and rarely posts on social media.Он ценит личное пространство и редко постит в соцсетях."},{"word":"intense","definition":"very strong, serious, or extreme in degree","russian":"интенсивный, напряжённый; очень сильный","example":"The training was intense — three sessions a day for a week.Тренировки были интенсивными — три занятия в день на протяжении недели."},{"word":"twist up","definition":"to coil or tangle; to distort meaning or shape","russian":"скручиваться, запутываться; исказить","example":"The wire got all twisted up in my bag.Провод весь запутался у меня в сумке."},{"word":"invasion","definition":"an instance of entering a place or situation by force","russian":"вторжение, нашествие","example":"The invasion disrupted the lives of millions of civilians.Вторжение нарушило жизнь миллионов мирных жителей."},{"word":"downcast","definition":"feeling sad and without hope; (of eyes) looking downward","russian":"подавленный, унылый; опущенный (о взгляде)","example":"She sat quietly, downcast after hearing the news.Она сидела тихо, подавленная после услышанных новостей."},{"word":"miraculously","definition":"in a way that is surprising and fortunate, like a miracle","russian":"чудесным образом, как по чуду","example":"He miraculously survived the accident without a scratch.Он чудесным образом выжил в аварии без единой царапины."},{"word":"stand by","definition":"to support someone; to remain loyal; to be ready to act","russian":"поддерживать кого-то; оставаться верным; быть наготове","example":"She stood by her friend through the whole ordeal.Она поддерживала подругу на протяжении всего испытания."},{"word":"redeem oneself","definition":"to do something good that compensates for a past failure","russian":"реабилитировать себя, исправиться после ошибки","example":"He had one last chance to redeem himself in the final match.У него был последний шанс реабилитировать себя в финальном матче."},{"word":"entire","definition":"whole; with nothing left out","russian":"весь, целый, полный","example":"She read the entire book in one sitting.Она прочитала всю книгу за один раз."},{"word":"ferocity","definition":"the quality of being fiercely violent or intense","russian":"свирепость, жестокость, неистовость","example":"The storm struck with unexpected ferocity.Буря ударила с неожиданной свирепостью."},{"word":"gesture","definition":"a movement of the body to express something; an act done as a sign of goodwill","russian":"жест; знак внимания","example":"Bringing flowers was a kind gesture.Принести цветы — это был добрый жест."},{"word":"inherit","definition":"to receive money, property, or traits from someone who has died or passed them on","russian":"наследовать, унаследовать","example":"She inherited her grandmother's house and her love of cooking.Она унаследовала дом бабушки и её любовь к готовке."},{"word":"silk robe","definition":"a loose garment made of silk, worn at home or after bathing","russian":"шёлковый халат","example":"She wrapped herself in a silk robe after the bath.После ванны она закуталась в шёлковый халат."},{"word":"lettuce","definition":"a leafy green vegetable commonly used in salads","russian":"салат (листовой), латук","example":"Add some lettuce and tomatoes to the sandwich.Добавь немного салата и помидоров в сэндвич."},{"word":"play hooky","definition":"to stay away from school or work without permission","russian":"прогуливать (школу, работу)","example":"He played hooky and spent the day at the beach.Он прогулял и провёл день на пляже."},{"word":"molding","definition":"decorative trim on walls or ceilings; the process of shaping something","russian":"лепнина, молдинг; формование","example":"The ceiling had beautiful ornate molding.На потолке была красивая витиеватая лепнина."},{"word":"slob","definition":"a person who is lazy and untidy","russian":"неряха, грязнуля; лентяй","example":"Clean up your room — don't be such a slob.Убери в комнате — не будь таким неряхой."},{"word":"tattletale","definition":"a person, especially a child, who tells on others","russian":"ябеда, доносчик (особенно о детях)","example":"Don't be a tattletale — just work it out yourselves.Не будь ябедой — разберитесь сами."},{"word":"beat smb up","definition":"to hit someone repeatedly causing injury","russian":"избить кого-то, надавать кому-то","example":"He got beaten up after leaving the club.Его избили после выхода из клуба."},{"word":"enroll","definition":"to officially register or sign up for a course, school, or program","russian":"записываться, зачисляться, поступать","example":"She enrolled in an online coding course.Она записалась на онлайн-курс программирования."},{"word":"mature","definition":"fully developed physically or mentally; behaving in a sensible adult way","russian":"зрелый, взрослый; серьёзный не по годам","example":"He's very mature for a fifteen-year-old.Для пятнадцятилетнего он очень зрелый."},{"word":"oath","definition":"a solemn promise, often made before a court or authority","russian":"клятва, присяга","example":"She took an oath to protect and serve.Она приняла присягу защищать и служить."},{"word":"mock","definition":"to make fun of someone; to mimic scornfully; also as adj: fake/simulated","russian":"высмеивать, издеваться; имитировать","example":"The kids mocked him for wearing old clothes.Дети высмеивали его за старую одежду."},{"word":"rigid","definition":"stiff and not bending; unwilling to change","russian":"жёсткий, негнущийся; непреклонный","example":"The rules here are rigid — no exceptions.Здесь правила жёсткие — никаких исключений."},{"word":"forewarned","definition":"having been warned in advance about a danger or problem","russian":"заранее предупреждённый","example":"Forewarned is forearmed — now you know what to expect.Предупреждён — значит вооружён."},{"word":"look out for smb","definition":"to watch over and protect someone; to be careful about a danger","russian":"присматривать за кем-то; заботиться о ком-то","example":"Big sisters always look out for their little brothers.Старшие сёстры всегда присматривают за младшими братьями."},{"word":"take away from","definition":"to reduce the value or enjoyment of something","russian":"умалять, отнимать (ценность чего-то)","example":"The poor ending took away from an otherwise great film.Плохая концовка умалила то, что было отличным фильмом."},{"word":"permanently glued to","definition":"always looking at or using something, unable to stop","russian":"намертво прилипший к чему-то (телефону, экрану)","example":"He's permanently glued to his phone at dinner.За ужином он намертво прилипает к телефону."},{"word":"flabbergasted","definition":"extremely shocked and astonished","russian":"ошарашенный, в полном изумлении","example":"I was flabbergasted when she quit without warning.Я был ошарашен, когда она уволилась без предупреждения."},{"word":"before long","definition":"after a short time; soon","russian":"вскоре, через некоторое время, не за горами","example":"Keep practising — before long you'll be fluent.Продолжай практиковаться — скоро ты заговоришь свободно."},{"word":"explicitly","definition":"stated clearly and in detail, leaving no room for confusion","russian":"явно, прямо, недвусмысленно","example":"He explicitly told them not to share the document.Он прямо сказал им не передавать документ."},{"word":"potty","definition":"slightly crazy (British informal); a child's word for a toilet","russian":"чокнутый, немного тронутый (брит. разг.); детское слово для туалета","example":"You're going potty if you think that'll work.Ты немного тронулся, если думаешь, что это сработает."},{"word":"turn one's back on smb","definition":"to abandon someone or refuse to help them; to reject","russian":"отвернуться от кого-то, предать, бросить","example":"He turned his back on his oldest friend when things got hard.Он отвернулся от своего старейшего друга, когда стало трудно."},{"word":"wretched","definition":"feeling or looking very unhappy or ill; of very poor quality","russian":"несчастный, жалкий, ужасный","example":"She felt wretched after hearing the news.После услышанных новостей она чувствовала себя несчастной."},{"word":"stand one's ground","definition":"to refuse to retreat or change your position under pressure","russian":"стоять на своём, не отступать","example":"Despite the criticism, he stood his ground and defended his decision.Несмотря на критику, он стоял на своём и защищал своё решение."},{"word":"blabbermouth","definition":"a person who talks too much and reveals secrets","russian":"болтун, тот кто не умеет хранить секреты","example":"Don't tell her anything — she's a total blabbermouth.Не говори ей ничего — она настоящий болтун."},{"word":"creek","definition":"a small stream; up the creek = in serious trouble (idiom)","russian":"ручей, небольшая речка","example":"We fished in the creek behind the farm.Мы ловили рыбу в ручье за фермой."},{"word":"keep an eye on smb","definition":"to watch someone or something carefully","russian":"присматривать за кем-то, следить","example":"Can you keep an eye on my bag while I'm gone?Можешь присмотреть за моей сумкой, пока меня нет?"},{"word":"stand clear","definition":"to move away from something dangerous; a warning to step back","russian":"отойти в сторону, держаться подальше","example":"Stand clear of the doors — the train is about to move.Отойдите от дверей — поезд сейчас тронется."},{"word":"miss the love","definition":"to long for affection or a loving relationship you no longer have","russian":"скучать по любви, по близости","example":"After the breakup, she didn't miss him — she just missed the love.После расставания она скучала не по нему — просто по любви."},{"word":"fly around","definition":"to move through the air in different directions; for rumours to spread","russian":"летать кругом; носиться, мотаться (о слухах, людях)","example":"Rumours were flying around the office all morning.Слухи носились по офису всё утро."},{"word":"regular","definition":"normal; happening often; a frequent customer","russian":"обычный, обыкновенный; постоянный; регулярный","example":"He's a regular at this café — comes every morning.Он постоянный посетитель этого кафе — приходит каждое утро."},{"word":"reinvigorate","definition":"to give new energy or enthusiasm to something or someone","russian":"вновь придать силы, оживить, взбодрить","example":"The new coach reinvigorated the whole team.Новый тренер придал всей команде новые силы."},{"word":"pretty slick","definition":"impressively smooth, clever, or well-executed (informal)","russian":"весьма ловко, классно сделано; гладко","example":"That was pretty slick — how did you do that so fast?Это было весьма ловко — как ты сделал это так быстро?"},{"word":"get it over with","definition":"to do something unpleasant quickly so it's done and finished","russian":"покончить с этим, сделать наконец и забыть","example":"I hate dentists, but let's just get it over with.Терпеть не могу стоматологов, но давай просто покончим с этим."},{"word":"here we go","definition":"said when something (often annoying or exciting) is about to start","russian":"ну вот, началось; поехали; ну давай","example":"Here we go again — she sighed as he started complaining.Ну вот, опять — вздохнула она, когда он начал жаловаться."},{"word":"unsure","definition":"not certain or confident about something","russian":"неуверенный, сомневающийся","example":"She was unsure whether to accept the offer.Она не была уверена, принять ли предложение."},{"word":"versatility","definition":"the ability to adapt to many different functions or situations","russian":"универсальность, многогранность","example":"His versatility as an actor made him perfect for the role.Его многогранность как актёра сделала его идеальным для роли."},{"word":"superior agility","definition":"agility = the ability to move quickly and easily; superior = better than others","russian":"превосходная ловкость, исключительная подвижность","example":"Her superior agility gave her an edge in combat.Её превосходная ловкость давала ей преимущество в бою."},{"word":"put smb in","definition":"to place someone in a facility (jail, hospital); to insert something","russian":"сажать кого-то (в тюрьму, больницу); вставлять, вносить","example":"They put him in prison for three years.Его посадили в тюрьму на три года."},{"word":"be exposing","definition":"revealing something hidden; making something visible or known","russian":"разоблачать; выставлять напоказ; подвергать воздействию","example":"The documentary is exposing corruption at the highest level.Документальный фильм разоблачает коррупцию на самом высоком уровне."},{"word":"hawk","definition":"a bird of prey; a person who favours aggressive policy; to sell aggressively","russian":"ястреб (птица); ястреб (политик-агрессор); зазывала","example":"A hawk circled silently above the field.Ястреб бесшумно кружил над полем."},{"word":"scooch","definition":"to slide or move a short distance, usually to make room for someone","russian":"подвинуться, сдвинуться чуть-чуть","example":"Can you scooch over a little? I need more space.Можешь немного подвинуться? Мне нужно больше места."},{"word":"come by","definition":"to visit casually; to obtain or acquire something","russian":"заскочить, заглянуть (в гости); раздобыть, найти","example":"Come by anytime — the door's always open.Заходи в любое время — дверь всегда открыта."},{"word":"worship smb","definition":"to admire or love someone extremely, almost religiously","russian":"боготворить кого-то, преклоняться","example":"The fans worship her — they follow her everywhere.Фанаты её боготворят — они следуют за ней повсюду."},{"word":"jealous of","definition":"feeling envy toward someone who has something you want; possessive in love","russian":"завидовать кому-то; ревновать","example":"She was jealous of her sister's success.Она завидовала успеху своей сестры."},{"word":"intimidated","definition":"feeling frightened or nervous because of someone's power or confidence","russian":"запуганный, растерявшийся перед кем-то сильным","example":"He felt intimidated walking into the room full of experts.Он чувствовал себя растерянным, войдя в комнату, полную экспертов."},{"word":"shallow","definition":"not deep; lacking depth of thought or character","russian":"мелкий (о воде); поверхностный (о человеке)","example":"The pool is too shallow to dive into.Бассейн слишком мелкий, чтобы нырять."},{"word":"cranky","definition":"easily annoyed or bad-tempered, usually temporarily","russian":"раздражительный, сварливый, не в духе","example":"She gets cranky when she hasn't slept enough.Она становится сварливой, когда не выспалась."},{"word":"as opposed to","definition":"in contrast to; rather than","russian":"в отличие от, а не; противопоставляя","example":"I prefer tea as opposed to coffee in the morning.Я предпочитаю чай, а не кофе по утрам."},{"word":"hot-headed","definition":"tending to react angrily and impulsively without thinking","russian":"вспыльчивый, горячий, быстро выходящий из себя","example":"He's too hot-headed to negotiate — he'll just blow up.Он слишком вспыльчив для переговоров — просто взорвётся."},{"word":"sob","definition":"to cry noisily with short, sharp breaths","russian":"рыдать, всхлипывать","example":"She sobbed quietly into her pillow all night.Она тихо рыдала в подушку всю ночь."}];
</script>
<script>
// === STATE ===
let progress = JSON.parse(localStorage.getItem('avatarVocab') || '{}');
let queue = [...CARDS];
let queueIdx = 0;
let isFlipped = false;
let searchFilter = 'all';
let quizCorrect = 0, quizWrong = 0;
let quizCard = null;
let currentMode = 'all'; // all | due

// streak
function updateStreak() {
  const today = new Date().toDateString();
  const p = progress;
  if (!p._lastDay) { p._lastDay = today; p._streak = 1; }
  else if (p._lastDay !== today) {
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    if (p._lastDay === yesterday) p._streak = (p._streak || 1) + 1;
    else p._streak = 1;
    p._lastDay = today;
  }
  saveProgress();
}

function saveProgress() { localStorage.setItem('avatarVocab', JSON.stringify(progress)); }

function getStatus(word) {
  const p = progress[word];
  if (!p) return 'new';
  if (p.score >= 2) return 'known';
  if (p.score >= 1) return 'learning';
  return 'new';
}

function getTodayCount() {
  const today = new Date().toDateString();
  return Object.values(progress).filter(p => p && p.lastDate === today).length;
}

function updateStats() {
  const known = CARDS.filter(c => getStatus(c.word) === 'known').length;
  const today = getTodayCount();
  document.getElementById('statTotal').textContent = CARDS.length;
  document.getElementById('statLearned').textContent = known;
  document.getElementById('statStreak').textContent = progress._streak || 0;
  document.getElementById('statToday').textContent = today;
}

// === FLASHCARD ===
function loadCard() {
  if (!queue.length) { document.getElementById('frontWord').textContent = 'Все карточки просмотрены! 🎉'; return; }
  const card = queue[queueIdx];
  document.getElementById('frontWord').textContent = card.word;
  document.getElementById('frontDef').textContent = card.definition ? `(${card.definition})` : '';
  document.getElementById('backRu').textContent = card.russian;
  document.getElementById('backEx').textContent = card.example || '';
  document.getElementById('cardCounter').textContent = `${queueIdx + 1} / ${queue.length}`;
  document.getElementById('flashcard').classList.remove('flipped');
  document.getElementById('actionBtns').style.display = 'none';
  isFlipped = false;
}

function flipCard() {
  const card = document.getElementById('flashcard');
  card.classList.toggle('flipped');
  isFlipped = !isFlipped;
  if (isFlipped) document.getElementById('actionBtns').style.display = 'grid';
}

function rate(score) {
  const card = queue[queueIdx];
  const today = new Date().toDateString();
  if (!progress[card.word]) progress[card.word] = { score: 0, lastDate: null };
  if (score === 2) progress[card.word].score = Math.min(3, (progress[card.word].score || 0) + 1);
  else if (score === 0) progress[card.word].score = 0;
  progress[card.word].lastDate = today;
  updateStreak();
  saveProgress();
  updateStats();
  queueIdx = (queueIdx + 1) % queue.length;
  setTimeout(loadCard, 150);
}

function shuffleCards() {
  queue = [...CARDS].sort(() => Math.random() - 0.5);
  queueIdx = 0;
  currentMode = 'all';
  loadCard();
}

function showDue() {
  const today = new Date().toDateString();
  queue = CARDS.filter(c => {
    const p = progress[c.word];
    if (!p) return true;
    if (p.score < 2) return true;
    return false;
  });
  if (!queue.length) queue = [...CARDS];
  queue.sort(() => Math.random() - 0.5);
  queueIdx = 0;
  currentMode = 'due';
  loadCard();
}

function showAll() {
  queue = [...CARDS];
  queueIdx = 0;
  currentMode = 'all';
  loadCard();
}

// === QUIZ ===
function getQuizCard() {
  const idx = Math.floor(Math.random() * CARDS.length);
  quizCard = CARDS[idx];
  return quizCard;
}

function generateOptions(correct) {
  const options = [correct];
  const pool = CARDS.filter(c => c.word !== correct.word);
  while (options.length < 4) {
    const r = pool[Math.floor(Math.random() * pool.length)];
    if (!options.find(o => o.word === r.word)) options.push(r);
  }
  return options.sort(() => Math.random() - 0.5);
}

function loadQuiz() {
  const card = getQuizCard();
  const opts = generateOptions(card);
  const isEnToRu = Math.random() > 0.5;
  
  if (isEnToRu) {
    document.getElementById('quizLabel').textContent = 'ЧТО ОЗНАЧАЕТ?';
    document.getElementById('quizWord').textContent = card.word;
    document.getElementById('quizDef').textContent = card.definition ? `(${card.definition})` : '';
  } else {
    document.getElementById('quizLabel').textContent = 'КАК ПО-АНГЛИЙСКИ?';
    document.getElementById('quizWord').textContent = card.russian;
    document.getElementById('quizDef').textContent = '';
  }

  const container = document.getElementById('quizOptions');
  container.innerHTML = '';
  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-opt';
    btn.textContent = isEnToRu ? opt.russian : opt.word;
    btn.onclick = () => answerQuiz(btn, opt, card, isEnToRu);
    container.appendChild(btn);
  });
  document.getElementById('quizResult').classList.remove('show');
  document.getElementById('nextQuizBtn').style.display = 'none';
}

function answerQuiz(btn, chosen, correct, isEnToRu) {
  const isCorrect = chosen.word === correct.word;
  document.querySelectorAll('.quiz-opt').forEach(b => {
    b.onclick = null;
    const isThisCorrect = (isEnToRu ? b.textContent === correct.russian : b.textContent === correct.word);
    if (isThisCorrect) b.classList.add('correct');
  });
  if (!isCorrect) btn.classList.add('wrong');

  const res = document.getElementById('quizResult');
  if (isCorrect) { quizCorrect++; res.className = 'quiz-result show right'; res.textContent = '✅ Правильно! ' + (isEnToRu ? correct.russian : correct.word); }
  else { quizWrong++; res.className = 'quiz-result show wrong-r'; res.textContent = '❌ Ответ: ' + (isEnToRu ? correct.russian : correct.word); }
  
  const total = quizCorrect + quizWrong;
  document.getElementById('quizCorrect').textContent = quizCorrect;
  document.getElementById('quizWrong').textContent = quizWrong;
  document.getElementById('quizPct').textContent = Math.round(quizCorrect / total * 100) + '%';
  
  // save to progress
  if (!progress._quizSessions) progress._quizSessions = 0;
  progress._quizSessions++;
  const pct = Math.round(quizCorrect / total * 100);
  if (!progress._bestPct || pct > progress._bestPct) progress._bestPct = pct;
  saveProgress();
  
  document.getElementById('nextQuizBtn').style.display = 'block';
}

function nextQuiz() { loadQuiz(); }

// === SEARCH ===
function doSearch() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let results = CARDS;
  if (q) {
    results = CARDS.filter(c => 
      c.word.toLowerCase().includes(q) ||
      c.russian.toLowerCase().includes(q) ||
      (c.definition && c.definition.toLowerCase().includes(q))
    );
  }
  if (searchFilter !== 'all') {
    results = results.filter(c => getStatus(c.word) === searchFilter);
  }
  renderSearch(results, q);
}

function setFilter(f, btn) {
  searchFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  doSearch();
}

function highlight(text, q) {
  if (!q) return text;
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<mark style="background:rgba(124,107,255,0.3);color:white;border-radius:3px">$1</mark>');
}

function renderSearch(results, q) {
  const container = document.getElementById('searchResults');
  if (!results.length) {
    container.innerHTML = '<div class="no-results">Ничего не найдено</div>';
    return;
  }
  container.innerHTML = results.slice(0, 80).map(c => {
    const status = getStatus(c.word);
    const icon = status === 'known' ? '✅' : status === 'learning' ? '🔄' : '🆕';
    return `<div class="word-card" onclick="openModal(${JSON.stringify(c).replace(/"/g,'&quot;')})">
      <div class="wc-word">${icon} ${highlight(c.word, q)}</div>
      <div class="wc-russian">${highlight(c.russian, q)}</div>
      ${c.definition ? `<div class="wc-def">${highlight(c.definition, q)}</div>` : ''}
    </div>`;
  }).join('');
}

function openModal(card) {
  if (typeof card === 'string') card = JSON.parse(card);
  document.getElementById('modalWord').textContent = card.word;
  document.getElementById('modalRu').textContent = card.russian;
  document.getElementById('modalDef').textContent = card.definition || '';
  document.getElementById('modalEx').textContent = card.example || 'Нет примера';
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) document.getElementById('modalOverlay').classList.remove('show');
}

// === PROGRESS ===
function updateProgressScreen() {
  const known = CARDS.filter(c => getStatus(c.word) === 'known').length;
  const learning = CARDS.filter(c => getStatus(c.word) === 'learning').length;
  const neww = CARDS.filter(c => getStatus(c.word) === 'new').length;
  const total = CARDS.length;
  
  document.getElementById('progKnown').textContent = known;
  document.getElementById('progLearning').textContent = learning;
  document.getElementById('progNew').textContent = neww;
  document.getElementById('progToday2').textContent = getTodayCount();
  document.getElementById('progStreak').textContent = progress._streak || 0;
  document.getElementById('mainProgBar').style.width = (known / total * 100) + '%';
  document.getElementById('progBestPct').textContent = progress._bestPct ? progress._bestPct + '%' : '—';
  document.getElementById('progTotalSessions').textContent = progress._quizSessions || 0;
}

function resetProgress() {
  if (confirm('Сбросить весь прогресс?')) {
    localStorage.removeItem('avatarVocab');
    progress = {};
    updateStats();
    updateProgressScreen();
    alert('Прогресс сброшен!');
  }
}

// === NAVIGATION ===
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'search') { doSearch(); document.getElementById('searchInput').focus(); }
  if (name === 'quiz') loadQuiz();
  if (name === 'progress') updateProgressScreen();
}

// === INIT ===
updateStreak();
updateStats();
showDue();
doSearch();
</script>
