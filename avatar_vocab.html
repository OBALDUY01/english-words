<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Avatar Vocab</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card-bg: #16161f;
    --border: #2a2a3a;
    --accent: #7c6bff;
    --accent2: #ff6b9d;
    --accent3: #6bffd8;
    --text: #e8e8f0;
    --text-dim: #6b6b8a;
    --correct: #4ade80;
    --wrong: #f87171;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NAV */
  nav {
    display: flex;
    gap: 4px;
    padding: 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .nav-btn {
    flex: 1;
    padding: 10px 6px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .nav-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 12px;
    padding: 10px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-dim);
    overflow-x: auto;
  }

  .stat { display: flex; align-items: center; gap: 5px; white-space: nowrap; }
  .stat-val { color: var(--text); font-weight: bold; }

  /* SCREENS */
  .screen { display: none; padding: 14px; max-width: 700px; margin: 0 auto; }
  .screen.active { display: block; }

  /* FLASHCARD */
  .card-counter {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 10px;
    letter-spacing: 1px;
  }

  .flashcard-wrap {
    perspective: 1000px;
    height: 260px;
    cursor: pointer;
    margin-bottom: 16px;
    user-select: none;
  }

  .flashcard {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .flashcard.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }

  .card-front {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    border: 1px solid var(--accent);
    box-shadow: 0 0 30px rgba(124, 107, 255, 0.15);
  }

  .card-back {
    background: linear-gradient(135deg, #0d2137 0%, #1a1037 50%, #1a0a2e 100%);
    border: 1px solid var(--accent2);
    box-shadow: 0 0 30px rgba(255, 107, 157, 0.15);
    transform: rotateY(180deg);
  }

  .card-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .card-word {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(18px, 5vw, 28px);
    font-weight: 700;
    color: white;
    line-height: 1.3;
    margin-bottom: 8px;
  }

  .card-definition {
    font-size: 12px;
    color: var(--text-dim);
    font-style: italic;
  }

  .card-russian {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(15px, 4vw, 22px);
    font-weight: 700;
    color: var(--accent3);
    margin-bottom: 10px;
    line-height: 1.3;
  }

  .card-example {
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.6;
    white-space: pre-line;
    max-height: 90px;
    overflow-y: auto;
  }

  .tap-hint {
    font-size: 10px;
    color: var(--text-dim);
    text-align: center;
    margin-bottom: 12px;
    letter-spacing: 1px;
  }

  /* ACTION BUTTONS */
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }

  .btn {
    padding: 14px 8px;
    border: none;
    border-radius: 12px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .btn:active { transform: scale(0.95); }

  .btn-again { background: rgba(248, 113, 113, 0.15); color: var(--wrong); border: 1px solid rgba(248,113,113,0.3); }
  .btn-hard { background: rgba(251, 191, 36, 0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
  .btn-easy { background: rgba(74, 222, 128, 0.15); color: var(--correct); border: 1px solid rgba(74,222,128,0.3); }

  .btn-emoji { font-size: 18px; }

  .btn-secondary {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .btn-sec {
    flex: 1;
    padding: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    border-radius: 10px;
    transition: all 0.2s;
    text-align: center;
  }

  .btn-sec:hover { border-color: var(--accent); color: var(--accent); }

  /* QUIZ */
  .quiz-question {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
    text-align: center;
  }

  .quiz-label { font-size: 10px; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 10px; }

  .quiz-word {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(18px, 5vw, 26px);
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 6px;
  }

  .quiz-def { font-size: 12px; color: var(--text-dim); font-style: italic; }

  .quiz-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .quiz-opt {
    padding: 14px 10px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.25s;
    text-align: center;
    line-height: 1.4;
  }

  .quiz-opt:hover { border-color: var(--accent); background: rgba(124,107,255,0.1); }
  .quiz-opt.correct { background: rgba(74,222,128,0.15); border-color: var(--correct); color: var(--correct); }
  .quiz-opt.wrong { background: rgba(248,113,113,0.15); border-color: var(--wrong); color: var(--wrong); }

  .quiz-result {
    text-align: center;
    padding: 12px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 12px;
    display: none;
  }

  .quiz-result.show { display: block; }
  .quiz-result.right { background: rgba(74,222,128,0.1); color: var(--correct); }
  .quiz-result.wrong-r { background: rgba(248,113,113,0.1); color: var(--wrong); }

  /* SEARCH */
  .search-wrap {
    position: relative;
    margin-bottom: 16px;
  }

  .search-input {
    width: 100%;
    padding: 14px 16px 14px 44px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-dim); }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 18px;
  }

  .search-filters {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    overflow-x: auto;
    padding-bottom: 4px;
  }

  .filter-btn {
    padding: 6px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  .search-results {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: calc(100vh - 280px);
    overflow-y: auto;
  }

  .word-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .word-card:hover { border-color: var(--accent); }
  .word-card:active { transform: scale(0.98); }

  .wc-word {
    font-family: 'Unbounded', sans-serif;
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 4px;
    color: white;
  }

  .wc-russian {
    font-size: 12px;
    color: var(--accent3);
    margin-bottom: 4px;
  }

  .wc-def { font-size: 11px; color: var(--text-dim); font-style: italic; }

  /* WORD DETAIL MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px;
    width: 100%;
    max-width: 700px;
    max-height: 80vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-word {
    font-family: 'Unbounded', sans-serif;
    font-size: 22px;
    font-weight: 900;
    margin-bottom: 6px;
  }

  .modal-ru { font-size: 16px; color: var(--accent3); margin-bottom: 10px; }
  .modal-def { font-size: 13px; color: var(--text-dim); font-style: italic; margin-bottom: 14px; }

  .modal-divider { height: 1px; background: var(--border); margin-bottom: 14px; }

  .modal-label { font-size: 10px; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 8px; text-transform: uppercase; }

  .modal-example {
    font-size: 12px;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-line;
    background: var(--surface);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 16px;
  }

  .modal-close {
    width: 100%;
    padding: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
    cursor: pointer;
  }

  /* PROGRESS */
  .progress-section { margin-bottom: 20px; }
  .progress-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .prog-bar-wrap { background: var(--surface); border-radius: 100px; height: 8px; margin-bottom: 12px; overflow: hidden; }
  .prog-bar { height: 100%; border-radius: 100px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.5s ease; }

  .prog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }

  .prog-item {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
  }

  .prog-num {
    font-family: 'Unbounded', sans-serif;
    font-size: 24px;
    font-weight: 900;
    margin-bottom: 4px;
  }

  .prog-lbl { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; }

  .streak-badge {
    background: linear-gradient(135deg, #ff6b35, #f7c59f);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    margin-bottom: 16px;
  }

  .streak-num {
    font-family: 'Unbounded', sans-serif;
    font-size: 40px;
    font-weight: 900;
    color: white;
    line-height: 1;
  }

  .streak-label { font-size: 12px; color: rgba(255,255,255,0.8); margin-top: 4px; }

  .reset-btn {
    width: 100%;
    padding: 12px;
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 10px;
    color: var(--wrong);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    margin-top: 10px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Progress ring */
  .progress-ring { width: 80px; height: 80px; margin: 0 auto 12px; }
  circle { transition: stroke-dashoffset 0.5s; }

  .no-results {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
    font-size: 13px;
  }
</style>
</head>
<body>

<nav>
  <button class="nav-btn active" onclick="showScreen('flashcard')">📚 Карточки</button>
  <button class="nav-btn" onclick="showScreen('quiz')">🧠 Тест</button>
  <button class="nav-btn" onclick="showScreen('search')">🔍 Поиск</button>
  <button class="nav-btn" onclick="showScreen('progress')">📊 Прогресс</button>
</nav>

<div class="stats-bar">
  <div class="stat">🃏 <span class="stat-val" id="statTotal">0</span> слов</div>
  <div class="stat">✅ <span class="stat-val" id="statLearned">0</span> изучено</div>
  <div class="stat">🔥 <span class="stat-val" id="statStreak">0</span> дней</div>
  <div class="stat">📅 <span class="stat-val" id="statToday">0</span> сегодня</div>
</div>

<!-- FLASHCARD SCREEN -->
<div id="screen-flashcard" class="screen active">
  <div class="card-counter" id="cardCounter">0 / 0</div>
  <div class="flashcard-wrap" onclick="flipCard()">
    <div class="flashcard" id="flashcard">
      <div class="card-face card-front">
        <div class="card-label">ENGLISH WORD</div>
        <div class="card-word" id="frontWord">Загрузка...</div>
        <div class="card-definition" id="frontDef"></div>
      </div>
      <div class="card-face card-back">
        <div class="card-label">RUSSIAN</div>
        <div class="card-russian" id="backRu"></div>
        <div class="card-example" id="backEx"></div>
      </div>
    </div>
  </div>
  <div class="tap-hint">👆 Нажми на карточку чтобы перевернуть</div>
  <div class="actions" id="actionBtns" style="display:none">
    <button class="btn btn-again" onclick="rate(0)">
      <span class="btn-emoji">😵</span>
      <span>Снова</span>
    </button>
    <button class="btn btn-hard" onclick="rate(1)">
      <span class="btn-emoji">🤔</span>
      <span>Сложно</span>
    </button>
    <button class="btn btn-easy" onclick="rate(2)">
      <span class="btn-emoji">✅</span>
      <span>Знаю!</span>
    </button>
  </div>
  <div class="btn-secondary">
    <button class="btn-sec" onclick="shuffleCards()">🔀 Перемешать</button>
    <button class="btn-sec" onclick="showDue()">📅 Повторение</button>
    <button class="btn-sec" onclick="showAll()">📚 Все</button>
  </div>
</div>

<!-- QUIZ SCREEN -->
<div id="screen-quiz" class="screen">
  <div class="quiz-question">
    <div class="quiz-label" id="quizLabel">ЧТО ОЗНАЧАЕТ?</div>
    <div class="quiz-word" id="quizWord">—</div>
    <div class="quiz-def" id="quizDef"></div>
  </div>
  <div class="quiz-options" id="quizOptions"></div>
  <div class="quiz-result" id="quizResult"></div>
  <button class="btn-sec" onclick="nextQuiz()" id="nextQuizBtn" style="display:none">Следующий →</button>
  <div class="stats-bar" style="margin-top:10px;border-radius:10px;border:1px solid var(--border)">
    <div class="stat">✅ <span class="stat-val" id="quizCorrect">0</span></div>
    <div class="stat">❌ <span class="stat-val" id="quizWrong">0</span></div>
    <div class="stat">% <span class="stat-val" id="quizPct">—</span></div>
  </div>
</div>

<!-- SEARCH SCREEN -->
<div id="screen-search" class="screen">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" type="text" placeholder="Искать слово или перевод..." oninput="doSearch()" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <div class="search-filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">Все</button>
    <button class="filter-btn" onclick="setFilter('known', this)">✅ Знаю</button>
    <button class="filter-btn" onclick="setFilter('learning', this)">🔄 Учу</button>
    <button class="filter-btn" onclick="setFilter('new', this)">🆕 Новые</button>
  </div>
  <div class="search-results" id="searchResults"></div>
</div>

<!-- PROGRESS SCREEN -->
<div id="screen-progress" class="screen">
  <div class="streak-badge">
    <div class="streak-num" id="progStreak">0</div>
    <div class="streak-label">🔥 дней подряд</div>
  </div>
  <div class="progress-section">
    <div class="progress-title">📈 Общий прогресс</div>
    <div class="prog-bar-wrap"><div class="prog-bar" id="mainProgBar" style="width:0%"></div></div>
    <div class="prog-grid">
      <div class="prog-item">
        <div class="prog-num" style="color:var(--correct)" id="progKnown">0</div>
        <div class="prog-lbl">✅ ЗНАЮ</div>
      </div>
      <div class="prog-item">
        <div class="prog-num" style="color:#fbbf24" id="progLearning">0</div>
        <div class="prog-lbl">🔄 УЧУСЬ</div>
      </div>
      <div class="prog-item">
        <div class="prog-num" style="color:var(--text-dim)" id="progNew">0</div>
        <div class="prog-lbl">🆕 НОВЫЕ</div>
      </div>
      <div class="prog-item">
        <div class="prog-num" style="color:var(--accent2)" id="progToday2">0</div>
        <div class="prog-lbl">📅 СЕГОДНЯ</div>
      </div>
    </div>
  </div>
  <div class="progress-section">
    <div class="progress-title">🏆 Тест: лучший результат</div>
    <div class="prog-grid">
      <div class="prog-item">
        <div class="prog-num" style="color:var(--accent)" id="progBestPct">—</div>
        <div class="prog-lbl">% ПРАВИЛЬНО</div>
      </div>
      <div class="prog-item">
        <div class="prog-num" style="color:var(--accent3)" id="progTotalSessions">0</div>
        <div class="prog-lbl">СЕССИЙ</div>
      </div>
    </div>
  </div>
  <button class="reset-btn" onclick="resetProgress()">🗑️ Сбросить прогресс</button>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-word" id="modalWord"></div>
    <div class="modal-ru" id="modalRu"></div>
    <div class="modal-def" id="modalDef"></div>
    <div class="modal-divider"></div>
    <div class="modal-label">ПРИМЕР</div>
    <div class="modal-example" id="modalEx"></div>
    <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('show')">Закрыть</button>
  </div>
</div>

<script>
const CARDS = [{"word":"go big or go home","definition":"do something with full effort or don’t do it","russian":"либо по-крупному, либо никак","example":"If we start this project, let’s go big or go home.\nЕсли мы начинаем этот проект, давай делать по-крупному."},{"word":"taunting someone","definition":"making fun of someone to provoke them","russian":"дразнить, провоцировать","example":"He kept taunting his opponent during the match.\nОн постоянно дразнил своего соперника во время матча."},{"word":"tangled","definition":"twisted together in a messy way","russian":"запутанный","example":"Her hair got tangled in the wind.\nЕё волосы запутались на ветру"},{"word":"someone’s in love","definition":"feeling romantic love","russian":"кто-то влюблён","example":"He’s smiling all the time — he’s in love.\nОн всё время улыбается — он влюблён."},{"word":"tease someone","definition":"to make jokes about someone","russian":"дразнить","example":"They teased him about his new haircut.\nОни подшучивали над его новой причёской."},{"word":"close one","definition":"something almost happened","russian":"чуть не случилось / едва","example":"That was a close one, we almost missed the train.\nЭто было близко, мы чуть не опоздали на поезд."},{"word":"punch someone in the belly","definition":"to hit someone in the stomach","russian":"ударить кого-то в живот","example":"He punched him in the belly during the fight.\nОн ударил его в живот во время драки."},{"word":"likewise","definition":"the same to you","russian":"взаимно","example":"Nice to meet you. — Likewise.\nПриятно познакомиться. — Взаимно."},{"word":"keep an open mind","definition":"be willing to consider new ideas","russian":"быть открытым к новому","example":"Try to keep an open mind about different opinions.\nСтарайся быть открытым к разным мнениям."},{"word":"anguish","definition":"severe mental or physical pain","russian":"мучение, страдание","example":"She cried in anguish after hearing the news.\nОна плакала от боли после новости."},{"word":"self-inflicted","definition":"caused by oneself","russian":"причинённый самому себе","example":"It was a self-inflicted mistake.\nЭто была ошибка, которую он сам себе причинил."},{"word":"much obliged","definition":"a formal or old-fashioned way of expressing gratitude; deeply thankful","russian":"очень признателен / премного благодарен","example":"He tipped his hat and said he was much obliged, a gesture so rare in the modern world that it caught everyone in the room off guard.\nОн приподнял шляпу и сказал, что очень признателен, — жест настолько редкий в современном мире, что он застал всех в комнате врасплох."},{"word":"prat about","definition":"to waste time behaving in a silly or irresponsible way instead of doing something useful","russian":"дурачиться / валять дурака","example":"The project deadline was rapidly approaching, yet half the team was still pratting about instead of addressing the most critical outstanding tasks.\nДедлайн проекта стремительно приближался, однако половина команды всё ещё валяла дурака вместо того, чтобы заниматься наиболее критически важными нерешёнными задачами.Stop pratting about and focus. — Хватит дурачиться, сосредоточься."},{"word":"hypothetical","definition":"based on a situation that is imagined or supposed rather than real","russian":"гипотетический / предположительный","example":"It's just a hypothetical scenario. — Это просто гипотетический сценарий.The professor presented a hypothetical situation to the students in order to encourage them to think critically about the ethical implications of the policy.\nПрофессор представил студентам гипотетическую ситуацию, чтобы побудить их критически осмыслить этические последствия данной политики."},{"word":"allegedly","definition":"used to indicate that something is claimed to be true but has not yet been proven","russian":"предположительно / по имеющимся сведениям","example":"The executive allegedly authorised payments to several shell companies, though no formal charges had been brought against him at the time of the report.\nРуководитель предположительно санкционировал выплаты нескольким подставным компаниям, хотя на момент публикации доклада официальных обвинений ему предъявлено не было.He allegedly took the money. — Предположительно он взял деньги."},{"word":"yell at","definition":"to shout at someone loudly, usually in anger or frustration","russian":"кричать на / орать на","example":"Rather than yelling at his players after the loss, the coach calmly gathered the team and focused the discussion on what could be improved next time.\nВместо того чтобы кричать на игроков после поражения, тренер спокойно собрал команду и сосредоточил обсуждение на том, что можно улучшить в следующий раз.Don't yell at me. — Не кричи на меня."},{"word":"yield","definition":"to produce or provide something; to give way to pressure or authority; to surrender","russian":"уступать / давать / приносить / сдаваться","example":"The land yielded a rich harvest. — Земля дала богатый урожай.After weeks of intense negotiation, the opposing party finally yielded to pressure and agreed to a compromise that had previously seemed impossible.\nПосле недель интенсивных переговоров противоборствующая сторона наконец уступила давлению и согласилась на компромисс, который прежде казался невозможным."},{"word":"get over something","definition":"to recover from something difficult such as an illness, loss, or disappointment","russian":"оправиться / пережить / справиться","example":"She got over the breakup eventually. — В конце концов она пережила расставание.It took him considerably longer than expected to get over the failure of his first business, but the experience ultimately made him a far more resilient entrepreneur.\nЕму потребовалось значительно больше времени, чем ожидалось, чтобы пережить провал своего первого бизнеса, однако этот опыт в итоге сделал его куда более стойким предпринимателем."},{"word":"descendants","definition":"a person or animal that is related to one who lived in the past; offspring of a particular ancestor","russian":"потомки / наследники","example":"They are descendants of royalty. — Они потомки королевской семьи. The descendants of the original settlers had maintained many of the cultural traditions brought over by their ancestors centuries ago.\nПотомки первых поселенцев сохранили многие культурные традиции, привезённые их предками столетия назад."},{"word":"rubble","definition":"broken pieces of brick, stone, or concrete, typically from a damaged or destroyed building","russian":"щебень / обломки / развалины","example":"The building was reduced to rubble. — Здание было превращено в щебень.Rescue workers searched through the rubble for survivors for several days following the earthquake, refusing to abandon hope despite the devastating scale of the destruction.\nСпасатели несколько дней искали выживших среди обломков после землетрясения, отказываясь терять надежду несмотря на разрушительный масштаб катастрофы."},{"word":"will be on someone's head","definition":"used to say that someone will be responsible for the consequences of a decision or action","russian":"ляжет на чью-либо голову / будет на чьей-либо совести","example":"If this goes wrong, it's on your head. — Если что-то пойдёт не так, это будет на твоей совести.The director made it absolutely clear that if the launch failed due to corners being cut, the consequences would be entirely on the project manager's head.\nДиректор дал совершенно чётко понять, что если запуск провалится из-за экономии на качестве, последствия лягут целиком на голову руководителя проекта."},{"word":"execution","definition":"carrying out a plan or punishment","russian":"выполнение / казнь","example":"The execution of the plan went smoothly.\nВыполнение плана прошло гладко."},{"word":"explosives","definition":"materials that can explode","russian":"взрывчатка","example":"The police found explosives in the building.\nПолиция нашла взрывчатку в здании."},{"word":"way up there","definition":"very high or far above","russian":"очень высоко / далеко наверху","example":"The plane was way up there in the sky.\nСамолёт был очень высоко в небе."},{"word":"enlightened","definition":"having greater understanding or wisdom","russian":"просвещённый","example":"He became more enlightened after traveling the world.\nОн стал более просвещённым после путешествий."},{"word":"go after","definition":"to chase or try to get something","russian":"преследовать / добиваться","example":"He went after his dreams.\nОн пошёл за своими мечтами."},{"word":"in any way","definition":"in any manner","russian":"каким-либо образом","example":"I didn’t help in any way.\nЯ никак не помог."},{"word":"on and on","definition":"continuously, without stopping","russian":"без конца","example":"He talked on and on about his trip.\nОн без конца говорил о своей поездке."},{"word":"soothing","definition":"calming and relaxing","russian":"успокаивающий","example":"The music was very soothing.\nМузыка была очень успокаивающей."},{"word":"restraint","definition":"control over emotions or actions","russian":"сдержанность, контроль","example":"She showed great restraint.\nОна проявила большую сдержанность."},{"word":"flee","definition":"to run away from danger","russian":"убегать, спасаться бегством","example":"The animals fled from the fire.\nЖивотные убежали от огня."},{"word":"no match","definition":"not equal in ability or strength","russian":"не соперник","example":"He was no match for his opponent.\nОн не был соперником своему противнику."},{"word":"wild shot","definition":"an inaccurate attempt or guess","russian":"дикая попытка / промах","example":"That was a wild shot, but it worked.\nЭто была случайная попытка, но она сработала."},{"word":"sloppy","definition":"careless and messy","russian":"небрежный","example":"His work was sloppy and full of mistakes.\nЕго работа была небрежной и с ошибками."},{"word":"I’d love to","definition":"Meaning: polite enthusiastic way to say “I want to”","russian":"с радостью / с удовольствием","example":"B1: I’d love to join you. — Я бы с радостью присоединился.\nB2: I’d love to help you with this project if I had more free time. — Я бы с удовольствием помог тебе с этим проектом, если бы у меня было больше свободного времени."},{"word":"treacherous","definition":"dangerous or untrustworthy","russian":"коварный / опасный","example":"B2: The road is treacherous in winter. — Дорога зимой опасная.\nB2+: He turned out to be a treacherous ally who betrayed everyone at the worst possible moment. — Он оказался коварным союзником, который предал всех в самый неподходящий момент."},{"word":"быть в городе на некоторое время","definition":"(be) in town for a while","russian":"town for a while","example":"B1: I’ll be in town for a while. — Я буду в городе некоторое время.\nB2: I’m in town for a while, so let’s meet up and catch up on everything. — Я ненадолго в городе, давай встретимся и обсудим всё."},{"word":"do an activity","definition":"do an activity","russian":"заниматься какой-либо деятельностью","example":"B1: We did an activity together. — Мы вместе чем-то занимались.B2: The teacher asked us to do a group activity to improve our communication skills. — Учитель попросил нас выполнить групповое задание, чтобы улучшить навыки общения."},{"word":"to be destined","definition":"to be destined (to do something)","russian":"быть предназначенным / судьбой предрешено","example":"B2: He was destined to succeed. — Ему было суждено добиться успеха.\nB2+: She felt that she was destined to achieve something great despite all the obstacles. — Она чувствовала, что ей суждено достичь чего-то великого, несмотря на все препятствия."},{"word":"fit / match right in","definition":"fit perfectly into a group or situation","russian":"идеально вписываться","example":"B2: He matched right in. — Он идеально вписался.\nB2+: Despite being new, she matched right in with the team as if she had worked there for years. — Несмотря на то что она была новенькой, она идеально вписалась в команду."},{"word":"stick","definition":"continue doing / not give up","russian":"придерживаться / не сдаваться","example":"B1: Stick to your plan. — Придерживайся своего плана.\nB2: If you stick to your goals, you will eventually succeed. — Если ты будешь придерживаться своих целей, ты в итоге добьёшься успеха."},{"word":"big jerk","definition":"very rude or unpleasant person","russian":"придурок / грубиян","example":"B1: He’s such a jerk. — Он такой придурок.\nB2: He acted like a big jerk during the meeting, interrupting everyone and ignoring their opinions. — Он вел себя как полный грубиян на встрече."},{"word":"betrothal","definition":"engagement to be married (formal)","russian":"помолвка","example":"B2: Their betrothal was announced. — Их помолвка была объявлена.\nB2+: The betrothal was arranged by their families long before they even met each other. — Их помолвка была устроена семьями задолго до их знакомства."},{"word":"the spitting image of someone","definition":"look exactly like someone","russian":"вылитая копия","example":"B2: He is the spitting image of his father. — Он вылитая копия своего отца.\nB2+: She is the spitting image of her mother, not only in appearance but also in personality. — Она вылитая копия своей матери."},{"word":"arranged marriage to someone","definition":"marriage organized by families","russian":"брак по договорённости","example":"B2: She had an arranged marriage. — У неё был брак по договорённости.\nB2+: He was forced into an arranged marriage to someone he barely knew. — Его заставили вступить в брак по договорённости с человеком, которого он почти не знал."},{"word":"devastated","definition":"extremely upset","russian":"опустошён / разбит","example":"B2: She was devastated. — Она была опустошена.\nB2+: He was devastated after losing everything he had worked for over the years. — Он был полностью разбит после потери всего, над чем работал годами."},{"word":"run-in with someone","definition":"unpleasant encounter","russian":"неприятная встреча / столкновение","example":"B2: I had a run-in with him. — У меня была неприятная встреча с ним.\nB2+: He had a run-in with the police after breaking several traffic rules. — У него была неприятная ситуация с полицией после нарушения правил."},{"word":"study closely","definition":"examine carefully","russian":"тщательно изучать","example":"B2: Study it closely. — Изучи это внимательно.\nB2+: Scientists studied the phenomenon closely to understand its underlying causes. — Учёные тщательно изучили явление."},{"word":"stow away","definition":"hide on a vehicle to travel secretly","russian":"пробраться тайком (на корабль/самолёт)","example":"B2: He stowed away on a ship. — Он тайком пробрался на корабль.\nB2+: The boy stowed away on a cargo ship hoping to start a new life in another country. — Мальчик тайком пробрался на грузовое судно."},{"word":"peasant","definition":"poor farmer (historical)","russian":"крестьянин","example":"B1: He was a peasant. — Он был крестьянином.\nB2: The story describes the life of peasants in medieval times. — История описывает жизнь крестьян в средневековье."},{"word":"confused","definition":"not understanding","russian":"запутанный / в замешательстве","example":"B1: I am confused. — Я запутался.\nB2: He looked confused after hearing the complicated explanation. — Он выглядел растерянным после сложного объяснения."},{"word":"want someone to do something","definition":"to desire that another person performs an action","russian":"хотеть, чтобы кто-то что-то сделал","example":"B2: I want you to finish the report. — Я хочу, чтобы ты закончил отчет.C1: Although they were tired, the manager wanted them to complete the project by midnight to meet the strict deadline.Несмотря на усталость, менеджер хотел, чтобы они завершили проект к полуночи, чтобы уложиться в строгий дедлайн."},{"word":"in order to / so that","definition":"showing the purpose or reason for an action","russian":"для того чтобы / так чтобы","example":"B2: Use a map so that you don't get lost. — Используй карту, чтобы не заблудиться.C1: He deliberately arrived early in order to prepare the hall so that the presentation would run successfully without any technical issues.Он намеренно пришел пораньше, чтобы подготовить зал, дабы презентация прошла успешно и без технических сбоев."},{"word":"make someone do / be made to do","definition":"to force someone to act / to be forced to act","russian":"заставлять / быть вынужденным","example":"B2: My boss made me work late. — Босс заставил меня работать допоздна.C1: While parents often make their children do chores, the students were made to redo the entire assignment because it was done ineffectively.В то время как родители часто заставляют детей делать работу по дому, студентов заставили переделать все задание, так как оно было выполнено неэффективно."},{"word":"have something done","definition":"to arrange for someone else to do something for you","russian":"когда что-то делают за/для тебя (услуга)","example":"B2: I need to have my car repaired. — Мне нужно отремонтировать машину (в сервисе).C1: To ensure the house is stable, they decided to have the foundation checked by a professional before the weather becomes unstable.Чтобы убедиться в устойчивости дома, они решили проверить фундамент у профессионала, прежде чем погода станет нестабильной."},{"word":"used to do / get used to (accustomed to)","definition":"past habit / the process of becoming familiar with something","russian":"раньше делал / привыкать","example":"B2: I used to drink coffee, but now I'm getting used to tea. — Раньше я пил кофе, но сейчас привыкаю к чаю.C1: She used to live in a quiet village, so she is still getting accustomed to the highly noisy and currently overcrowded city life.Раньше она жила в тихой деревушке, поэтому до сих пор привыкает к очень шумной и в настоящее время переполненной городской жизни."},{"word":"would prefer to / would sooner / would rather / had better","definition":"expressing preferences or giving strong advice","russian":"предпочтения и советы","example":"B2: I’d rather stay home. You’d better go now. — Я бы лучше остался дома. Тебе бы лучше идти сейчас.C1: I would sooner quit than work under such pressure; frankly, you had better talk to the director before the situation gets worse.Я бы скорее уволился, чем работал под таким давлением; честно говоря, вам бы лучше поговорить с директором, пока ситуация не ухудшилась."},{"word":"deliberately / on purpose","definition":"intentionally, not by accident","russian":"намеренно / специально","example":"B2: Did you do that on purpose? — Ты сделал это специально?C1: It doesn't mean that he failed by mistake; he deliberately ignored the instructions on purpose to see what would happen.Это не значит, что он ошибся случайно; он намеренно проигнорировал инструкции специально, чтобы посмотреть, что произойдет"},{"word":"mostly / mainly because of","definition":"for the most part; primarily due to","russian":"в основном / главным образом из-за","example":"B2: I'm late mostly because of the traffic. — Я опоздал в основном из-за пробок.C1: The project was mainly successful because of the team's ability to stay calm, even though the system was temporarily unstable.Проект был в основном успешным благодаря способности команды сохранять спокойствие, даже когда система была временно нестабильна."},{"word":"highly appreciate / significantly","definition":"to value something very much / in a sufficiently great way","russian":"высоко ценить / значительно","example":"B2: I highly appreciate your help. — Я высоко ценю вашу помощь.C1: The company's profits increased significantly, and the board members highly appreciate the effort you put into the marketing campaign.Прибыль компании значительно выросла, и члены правления высоко ценят усилия, которые вы вложили в маркетинговую кампанию."},{"word":"frankly / to be frank / naturally","definition":"used to express honesty / as expected","russian":"честно говоря / естественно","example":"B2: Frankly, I don't care. — Честно говоря, мне все равно.C1: To be frank, the task was relatively easy, but naturally, some employees struggled because the software was currently unavailable.Честно говоря, задача была относительно легкой, но, естественно, некоторые сотрудники столкнулись с трудностями, так как ПО было временно недоступно."},{"word":"no doubt / undoubtedly / nevertheless","definition":"certainly / however; despite that","russian":"без сомнения / тем не менее","example":"B2: No doubt he is right. — Без сомнения, он прав.C1: There is no doubt that the situation is difficult; nevertheless, we must complete the work perfectly to maintain our reputation.Нет сомнений в том, что ситуация сложная; тем не менее, мы должны выполнить работу идеально, чтобы сохранить свою репутацию."},{"word":"be allowed to do / let someone do","definition":"to have permission to do something","russian":"иметь разрешение / позволять","example":"B2: You are not allowed to smoke here. — Здесь нельзя курить.C1: Although they were allowed to use the library, the librarian made them keep quiet so that others could focus on their work.Хотя им разрешили пользоваться библиотекой, библиотекарь заставил их соблюдать тишину, чтобы остальные могли сосредоточиться на работе"},{"word":"mostly / especially / particularly","definition":"mainly or to a great extent; more than usual","russian":"в основном / особенно","example":"B2: I like fruit, especially apples. — Я люблю фрукты, особенно яблоки.C1: The results were mostly positive, especially considering that the team had to work under such hard conditions with relatively little support.Результаты были в основном положительными, особенно если учесть, что команде пришлось работать в таких тяжелых условиях при сравнительно небольшой поддержке."},{"word":"hard / hardly","definition":"with a lot of effort / almost not at all","russian":"усердно / едва ли (совсем нет)","example":"B2: He works hard. I can hardly hear you. — Он много работает. Я тебя почти не слышу.C1: She worked hard all night, but she had hardly finished the first chapter when the power went out, making it ineffective to continue.Она усердно работала всю ночь, но едва закончила первую главу, как отключили свет, из-за чего продолжать было бессмысленно (неэффективно)."},{"word":"actually / it doesn't mean that","definition":"in fact / used to clarify that a conclusion might be wrong","russian":"на самом деле / это не значит, что","example":"B2: Actually, I'm busy. — Вообще-то я занят.C1: Actually, the data is relatively accurate; it doesn't mean that we can stop checking, but it is undoubtedly a good start.На самом деле данные относительно точны; это не значит, что мы можем прекратить проверку, но это, несомненно, хорошее начало."},{"word":"currently / unavailable","definition":"at the present time / not possible to get or use","russian":"в настоящее время / недоступен","example":"B2: This service is currently unavailable. — Эта услуга сейчас недоступна.C1: To be short, the system is currently unavailable due to maintenance, which is highly frustrating for those who need it urgently.Короче говоря, система в данный момент недоступна из-за техобслуживания, что крайне досадно для тех, кому она нужна срочно."},{"word":"thanks to / hopefully","definition":"because of someone or something / used to express a wish","russian":"благодаря / надеюсь, что","example":"B2: Thanks to your help, I finished. — Благодаря твоей помощи я закончил.C1: Thanks to the significant investment, we will hopefully be able to stabilize the market by the end of the year.Благодаря значительным инвестициям, мы, надеюсь, сможем стабилизировать рынок к концу года."},{"word":"shortly / to be short","definition":"in a short time / briefly","russian":"вскоре / короче говоря","example":"B2: The train will arrive shortly. — Поезд прибудет в ближайшее время.C1: To be short, the manager will contact you shortly regarding the partly finished project.Короче говоря, менеджер вскоре свяжется с вами по поводу частично завершенного проекта."},{"word":"slightly / partly / finally","definition":"a little bit / not completely / after a long time","russian":"слегка / частично / наконец","example":"B2: The price is slightly higher. — Цена немного выше.C1: The plan was only partly successful because the budget was slightly underestimated; however, we finally reached an agreement.План был успешен лишь частично, так как бюджет был слегка недооценен; тем не менее, мы наконец пришли к соглашению."},{"word":"I would sooner / I would rather (+ verb)","definition":"to prefer one thing over another","russian":"я бы скорее / я бы лучше","example":"B2: I would rather stay home than go out in the rain. — Я бы лучше остался дома, чем шел гулять под дождем.C1: To be frank, I would sooner resign than accept such unethical terms, as I highly appreciate integrity in business.Честно говоря, я бы скорее уволился, чем принял такие неэтичные условия, так как я высоко ценю честность в бизнесе."},{"word":"I had better (+ verb)","definition":"used to give strong advice or tell someone what to do","russian":"мне бы лучше (совет/предупреждение)","example":"B2: You’d better see a doctor. — Тебе бы лучше сходить к врачу.C1: We had better double-check the contract, as it contains some relatively complex clauses that could lead to unstable legal ground.Нам бы лучше перепроверить контракт, так как он содержит довольно сложные пункты, которые могут привести к нестабильной правовой позиции."},{"word":"perfectly / definitely / mostly","definition":"in a faultless way / without doubt / for the most part","russian":"совершенно / определенно / в основном","example":"B2: It is perfectly normal. — Это совершенно нормально.C1: I definitely think we should proceed, as the system is perfectly capable of handling the current load, even if it is mostly manual for now.Я определенно считаю, что нам нужно продолжать, так как система совершенно способна справиться с текущей нагрузкой, даже если сейчас она в основном ручная."},{"word":"especially / occasionally / successfully","definition":"particularly / from time to time / in a way that achieves results","russian":"особенно / изредка / успешно","example":"B2: We meet occasionally for coffee. — Мы изредка встречаемся выпить кофе.C1: The team successfully launched the app, which is especially impressive given that the main server was unavailable for half the day.Команда успешно запустила приложение, что особенно впечатляет, учитывая, что основной сервер был недоступен полдня."},{"word":"actually / it doesn't mean that","definition":"used to correct a misconception or add detail","russian":"на самом деле / это не значит, что","example":"B2: Actually, I have already seen this film. — На самом деле, я уже видел этот фильм.C1: The results were slightly lower than expected, but actually, it doesn't mean that the strategy failed; it was mainly because of external factors.Результаты были чуть ниже ожидаемых, но на самом деле это не значит, что стратегия провалилась; это произошло в основном из-за внешних факторов."},{"word":"natural(ly) / contain / relatively","definition":"as expected / to have inside / to a certain degree","russian":"eстественно / содержать / относительно","example":"B2: Naturally, he was angry. — Естественно, он был зол.C1: This product contains organic ingredients, so it is naturally more expensive, though still relatively easy to find in local shops.Этот продукт содержит органические ингредиенты, поэтому он, естественно, дороже, хотя его всё же относительно легко найти в местных магазинах."},{"word":"nearly / near / nevertheless","definition":"almost / close to / despite what has just been said","russian":"почти / рядом / тем не менее","example":"B2: It’s nearly 10 o’clock. — Уже почти 10 часов.C1: We have nearly finished the project; nevertheless, some parts remain partly incomplete, which is undoubtedly a concern for the client.Мы почти закончили проект; тем не менее, некоторые части остаются частично незавершенными, что, несомненно, беспокоит клиента."},{"word":"final(ly) / no doubt / undoubtedly","definition":"after a long time / used to emphasize that something is true","russian":"наконец / без сомнения / несомненно","example":"B2: Finally, the bus arrived. — Наконец-то приехал автобус.C1: There is no doubt that she is the best candidate; she will undoubtedly lead the company to a more stable future.Нет сомнений, что она — лучший кандидат; она, несомненно, приведет компанию к более стабильному будущему."},{"word":"delve / dive (into)","definition":"to explore or examine deeply","russian":"углубляться, погружаться","example":"She decided to delve into the topic in more detail.\nОна решила глубже изучить тему."},{"word":"put something to work","definition":"to use something effectively","russian":"пустить в дело, использовать","example":"He put his skills to work on the project.\nОн применил свои навыки в проекте."},{"word":"two-tiered","definition":"having two levels or parts","russian":"двухуровневый","example":"They introduced a two-tiered system.\nОни внедрили двухуровневую систему."},{"word":"to be given the sack","definition":"to be fired from a job","russian":"быть уволенным","example":"He was given the sack for being late too often.\nЕго уволили за частые опоздания."},{"word":"to be provided with the bag (лучше: left holding the bag)","definition":"to be left responsible unfairly","russian":"остаться крайним","example":"He was left holding the bag after the deal failed.\nВ итоге он остался крайним после провала сделки."},{"word":"remotely","definition":"in a distant or slight way","russian":"отдалённо, хоть сколько-нибудь","example":"I’m not even remotely interested.\nМне это совсем не интересно."},{"word":"fraction","definition":"a small part of something","russian":"доля, часть","example":"Only a fraction of people agreed.\nЛишь малая часть людей согласилась"},{"word":"downplay","definition":"to make something seem less important","russian":"преуменьшать","example":"He tried to downplay the issue.\nОн попытался преуменьшить проблему."},{"word":"daydream","definition":"to think pleasant thoughts instead of focusing","russian":"мечтать наяву","example":"She tends to daydream during lectures.\nОна часто мечтает на лекциях."},{"word":"enthuse","definition":"to express excitement","russian":"восторгаться, говорить с энтузиазмом","example":"He enthused about the new idea.\nОн с энтузиазмом говорил о новой идее."},{"word":"step into","definition":"to take a role or position","russian":"вступать, принимать на себя","example":"She stepped into a leadership role.\nОна взяла на себя роль лидера."},{"word":"hang on tight","definition":"hold firmly","russian":"держись крепче","example":"Hang on tight, it’s going to be a rough ride.\nДержись крепче, поездка будет жёсткой."},{"word":"wish for","definition":"to want something strongly","russian":"желать","example":"She wished for success.\nОна желала успеха."},{"word":"count someone in","definition":"to include someone","russian":"включить кого-то","example":"Count me in for the trip.\nЗапиши меня в поездку."},{"word":"take it from here","definition":"I will handle it now","russian":"дальше я сам","example":"You can relax, I’ll take it from here.\nМожешь расслабиться, дальше я сам."},{"word":"you’ve gotta be kidding me","definition":"expression of disbelief","russian":"ты, должно быть, шутишь","example":"You’ve gotta be kidding me, that can’t be true.\nТы, должно быть, шутишь, этого не может быть."},{"word":"what of it","definition":"why does it matter","russian":"ну и что","example":"So I was late — what of it?\nНу да, я опоздал — и что?"},{"word":"twilight","definition":"time between day and night","russian":"сумерки","example":"They walked during twilight.\nОни гуляли в сумерках."},{"word":"halt something","definition":"to stop something","russian":"остановить","example":"The police halted the operation.\nПолиция остановила операцию."},{"word":"daybreak","definition":"the start of the day","russian":"рассвет","example":"They left at daybreak.\nОни ушли на рассвете."},{"word":"squeeze through","definition":"to pass through a tight space","russian":"протиснуться","example":"He squeezed through the narrow gap.\nОн протиснулся через узкий проход."},{"word":"nag someone","definition":"to keep complaining","russian":"пилить, надоедать","example":"Stop nagging me about it.\nПерестань меня пилить из-за этого."},{"word":"perks","definition":"extra benefits","russian":"бонусы, привилегии","example":"The job comes with great perks.\nУ этой работы хорошие бонусы."},{"word":"self-absorbed weasel","definition":"selfish and sneaky person","russian":"самовлюблённый подлец","example":"He’s just a self-absorbed weasel.\nОн просто самовлюблённый подлец."},{"word":"tranquil","definition":"calm and peaceful","russian":"спокойный","example":"It was a tranquil place by the lake.\nЭто было спокойное место у озера."},{"word":"cross over","definition":"to move from one side to another","russian":"переходить","example":"They crossed over the bridge.\nОни перешли через мост."},{"word":"resist the inevitable","definition":"to try to stop something unavoidable","russian":"сопротивляться неизбежному","example":"He tried to resist the inevitable change.\nОн пытался сопротивляться неизбежным изменениям."},{"word":"come up with","definition":"to think of an idea","russian":"придумать","example":"She came up with a great solution.\nОна придумала отличное решение."},{"word":"hold on to","definition":"to keep something","russian":"держаться за","example":"Hold on to your dreams.\nДержись за свои мечты."},{"word":"leave the gathering","definition":"to go away from an event","russian":"покинуть встречу","example":"He left the gathering early.\nОн рано покинул встречу."},{"word":"inappropriately","definition":"in a wrong or improper way","russian":"неподобающим образом","example":"He behaved inappropriately.\nОн вёл себя неподобающим образом."},{"word":"backbite","definition":"to speak badly about someone secretly","russian":"злословить за спиной","example":"They tend to backbite their colleagues.\nОни склонны обсуждать коллег за спиной."},{"word":"fallout","definition":"bad results of a situation","russian":"последствия, негативный результат","example":"There was serious fallout after the decision.\nПосле решения были серьёзные последствия."},{"word":"shove oneself","definition":"to push oneself forward","russian":"проталкиваться","example":"He shoved himself into the crowd.\nОн протолкался в толпу."},{"word":"behold","definition":"to look at something impressive","russian":"узреть, вот","example":"Behold the beauty of nature.\nУзри красоту природы."},{"word":"conquer","definition":"to defeat or overcome","russian":"завоёвывать, преодолевать","example":"He conquered his fears.\nОн преодолел свои страхи."},{"word":"miserable","definition":"трепетал, порхал","russian":"жалкий, несчастный","example":"He felt miserable after the loss.\nОн чувствовал себя несчастным после поражения."},{"word":"fluttered","definition":"to move lightly and quickly","russian":"трепетал, порхал","example":"Her heart fluttered with excitement.\nЕё сердце затрепетало от волнения."},{"word":"albeit","definition":"although","russian":"хотя, несмотря на то что","example":"He is confident, albeit a little nervous.\nОн уверенный, хотя немного нервный."},{"word":"reluctantly","definition":"unwillingly","russian":"неохотно","example":"She reluctantly agreed to help.\nОна неохотно согласилась помочь."},{"word":"infamous","definition":"well known for something bad","russian":"печально известный","example":"The city is infamous for its crime rate.\nГород печально известен уровнем преступности."},{"word":"gauge","definition":"to measure or judge","russian":"измерять, оценивать","example":"It’s hard to gauge his reaction.\nТрудно оценить его реакцию."},{"word":"wobble","definition":"to move unsteadily","russian":"шататься","example":"The table wobbled on the uneven floor.\nСтол шатался на неровном полу."},{"word":"precarious","definition":"unstable or dangerous","russian":"ненадёжный, шаткий","example":"He stood on a precarious ledge.\nОн стоял на шатком выступе."},{"word":"while also","definition":"at the same time adding another action","russian":"при этом также","example":"He studies hard while also working part-time.\nОн усердно учится, при этом также работает."},{"word":"set aside something for something","definition":"to reserve or save","russian":"откладывать / выделять","example":"She set aside money for travel.\nОна отложила деньги на путешествие."},{"word":"prepping","definition":"prepping","russian":"подготовка","example":"They are prepping for the exam.\nОни готовятся к экзамену."},{"word":"speculate","definition":"to guess without certainty","russian":"предполагать, строить догадки","example":"We can only speculate about the outcome.\nМы можем только строить догадки о результате."},{"word":"shoot in the dark","definition":"a random guess","russian":"пальцем в небо","example":"It was just a shot in the dark.\nЭто было просто предположение наугад."},{"word":"amiss","definition":"wrong or suspicious","russian":"не так, неправильно","example":"Something felt amiss.\nЧто-то казалось не так"},{"word":"to a halt","definition":"to stop completely","russian":"до полной остановки","example":"The train came to a halt.\nПоезд полностью остановился."},{"word":"shelter","definition":"protection from danger or weather","russian":"укрытие","example":"They found shelter from the storm.\nОни нашли укрытие от шторма."},{"word":"blizzard","definition":"severe snowstorm","russian":"метель","example":"We got caught in a blizzard.\nМы попали в метель."},{"word":"stumble upon","definition":"to find accidentally","russian":"наткнуться","example":"I stumbled upon an old photo.\nЯ случайно наткнулся на старое фото."},{"word":"thrilled with","definition":"very excited or happy about something","russian":"в восторге от","example":"She was thrilled with the results.\nОна была в восторге от результатов."},{"word":"slay","definition":"to do something extremely well","russian":"разнести / сделать идеально (сленг)","example":"She slayed the performance.\nОна выступила просто идеально."},{"word":"to be here awhile","definition":"to stay for some time","russian":"быть здесь какое-то время","example":"I’ll be here awhile, so we can talk.\nЯ побуду здесь какое-то время, так что мы можем поговорить."},{"word":"good riddance","definition":"relief that someone/something is gone","russian":"туда ему и дорога / наконец-то ушёл","example":"He finally quit, good riddance.\nОн наконец уволился — туда ему и дорога."},{"word":"good to be back","definition":"it feels nice to return somewhere","russian":"приятно вернуться","example":"Good to be back home after the trip.\nПриятно вернуться домой после поездки."},{"word":"faint","definition":"very weak or to lose consciousness","russian":"слабый / терять сознание","example":"She felt faint and had to sit down.\nЕй стало плохо, и она была вынуждена сесть."},{"word":"plead","definition":"to beg or make an emotional request","russian":"умолять / заявлять (в суде)","example":"He pleaded for another chance.\nОн умолял дать ему ещё один шанс."},{"word":"invincible","definition":"impossible to defeat","russian":"непобедимый","example":"He felt invincible after his victory.\nОн чувствовал себя непобедимым после победы."},{"word":"on you tenfold","definition":"something will come back much stronger","russian":"вернётся тебе в десятикратном размере","example":"Whatever you do will come back on you tenfold.\nВсё, что ты делаешь, вернётся тебе в десятикратном размере."},{"word":"disgrace","definition":"a situation causing shame","russian":"позор","example":"The scandal was a disgrace to the company.\nСкандал стал позором для компании."},{"word":"via","definition":"by way of or through","russian":"через, посредством","example":"We traveled to Paris via Berlin.\nМы поехали в Париж через Берлин."},{"word":"by way of","definition":"through a place or method","russian":"через, посредством","example":"He sent the package by way of courier.\nОн отправил посылку через курьера."},{"word":"dodgy","definition":"not trustworthy or unsafe","russian":"подозрительный, сомнительный","example":"That deal sounds a bit dodgy.\nЭта сделка звучит подозрительно."},{"word":"inherently","definition":"in a natural or essential way","russian":"по своей природе","example":"The system is inherently flawed.\nСистема по своей природе несовершенна."},{"word":"substitute for","definition":"to take the place of something","russian":"заменять","example":"You can substitute sugar for honey in this recipe.\nТы можешь заменить сахар мёдом в этом рецепте."},{"word":"banish","definition":"to send someone away permanently","russian":"изгнать","example":"He was banished from the kingdom.\nЕго изгнали из королевства."},{"word":"disgraced","definition":"having lost respect or honor","russian":"опозоренный","example":"The official was disgraced after the scandal.\nЧиновник был опозорен после скандала."},{"word":"hesitate","definition":"to pause before doing something","russian":"колебаться","example":"Don’t hesitate to ask questions.\nНе стесняйся задавать вопросы."},{"word":"tides","definition":"the rise and fall of the sea","russian":"приливы и отливы","example":"The tides change twice a day.\nПриливы меняются два раза в день."},{"word":"pull someone in","definition":"to attract or involve someone","russian":"втягивать, привлекать","example":"The story pulled me in immediately.\nИстория сразу меня увлекла."},{"word":"mighty","definition":"very powerful or strong","russian":"могущественный, сильный","example":"He is a mighty warrior.\nОн могущественный воин."},{"word":"meathead","definition":"a stupid or insensitive person","russian":"тупица (разговорное)","example":"Don’t be such a meathead.\nНе будь таким тупицей."},{"word":"go ahead and glow it up","definition":"improve or upgrade something","russian":"давай, сделай это лучше / прокачай","example":"Go ahead and glow it up, make it look amazing.\nДавай, прокачай это, сделай круто."},{"word":"induce","definition":"to cause something","russian":"вызывать, приводить к","example":"The medicine may induce sleep.\nЛекарство может вызвать сон."},{"word":"tenfold","definition":"ten times more","russian":"в десять раз","example":"The effort paid off tenfold.\nУсилия окупились в десять раз."},{"word":"escort","definition":"to go with someone for protection or guidance","russian":"сопровождать","example":"He escorted her to the door.\nОн проводил её до двери."},{"word":"run off to","definition":"to leave quickly for a place","russian":"убежать / быстро уйти куда-то","example":"He ran off to the store without saying anything.\nОн убежал в магазин, ничего не сказав."},{"word":"snazzy (for)","definition":"fashionable and attractive","russian":"стильный, эффектный","example":"That’s a snazzy outfit for the party.\nЭто стильный наряд для вечеринки."},{"word":"affecting someone","definition":"having an impact on someone","russian":"влиять на кого-то","example":"The news is deeply affecting her.\nЭта новость сильно влияет на неё."},{"word":"to cover ground","definition":"to cover ground","russian":"покрывать расстояние, продвигаться","example":"B1: We covered a lot of ground on our hike today. — Мы прошли большое расстояние во время похода сегодня.\nB2: Despite the tight deadline, the team managed to cover significant ground on the project by working overtime. — Несмотря на сжатые сроки, команда смогла существенно продвинуться в проекте, работая сверхурочно."},{"word":"far apart","definition":"separated by a large distance","russian":"далеко друг от друга","example":"B1: My best friend and I live far apart now. — Мы с лучшим другом сейчас живём далеко друг от друга.\nB2: Although they were born far apart in age, the siblings have always been incredibly close. — Хотя между ними большая разница в возрасте, эти братья и сёстры всегда были невероятно близки."},{"word":"nomad","definition":"a person who moves from place to place without a permanent home","russian":"кочевник","example":"B1: He lives like a modern nomad, traveling constantly. — Он живёт как современный кочевник, постоянно путешествуя.\nB2: Digital nomads are redefining the traditional workplace by earning a living while exploring different countries. — Цифровые кочевники переопределяют традиционное рабочее место, зарабатывая на жизнь и исследуя разные страны."},{"word":"delectable","definition":"delicious; extremely pleasant to taste","russian":"восхитительный, изысканный (о еде)","example":"B1: The chocolate cake was absolutely delectable! — Шоколадный торт был абсолютно восхитительным!\nB2: The Michelin-starred restaurant served a delectable tasting menu that highlighted seasonal ingredients. — Ресторан, отмеченный звездой Мишлен, подавал восхитительное дегустационное меню, подчёркивающее сезонные ингредиенты."},{"word":"deadly","definition":"causing or able to cause death; extremely harmful","russian":"смертельный, смертоносный","example":"B1: Some mushrooms are deadly if you eat them. — Некоторые грибы смертельны, если их съесть.\nB2: The combination of speed and reckless driving proved deadly, resulting in a tragic accident on the highway. — Сочетание скорости и безрассудного вождения оказалось смертельным, что привело к трагической аварии на шоссе."},{"word":"something it is / that's what it is","definition":"used to accept a situation as it is; that's the reality","russian":"вот так вот; такова реальность","example":"B1: I don't like it, but that's what it is. — Мне это не нравится, но что поделать.\nB2: The job isn't perfect and the hours are long, but that's what it is when you're climbing the corporate ladder. — Работа не идеальна, и часы длинные, но такова реальность, когда ты поднимаешься по карьерной лестнице."},{"word":"refugee","definition":"a person forced to leave their country due to war, persecution, or disaster","russian":"беженец","example":"B1: Many refugees are seeking safety in neighboring countries. — Многие беженцы ищут безопасность в соседних странах.\nB2: The refugee crisis has prompted humanitarian organizations to establish emergency shelters and provide essential services. — Кризис беженцев побудил гуманитарные организации создать экстренные убежища и предоставить основные услуги."},{"word":"declare (declare – declared – declared)","definition":"to announce officially or publicly","russian":"объявлять, заявлять","example":"B1: The president declared a national holiday. — Президент объявил национальный праздник.\nB2: After reviewing all the evidence, the jury declared the defendant not guilty on all charges. — После рассмотрения всех доказательств присяжные объявили подсудимого невиновным по всем обвинениям."},{"word":"destination","definition":"место назначения, пункт назначения","russian":"место назначения, пункт назначения","example":"B1: Paris is a popular tourist destination. — Париж — популярное туристическое направление.\nB2: Despite several flight delays and layovers, we finally arrived at our destination exhausted but excited. — Несмотря на несколько задержек рейсов и пересадок, мы наконец прибыли в пункт назначения уставшие, но взволнованные."},{"word":"staple","definition":"a main or important element; a basic food item","russian":"основной продукт; главный элемент","example":"B1: Rice is a staple food in many Asian countries. — Рис — основной продукт питания во многих азиатских странах.\nB2: Coffee has become such a staple of office culture that most companies provide it free to employees. — Кофе стал настолько важным элементом офисной культуры, что большинство компаний предоставляют его бесплатно сотрудникам"},{"word":"fall out of something","definition":"to drop or come out of something accidentally","russian":"выпасть из чего-то","example":"B1: My phone fell out of my pocket. — Мой телефон выпал из кармана.\nB2: When I opened the old photo album, several handwritten letters fell out of the pages, revealing a hidden family story. — Когда я открыл старый фотоальбом, несколько рукописных писем выпали из страниц, открывая скрытую семейную историю."},{"word":"integral part","definition":"an essential or fundamental component","russian":"неотъемлемая часть","example":"B1: Teamwork is an integral part of success. — Командная работа — неотъемлемая часть успеха.\nB2: Regular exercise and balanced nutrition have become integral parts of my daily routine since I started prioritizing my health. — Регулярные упражнения и сбалансированное питание стали неотъемлемыми частями моего ежедневного распорядка с тех пор, как я начал уделять приоритет здоровью."},{"word":"to be in for a shock","definition":"about to experience something surprising or unpleasant","russian":"ждёт шок; будет неприятно удивлён","example":"B1: If you think this test is easy, you're in for a shock! — Если ты думаешь, что этот тест лёгкий, тебя ждёт сюрприз!\nB2: Anyone expecting a relaxing vacation at that resort is in for a shock when they discover it's under major construction. — Любой, кто ожидает расслабляющий отпуск на том курорте, будет шокирован, когда обнаружит, что там идёт капитальный ремонт."},{"word":"tweak (tweak – tweaked – tweaked)","definition":"to make small adjustments or improvements","russian":"подкорректировать, слегка изменить","example":"B1: I need to tweak this essay before submitting it. — Мне нужно подкорректировать это эссе перед сдачей.\nB2: After tweaking the marketing strategy based on customer feedback, we saw a 30% increase in engagement. — После корректировки маркетинговой стратегии на основе отзывов клиентов мы увидели 30% рост вовлечённости."},{"word":"pump (pump – pumped – pumped)","definition":"to move liquid or gas using a pump; to fill with air","russian":"качать, накачивать","example":"B1: I need to pump air into my bicycle tires. — Мне нужно накачать шины велосипеда.\nB2: The gym was pumping energetic music to motivate the early morning workout crowd. — Спортзал качал энергичную музыку, чтобы мотивировать утреннюю тренировочную толпу."},{"word":"stock","definition":"goods available for sale; shares in a company; broth for cooking","russian":"запас; акции; бульон","example":"B1: This item is out of stock right now. — Этого товара сейчас нет в наличии.\nB2: The company's stock plummeted after the CEO announced unexpected quarterly losses during the earnings call. — Акции компании резко упали после того, как генеральный директор объявил о неожиданных квартальных убытках во время отчётного звонка."},{"word":"mouthful","definition":"a large amount of food in the mouth; something difficult to say","russian":"полный рот; труднопроизносимое слово","example":"B1: That's quite a mouthful — can I just call you by your nickname? — Это трудно выговорить — могу я просто называть тебя по прозвищу?\nB2: Her official job title is such a mouthful that even she prefers to simplify it when introducing herself. — Её официальное название должности настолько труднопроизносимо, что даже она предпочитает упрощать его при представлении."},{"word":"investigate (investigate – investigated – investigated)","definition":"to examine or research something carefully","russian":"расследовать, исследовать","example":"B1: The police are investigating the robbery. — Полиция расследует ограбление.\nB2: The committee was appointed to investigate allegations of corruption within the department before making policy recommendations. — Комитет был назначен для расследования обвинений в коррупции внутри департамента перед составлением политических рекомендаций."},{"word":"from someone's perspective","definition":"according to someone's point of view","russian":"с чьей-то точки зрения","example":"B1: From my perspective, the plan won't work. — С моей точки зрения, план не сработает.\nB2: From the customer's perspective, the new return policy seems unnecessarily restrictive and inconvenient. — С точки зрения клиента, новая политика возврата кажется излишне ограничительной и неудобной."},{"word":"facilitate (facilitate – facilitated – facilitated)","definition":"to make something easier or help it happen","russian":"способствовать, облегчать","example":"B1: Technology can facilitate learning. — Технологии могут облегчить обучение.\nB2: The new communication platform is designed to facilitate seamless collaboration between international teams across different time zones. — Новая коммуникационная платформа разработана для облегчения беспрепятственного сотрудничества между международными командами в разных часовых поясах."},{"word":"on gaining supremacy","definition":"focused on achieving dominance or superiority","russian":"в достижении превосходства","example":"B1: The team is focused on gaining supremacy in the league. — Команда сосредоточена на достижении превосходства в лиге.\nB2: The tech giant's strategy has always centered on gaining market supremacy through continuous innovation rather than aggressive pricing. — Стратегия технологического гиганта всегда была сосредоточена на достижении рыночного превосходства через постоянные инновации, а не агрессивное ценообразование."},{"word":"exquisite","definition":"extremely beautiful and delicate; of exceptional quality","russian":"изысканный, утончённый","example":"B1: The jewelry is exquisite. — Украшения изысканные.\nB2: The art gallery featured exquisite paintings from the Renaissance period, each piece meticulously restored to its original glory. — Художественная галерея представляла изысканные картины эпохи Ренессанса, каждое произведение тщательно восстановлено в первоначальном великолепии."},{"word":"scrumptious","definition":"extremely tasty and appetizing","russian":"восхитительный, аппетитный","example":"B1: This dessert looks scrumptious! — Этот десерт выглядит восхитительно!\nB2: The bakery's window display featured an array of scrumptious pastries that made it impossible to walk by without stopping. — Витрина пекарни демонстрировала массу аппетитных выпечек, мимо которых было невозможно пройти, не остановившись."},{"word":"let the ideas flow","definition":"allow creativity to happen naturally without restriction","russian":"дать идеям литься; позволить идеям течь свободно","example":"B1: Just relax and let the ideas flow. — Просто расслабься и дай идеям течь.\nB2: During brainstorming sessions, it's crucial to let the ideas flow freely without judgment before evaluating their feasibility. — Во время мозговых штурмов крайне важно позволить идеям свободно литься без осуждения, прежде чем оценивать их осуществимость."},{"word":"what else","definition":"asking for additional information or items","russian":"что ещё","example":"B1: What else do you need from the store? — Что ещё тебе нужно из магазина?\nB2: We've covered the budget, timeline, and deliverables — what else should we discuss before finalizing the proposal? — Мы рассмотрели бюджет, сроки и результаты — что ещё нам следует обсудить перед финализацией предложения?"},{"word":"petite","definition":"(of a woman) small and slender","russian":"миниатюрная, хрупкая","example":"B1: She's petite but very strong. — Она миниатюрная, но очень сильная.\nB2: Despite her petite frame, she's an accomplished martial artist who has won numerous national championships. — Несмотря на миниатюрное телосложение, она опытная мастер боевых искусств, выигравшая множество национальных чемпионатов."},{"word":"monetary","definition":"relating to money or currency","russian":"денежный, финансовый","example":"B1: The company offers monetary rewards for good performance. — Компания предлагает денежные вознаграждения за хорошую производительность.\nB2: The central bank's monetary policy adjustments have far-reaching implications for inflation rates and economic stability. — Корректировки денежно-кредитной политики центрального банка имеют далеко идущие последствия для уровня инфляции и экономической стабильности."},{"word":"check this out","definition":"B1: Check this out — I found your favorite snack! — Зацени — я нашёл твою любимую закуску!\nB2: You won't believe what just arrived in the mail — check this out, it's the limited edition we've been waiting for! — Ты не поверишь, что только что пришло по почте — зацени, это лимитированное издание, которое мы ждали!","russian":"зацени это; посмотри на это","example":""},{"word":"to be enticing","definition":"to be attractive and tempting","russian":"быть заманчивым, привлекательным","example":"B1: The job offer sounds very enticing. — Предложение работы звучит очень заманчиво.\nB2: While the startup's salary package is enticing, the lack of job security and long hours make it a risky proposition. — Хотя зарплатный пакет стартапа заманчив, отсутствие гарантии занятости и длинные часы делают его рискованным предложением."},{"word":"knock something out of the park (knock – knocked – knocked)","definition":"to do something exceptionally well; to exceed expectations","russian":"сделать что-то на отлично; превзойти ожидания","example":"B1: You really knocked that presentation out of the park! — Ты действительно великолепно провёл эту презентацию!\nB2: The marketing team absolutely knocked the campaign out of the park, generating triple the expected engagement in the first week. — Маркетинговая команда совершенно блестяще провела кампанию, создав тройную ожидаемую вовлечённость в первую неделю."},{"word":"take one's leave (take – took – taken)","definition":"to say goodbye and depart (formal)","russian":"откланяться, попрощаться и уйти","example":"B1: I must take my leave now, it's getting late. — Я должен откланяться, уже поздно.\nB2: After thanking the hosts for their generous hospitality, the ambassador took his leave and returned to the embassy. — Поблагодарив хозяев за щедрое гостеприимство, посол откланялся и вернулся в посольство."},{"word":"reward (reward – rewarded – rewarded)","definition":"награда; вознаграждение","russian":"награда; вознаграждение","example":"B1: Hard work always brings its rewards. — Тяжёлый труд всегда приносит свои награды.\nB2: The company implemented a comprehensive reward system to recognize exceptional performance and incentivize employee retention. — Компания внедрила комплексную систему вознаграждений для признания исключительной производительности и стимулирования удержания сотрудников."},{"word":"devoted butler","definition":"a loyal and dedicated personal servant","russian":"преданный дворецкий","example":"B1: The family had a devoted butler for many years. — У семьи был преданный дворецкий много лет.\nB2: The devoted butler had served the estate for four decades, becoming an indispensable part of the household and a trusted confidant. — Преданный дворецкий служил имению четыре десятилетия, став незаменимой частью домашнего хозяйства и доверенным лицом."},{"word":"seem effortless","definition":"appear to require no effort; look easy","russian":"казаться лёгким; выглядеть без усилий","example":"B1: She makes cooking seem effortless. — Она делает готовку такой, что кажется легко.\nB2: Professional dancers make complex choreography seem effortless, but years of rigorous training lie behind every graceful movement. — Профессиональные танцоры делают сложную хореографию как будто без усилий, но за каждым грациозным движением стоят годы строгих тренировок."},{"word":"fabulous","definition":"extremely good; wonderful; extraordinary","russian":"потрясающий, великолепный","example":"B1: You look fabulous in that dress! — Ты выглядишь потрясающе в этом платье!\nB2: The hotel offered fabulous ocean views and world-class amenities that exceeded all our expectations. — Отель предлагал потрясающие виды на океан и услуги мирового класса, которые превзошли все наши ожидания."},{"word":"ravishing","definition":"extremely beautiful or attractive; stunning","russian":"восхитительный, ослепительный","example":"B1: She looked ravishing at the party. —
