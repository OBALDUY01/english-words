 Она выглядела восхитительно на вечеринке.\nB2: The bride was absolutely ravishing in her custom-designed gown, capturing everyone's attention as she walked down the aisle. — Невеста была абсолютно ослепительна в своём платье на заказ, привлекая внимание всех, когда шла к алтарю."},{"word":"contagious","definition":"(of a disease) spread by contact; (of emotions) likely to spread to others","russian":"заразный; заразительный","example":"B1: Her laughter is contagious — everyone starts laughing too! — Её смех заразителен — все начинают смеяться тоже!\nB2: The team leader's enthusiasm was so contagious that even the most skeptical members became excited about the new project. — Энтузиазм руководителя команды был настолько заразительным, что даже самые скептически настроенные члены стали воодушевлены новым проектом."},{"word":"sewer","definition":"an underground pipe that carries waste water and sewage","russian":"канализация, сточная труба","example":"B1: The city is repairing the old sewer system. — Город ремонтирует старую канализационную систему.\nB2: After the heavy rainfall, the outdated sewer infrastructure couldn't handle the volume, causing flooding in several neighborhoods. — После сильного дождя устаревшая канализационная инфраструктура не справилась с объёмом, вызвав наводнение в нескольких районах."},{"word":"agile","definition":"able to move quickly and easily; mentally quick","russian":"ловкий, проворный; гибкий","example":"B1: Cats are very agile animals. — Кошки очень ловкие животные.\nB2: The company adopted an agile approach to software development, allowing teams to respond quickly to changing market demands. — Компания приняла гибкий подход к разработке программного обеспечения, позволяя командам быстро реагировать на меняющиеся требования рынка."},{"word":"fathom (fathom – fathomed – fathomed)","definition":"to understand something; to measure the depth of water","russian":"постичь, понять; измерить глубину","example":"B1: I can't fathom why he did that. — Я не могу понять, почему он это сделал.\nB2: Despite reading the report multiple times, she still couldn't fathom how such a critical error had gone unnoticed for months. — Несмотря на многократное чтение отчёта, она всё ещё не могла понять, как такая критическая ошибка оставалась незамеченной месяцами."},{"word":"unbearably bleak","definition":"extremely depressing and hopeless; intolerably gloomy","russian":"невыносимо мрачный/безрадостный","example":"B1: The weather was unbearably bleak all winter. — Погода была невыносимо мрачной всю зиму.\nB2: The documentary painted an unbearably bleak picture of life in war-torn regions, leaving viewers deeply moved and troubled. — Документальный фильм нарисовал невыносимо мрачную картину жизни в раздираемых войной регионах, оставив зрителей глубоко тронутыми и обеспокоенными."},{"word":"proposition","definition":"a proposal or suggestion; a business offer; a statement to be proved","russian":"предложение; утверждение","example":"B1: He made me an interesting business proposition. — Он сделал мне интересное деловое предложение.\nB2: The investment proposition seemed attractive on paper, but further analysis revealed significant hidden risks. — Инвестиционное предложение казалось привлекательным на бумаге, но дальнейший анализ выявил значительные скрытые риски."},{"word":"take someone's word for something (take – took – taken)","definition":"to believe what someone says without proof","russian":"поверить кому-то на слово","example":"B1: I'll take your word for it. — Я поверю тебе на слово.\nB2: Instead of taking the salesperson's word for the car's condition, I hired a mechanic to conduct a thorough inspection. — Вместо того чтобы поверить продавцу на слово о состоянии машины, я нанял механика для проведения тщательной проверки."},{"word":"invasion","definition":"an act of invading a country or territory with armed forces; an unwelcome intrusion","russian":"вторжение, нашествие","example":"B1: The invasion happened without warning. — Вторжение произошло без предупреждения.\nB2: The military invasion triggered a humanitarian crisis, forcing millions of civilians to flee their homes and seek refuge abroad. — Военное вторжение спровоцировало гуманитарный кризис, заставив миллионы мирных жителей покинуть свои дома и искать убежище за границей."},{"word":"surrender (surrender – surrendered – surrendered)","definition":"to stop fighting and admit defeat; to give up something","russian":"сдаваться, капитулировать","example":"B1: The enemy forces decided to surrender. — Вражеские силы решили сдаться.\nB2: After weeks of intense negotiations, the company was forced to surrender control of its overseas operations to settle the debt. — После недель интенсивных переговоров компания была вынуждена отдать контроль над своими зарубежными операциями для погашения долга."},{"word":"outnumbered","definition":"having fewer people than the opposing group","russian":"в меньшинстве, в численном меньшинстве","example":"B1: Our team was outnumbered three to one. — Наша команда была в меньшинстве три к одному.\nB2: Despite being heavily outnumbered by competitors, the small startup managed to capture significant market share through innovative marketing. — Несмотря на значительное численное превосходство конкурентов, небольшой стартап смог захватить значительную долю рынка благодаря инновационному маркетингу."},{"word":"plague","definition":"a deadly infectious disease; something that causes continual trouble","russian":"чума; бедствие; мучить","example":"B1: The city was hit by a plague centuries ago. — Город был поражён чумой века назад.\nB2: Technical glitches continued to plague the new software release, frustrating users and damaging the company's reputation. — Технические сбои продолжали преследовать новый релиз программного обеспечения, раздражая пользователей и нанося ущерб репутации компании."},{"word":"set the net","definition":"to prepare a trap or strategy to catch someone/something","russian":"расставить сети, подготовить ловушку","example":"B1: The fishermen set the net early in the morning. — Рыбаки расставили сети рано утром.\nB2: Investigators spent months setting the net before finally capturing the criminal organization's leaders in a coordinated raid. — Следователи потратили месяцы на расстановку сетей, прежде чем наконец захватить лидеров преступной организации в координированной облаве."},{"word":"head count","definition":"a count of the number of people present or employed","russian":"подсчёт голов; численность персонала","example":"B1: Let's do a quick head count before we leave. — Давайте быстро пересчитаем всех перед уходом.\nB2: The HR department conducted a comprehensive head count to determine staffing needs across all departments for the upcoming fiscal year. — Отдел кадров провёл комплексный подсчёт численности персонала для определения потребностей в кадрах по всем отделам на предстоящий финансовый год."},{"word":"exquisite","definition":"extremely beautiful and delicate; showing great refinement","russian":"изысканный, утончённый","example":"B1: The jewelry was absolutely exquisite. — Украшения были абсолютно изысканными.\nB2: The museum's collection includes exquisite examples of Ming Dynasty porcelain, each piece demonstrating exceptional craftsmanship. — Коллекция музея включает изысканные образцы фарфора династии Мин, каждое изделие демонстрирует исключительное мастерство."},{"word":"hostage","definition":"a person held by captors to force others to comply with demands","russian":"заложник","example":"B1: The criminals took three people hostage. — Преступники взяли трёх человек в заложники.\nB2: The tense hostage situation lasted for twelve hours before negotiators successfully secured the safe release of all captives. — Напряжённая ситуация с заложниками продолжалась двенадцать часов, прежде чем переговорщикам удалось обеспечить безопасное освобождение всех пленников."},{"word":"occur to someone (occur – occurred – occurred)","definition":"(of a thought or idea) to come into someone's mind","russian":"прийти в голову кому-то","example":"B1: It just occurred to me that I forgot my keys. — Мне только что пришло в голову, что я забыл ключи.\nB2: It never occurred to her that her colleague might be deliberately sabotaging the project until evidence emerged. — Ей никогда не приходило в голову, что её коллега может намеренно саботировать проект, пока не появились доказательства."},{"word":"way ahead of someone","definition":"much more advanced or further along than someone else","russian":"намного впереди кого-то","example":"B1: She's way ahead of the other students in math. — Она намного опережает других студентов по математике.\nB2: The company was way ahead of its competitors in adopting artificial intelligence, giving it a significant strategic advantage in the market. — Компания намного опережала своих конкурентов в применении искусственного интеллекта, что дало ей значительное стратегическое преимущество на рынке."},{"word":"swamp","definition":"an area of soft, wet land with water and plants; to overwhelm with too much of something","russian":"болото; заваливать, переполнять","example":"B1: We got lost in the swamp. — Мы заблудились в болоте.\nB2: After the product launch, customer service was swamped with inquiries and couldn't keep up with the overwhelming demand. — После запуска продукта служба поддержки клиентов была завалена запросами и не могла справиться с огромным спросом."},{"word":"ominous","definition":"giving the impression that something bad is going to happen; threatening","russian":"зловещий, предвещающий беду","example":"B1: The dark clouds looked ominous. — Тёмные облака выглядели зловеще.\nB2: The CEO's ominous warning about upcoming restructuring left employees anxious and uncertain about their job security. — Зловещее предупреждение генерального директора о предстоящей реструктуризации оставило сотрудников встревоженными и неуверенными в своей работе."},{"word":"nicer","definition":"comparative form of \"nice\" = more pleasant, attractive, or kind","russian":"приятнее, лучше, добрее","example":"B1: This apartment is nicer than the last one. — Эта квартира лучше, чем прошлая.\nB2: After receiving critical feedback, he made a conscious effort to be nicer to his colleagues and create a more positive work atmosphere. — После получения критических отзывов он сознательно старался быть добрее к коллегам и создать более позитивную рабочую атмосферу"},{"word":"except for someone","definition":"not including; apart from","russian":"кроме кого-то, за исключением","example":"B1: Everyone was there except for John. — Все были там, кроме Джона.\nB2: The project proceeded smoothly except for one team member who consistently missed deadlines and disrupted the workflow. — Проект продвигался гладко, за исключением одного члена команды, который постоянно пропускал сроки и нарушал рабочий процесс."},{"word":"sacred","definition":"connected with God or a deity; regarded with great respect","russian":"священный, святой","example":"B1: This is a sacred temple. — Это священный храм.\nB2: The indigenous community considers the ancient forest sacred and has fought to protect it from commercial development for generations. — Коренное сообщество считает древний лес священным и борется за его защиту от коммерческой застройки на протяжении поколений."},{"word":"chatty","definition":"fond of talking in a friendly and informal way","russian":"разговорчивый, болтливый","example":"B1: My neighbor is very chatty — she can talk for hours! — Моя соседка очень разговорчивая — она может говорить часами!\nB2: While most participants remained formal during the conference call, one particularly chatty attendee dominated the conversation with personal anecdotes. — Хотя большинство участников оставались формальными во время конференц-звонка, один особенно разговорчивый участник доминировал в разговоре личными историями."},{"word":"kin","definition":"one's family and relations; relatives","russian":"родня, родственники","example":"B1: She's visiting her kin this weekend. — Она навещает родню в эти выходные.\nB2: In many traditional societies, loyalty to one's kin takes precedence over individual ambitions and personal relationships. — Во многих традиционных обществах лояльность к своей родне имеет приоритет над личными амбициями и отношениями."},{"word":"greasy","definition":"covered with or resembling grease or oil; slippery","russian":"жирный, масляный","example":"B1: This pizza is too greasy for me. — Эта пицца слишком жирная для меня.\nB2: The mechanic's hands were greasy from working on engines all day, and he had to scrub them thoroughly before heading home. — Руки механика были жирными после целого дня работы с двигателями, и ему пришлось тщательно их отмыть перед тем, как отправиться домой."},{"word":"so long as / as long as","definition":"provided that; on the condition that","russian":"при условии что, пока, до тех пор пока","example":"B1: You can borrow my car so long as you drive carefully. — Ты можешь взять мою машину при условии, что будешь водить осторожно.\nB2: The company will continue to support remote work so long as employees maintain productivity and attend mandatory meetings. — Компания продолжит поддерживать удалённую работу при условии, что сотрудники сохранят продуктивность и будут посещать обязательные встречи."},{"word":"someone is up to something","definition":"planning or doing something (often something secretive or mischievous)","russian":"кто-то что-то замышляет","example":"B1: I think he's up to something — he's acting strange. — Я думаю, он что-то замышляет — он ведёт себя странно.\nB2: When the kids suddenly became quiet upstairs, their mother immediately suspected they were up to something and went to investigate. — Когда дети внезапно стали тихими наверху, их мать сразу заподозрила, что они что-то замышляют, и пошла проверить."},{"word":"porcelain","definition":"a white, hard, translucent ceramic material; fine china","russian":"фарфор","example":"B1: This vase is made of porcelain. — Эта ваза сделана из фарфора.\nB2: The museum's collection includes exquisite examples of Ming Dynasty porcelain, renowned for its delicate craftsmanship and vibrant glazes. — Коллекция музея включает изысканные образцы фарфора династии Мин, известного своим изящным мастерством и яркими глазурями."},{"word":"dethrone (dethrone – dethroned – dethroned)","definition":"to remove from power or position of authority; to depose","russian":"свергнуть с престола, лишить власти","example":"B1: The king was dethroned after the revolution. — Король был свергнут после революции.\nB2: The young challenger managed to dethrone the reigning champion in a stunning upset that shocked the entire sports world. — Молодому претенденту удалось свергнуть действующего чемпиона в ошеломляющей сенсации, которая потрясла весь спортивный мир."},{"word":"from now on","definition":"starting from this moment and continuing into the future","russian":"с этого момента, отныне","example":"B1: From now on, I'll study harder. — С этого момента я буду учиться усерднее.\nB2: After the security breach, the company announced that from now on, all employees must use two-factor authentication to access systems. — После утечки данных компания объявила, что отныне все сотрудники должны использовать двухфакторную аутентификацию для доступа к системам."},{"word":"unfried dough","definition":"unfried dough","russian":"нежареное тесто, сырое тесто","example":"B1: Don't eat the unfried dough — it's not ready yet. — Не ешь сырое тесто — оно ещё не готово.\nB2: The recipe calls for letting the unfried dough rest for at least an hour before cooking to allow the gluten to relax. — Рецепт требует, чтобы нежареное тесто отдохнуло как минимум час перед готовкой, чтобы позволить глютену расслабиться."},{"word":"pricey","definition":"expensive; costing a lot of money (informal)","russian":"дорогой, дорогостоящий","example":"B1: That restaurant is a bit pricey. — Тот ресторан немного дороговат.\nB2: While the boutique hotel was undeniably pricey, the exceptional service and stunning ocean views made it worth the splurge. — Хотя бутик-отель был, несомненно, дорогим, исключительное обслуживание и потрясающие виды на океан оправдали эту трату."},{"word":"none of your business","definition":"something that doesn't concern you; not your concern (can be rude)","russian":"не твоё дело","example":"B1: Where I go on weekends is none of your business. — Куда я хожу на выходных — не твоё дело.\nB2: When the nosy colleague asked about her salary, she politely but firmly replied that it was none of his business. — Когда любопытный коллега спросил о её зарплате, она вежливо, но твёрдо ответила, что это не его дело."},{"word":"pebble","definition":"a small, smooth stone, especially one worn by water","russian":"галька, камешек","example":"B1: Children were throwing pebbles into the lake. — Дети бросали камешки в озеро.\nB2: The garden path was beautifully designed with white pebbles arranged in intricate patterns between the stepping stones. — Садовая дорожка была красиво оформлена белой галькой, выложенной в замысловатые узоры между камнями для ходьбы."},{"word":"get/keep one's eye on someone","definition":"to watch someone carefully; to monitor","russian":"приглядывать за кем-то, следить за кем-то","example":"B1: Can you keep your eye on my bag while I'm gone? — Можешь присмотреть за моей сумкой, пока меня нет?\nB2: The manager asked the senior employee to keep an eye on the new intern and make sure she understood the company procedures. — Менеджер попросил старшего сотрудника присмотреть за новой стажёркой и убедиться, что она понимает процедуры компании."},{"word":"twinkle toes","definition":"someone who is light on their feet; a good dancer (often used playfully or sarcastically)","russian":"лёгкий на ногу; хороший танцор (игривое прозвище)","example":"B1: Look at twinkle toes over there dancing! — Посмотри на этого танцора, как он танцует!\nB2: Despite his large build, he moved across the dance floor with surprising grace, earning him the nickname \"twinkle toes\" from his friends. — Несмотря на крупное телосложение, он двигался по танцполу с удивительной грацией, что принесло ему прозвище «лёгкий на ногу» от друзей."},{"word":"let's call a truce","definition":"let's agree to stop fighting or arguing; make peace temporarily","russian":"давай заключим перемирие, давай помиримся","example":"B1: We've been arguing all day — let's call a truce. — Мы спорим весь день — давай заключим перемирие.\nB2: After weeks of heated debates, the two departments finally agreed to call a truce and work together on the project. — После недель жарких дебатов два отдела наконец согласились заключить перемирие и работать вместе над проектом."},{"word":"fragile","definition":"easily broken or damaged; delicate","russian":"хрупкий, ломкий","example":"B1: Be careful — this glass is very fragile. — Будь осторожен — это стекло очень хрупкое.\nB2: The ancient manuscript was so fragile that museum curators could only handle it while wearing special gloves in controlled conditions. — Древняя рукопись была настолько хрупкой, что кураторы музея могли обращаться с ней только в специальных перчатках в контролируемых условиях."},{"word":"speaking of which","definition":"used to introduce a related topic that was just mentioned","russian":"кстати о том; кстати говоря","example":"B1: I need to buy groceries. Speaking of which, did you make a shopping list? — Мне нужно купить продукты. Кстати, ты составил список покупок?\nB2: The meeting went well, and we finalized the budget. Speaking of which, have you received approval from the finance department yet? — Встреча прошла хорошо, и мы утвердили бюджет. Кстати говоря, ты уже получил одобрение от финансового отдела?"},{"word":"we are even / we're even","definition":"neither person owes the other anything; the score is settled","russian":"мы квиты, мы в расчёте","example":"B1: You helped me yesterday, I helped you today — now we're even. — Ты помог мне вчера, я помог тебе сегодня — теперь мы квиты.\nB2: After she returned the favor by covering his shift, he smiled and said, \"I guess we're even now,\" acknowledging their mutual support. — После того как она ответила услугой, заменив его на смене, он улыбнулся и сказал: «Думаю, теперь мы квиты», признавая их взаимную поддержку."},{"word":"whereabouts","definition":"the place where someone or something is","russian":"местонахождение","example":"Do you know his whereabouts?\nТы знаешь, где он находится?"},{"word":"go way back","definition":"to have a long history together","russian":"знать друг друга давно","example":"We go way back to school days.\nМы знакомы ещё со школы."},{"word":"step in","definition":"to get involved to help","russian":"вмешаться","example":"She stepped in to solve the problem.\nОна вмешалась, чтобы решить проблему."},{"word":"to be on the house","definition":"free of charge","russian":"за счёт заведения","example":"Don’t worry, drinks are on the house.\nНе переживай, напитки за счёт заведения."},{"word":"fabulous","definition":"extremely good","russian":"потрясающий","example":"That was a fabulous performance.\nЭто было потрясающее выступление."},{"word":"I am not quite following","definition":"I don’t fully understand","russian":"я не совсем понимаю","example":"I’m not quite following your point.\nЯ не совсем понимаю твою мысль."},{"word":"think over","definition":"consider carefully","russian":"обдумать","example":"I need time to think it over.\nМне нужно время, чтобы всё обдумать"},{"word":"point out","definition":"draw attention to","russian":"указать","example":"She pointed out my mistake.\nОна указала на мою ошибку."},{"word":"point at","definition":"direct finger toward","russian":"указывать на (физически)","example":"Don’t point at people.\nНе указывай на людей."},{"word":"count on / rely on / bank on","definition":"depend on","russian":"полагаться","example":"You can rely on me.\nТы можешь на меня рассчитывать."},{"word":"get by","definition":"manage with difficulty","russian":"справляться","example":"We can get by with little money.\nМы можем справиться с небольшими деньгами."},{"word":"make up / come up with","definition":"invent ideas","russian":"придумывать","example":"She came up with a solution.\nОна придумала решение."},{"word":"make up a story","definition":"invent a story","russian":"сочинить историю","example":"He made up a story to explain.\nОн придумал историю, чтобы объяснить."},{"word":"get away","definition":"escape","russian":"сбежать / уйти","example":"He got away from the police.\nОн сбежал от полиции."},{"word":"put forward","definition":"propose","russian":"выдвигать (идею)","example":"They put forward a new plan.\nОни выдвинули новый план."},{"word":"suggestion","definition":"an idea or advice","russian":"предложение","example":"That’s a good suggestion.\nЭто хорошее предложение."},{"word":"put out (the fire)","definition":"extinguish","russian":"потушить","example":"Firefighters put out the fire.\nПожарные потушили огонь."},{"word":"figure out","definition":"understand or solve","russian":"разобраться","example":"I can’t figure it out.\nЯ не могу разобраться."},{"word":"carry out / conduct","definition":"perform","russian":"выполнять, проводить","example":"They carried out the experiment.\nОни провели эксперимент."},{"word":"give away","definition":"give for free or reveal","russian":"раздавать / выдавать","example":"They gave away free food.\nОни раздавали бесплатную еду."},{"word":"charity","definition":"helping others","russian":"благотворительность","example":"She works for a charity.\nОна работает в благотворительной организации."},{"word":"pick up","definition":"lift, collect, improve","russian":"подбирать / забирать / улучшать","example":"I’ll pick you up at 6.\nЯ заеду за тобой в 6"},{"word":"cut down on","definition":"reduce","russian":"сократить","example":"I need to cut down on sugar.\nМне нужно сократить сахар."},{"word":"find out","definition":"discover","russian":"узнать","example":"Find out the truth.\nУзнай правду."},{"word":"come in","definition":"enter","russian":"войти","example":"Come in, please.\nЗаходи."},{"word":"look in on someone","definition":"visit briefly","russian":"проведать","example":"I’ll look in on my grandma.\nЯ зайду проведать бабушку."},{"word":"take after / resemble","definition":"look like","russian":"быть похожим","example":"He takes after his father.\nОн похож на своего отца."},{"word":"look after","definition":"take care of","russian":"заботиться","example":"She looks after the kids.\nОна заботится о детях"},{"word":"go by","definition":"pass","russian":"проходить (о времени)","example":"Time goes by quickly.\nВремя проходит быстро."},{"word":"put up (the price)","definition":"increase price","russian":"повысить цену","example":"They put up the price.\nОни повысили цену."},{"word":"put up with / tolerate / endure","definition":"accept something unpleasant","russian":"терпеть","example":"I can’t put up with this noise.\nЯ не могу терпеть этот шум"},{"word":"go down","definition":"decrease","russian":"падать","example":"Prices go down.\nЦены падают."},{"word":"go up","definition":"increase","russian":"расти","example":"Prices go up.\nЦены растут."},{"word":"talk over","definition":"discuss","russian":"обсудить","example":"Let’s talk it over.\nДавай это обсудим."},{"word":"take off","definition":"remove or rise","russian":"взлететь / снять / стать популярным","example":"The plane took off.\nСамолёт взлетел."},{"word":"drop out of","definition":"quit","russian":"бросить (учёбу)","example":"He dropped out of college.\nОн бросил колледж."},{"word":"let someone down","definition":"disappoint","russian":"подвести","example":"Don’t let me down.\nНе подведи меня."},{"word":"go off","definition":"explode, ring, spoil","russian":"сработать / испортиться / уйти","example":"The alarm went off.\nСработала сигнализация."},{"word":"put off","definition":"delay","russian":"откладывать","example":"Don’t put it off.\nНе откладывай."},{"word":"get back to doing something","definition":"resume","russian":"вернуться к","example":"I got back to studying.\nЯ вернулся к учёбе."},{"word":"get across","definition":"communicate clearly","russian":"донести мысль","example":"He got his point across.\nОн донёс свою мысль."},{"word":"look ahead","definition":"think about future","russian":"смотреть вперёд","example":"We must look ahead.\nНужно смотреть вперёд."},{"word":"look back","definition":"think about past","russian":"оглядываться назад","example":"Don’t look back with regret.\nНе оглядывайся с сожалением."},{"word":"fall behind","definition":"lag behind","russian":"отставать","example":"He fell behind in class.\nОн начал отставать в классе."},{"word":"look through","definition":"examine quickly","russian":"просмотреть","example":"I looked through the documents.\nЯ просмотрел документы"},{"word":"fall out / quarrel","definition":"argue","russian":"поссориться","example":"They fell out over money.\nОни поссорились из-за денег."},{"word":"bring up","definition":"raise or mention","russian":"воспитывать / поднять тему","example":"She brought up an important issue.\nОна подняла важный вопрос."},{"word":"watch out","definition":"be careful","russian":"будь осторожен","example":"Watch out for cars.\nОсторожно с машинами."},{"word":"look out","definition":"warning","russian":"осторожно","example":"Look out!\nОсторожно!"},{"word":"gain","definition":"to obtain or achieve","russian":"получать, приобретать","example":"He gained valuable experience from the job.\nОн получил ценный опыт от работы."},{"word":"to be lucky to be born","definition":"to feel fortunate about being born or life circumstances","russian":"повезло родиться","example":"I feel lucky to be born into this family.\nМне повезло родиться в этой семье."},{"word":"rat someone out","definition":"to inform on someone","russian":"сдать, настучать","example":"He ratted me out to the teacher.\nОн сдал меня учителю."},{"word":"n the barn / on the barn","definition":"related to a farm building","russian":"в амбаре / на амбаре","example":"They stored hay in the barn.\nОни хранили сено в амбаре."},{"word":"keep in mind","definition":"remember or consider","russian":"иметь в виду","example":"Keep in mind that time is limited.\nИмей в виду, что время ограничено."},{"word":"quieter","definition":"more quiet","russian":"тише / более тихий","example":"Please be quieter.\nПожалуйста, будь тише."},{"word":"downwind","definition":"in the direction the wind is blowing","russian":"по ветру","example":"The smell carried downwind.\nЗапах разнёсся по ветру."},{"word":"prodigy","definition":"a person with exceptional talent","russian":"вундеркинд","example":"He was a child prodigy in music.\nОн был музыкальным вундеркиндом."},{"word":"revoke","definition":"officially cancel","russian":"аннулировать, отменять","example":"They revoked his license.\nЕму аннулировали лицензию."},{"word":"humble servant","definition":"respectful and modest helper","russian":"покорный слуга","example":"I remain your humble servant.\nОстаюсь вашим покорным слугой."},{"word":"scarcely","definition":"barely","russian":"едва, почти не","example":"He could scarcely believe it.\nОн едва мог в это поверить."},{"word":"hail","definition":"greet enthusiastically or frozen rain","russian":"приветствовать / град","example":"They hailed the hero.\nОни приветствовали героя.\nIt started to hail.\nПошёл град."},{"word":"elude","definition":"escape or avoid","russian":"ускользать","example":"The answer eluded him.\nОтвет ускользал от него."},{"word":"evoke","definition":"to bring to mind","russian":"вызывать (чувства)","example":"The music evoked strong emotions.\nМузыка вызвала сильные эмоции."},{"word":"divide up","definition":"split into parts","russian":"разделить","example":"They divided up the work equally.\nОни разделили работу поровну."},{"word": w","russian":"наливать","example":"She poured some water into the glass.\nОна налила воду в стакан."},{"word":"mutual","definition":"shared by two or more people","russian":"взаимный","example":"They have mutual respect for each other.\nУ них взаимное уважение."},{"word":"attend","definition":"to be present at an event","russian":"посещать","example":"She attends all the meetings.\nОна посещает все встречи."},{"word":"mandatory","definition":"required by rules","russian":"обязательный","example":"Attendance is mandatory.\nПосещение обязательно."},{"word":"estate","definition":"property or land","russian":"имущество / поместье","example":"He owns a large estate.\nУ него есть большое поместье."},{"word":"confidant","definition":"a person you trust with secrets","russian":"доверенное лицо","example":"She is my closest confidant.\nОна моё самое доверенное лицо."},{"word":"household","definition":"people living in one home","russian":"домохозяйство","example":"The whole household was asleep.\nВсё домохозяйство спало."},{"word":"splurge","definition":"spend a lot of money","russian":"тратиться, шикануть","example":"He splurged on a new phone.\nОн потратился на новый телефон."},{"word":"despair","definition":"complete loss of hope","russian":"отчаяние","example":"He felt despair after the failure.\nОн почувствовал отчаяние после неудачи."},{"word":"snooze","definition":"to sleep lightly for a short time","russian":"дремать","example":"He snoozed on the couch.\nОн задремал на диване."},{"word":"bracing","definition":"refreshing or harsh","russian":"бодрящий / резкий","example":"The cold wind was bracing.\nХолодный ветер был бодрящим."},{"word":"resume something","definition":"start again after a pause","russian":"возобновить","example":"They resumed work after lunch.\nОни возобновили работу после обеда."},{"word":"head-on","definition":"directly or frontally","russian":"напрямую / лоб в лоб","example":"They faced the problem head-on.\nОни столкнулись с проблемой напрямую."} n":"огромный океан","example":"They crossed a vast ocean.\nОни пересекли огромный океан."},{"word":"detour","definition":"alternative route","russian":"обходной путь","example":"We took a detour.\nМы поехали в объезд."},{"word":"held back","definition":"prevented or restrained","russian":"сдерживал / задерживал","example":"He held back his emotions.\nОн сдерживал свои эмоции"},{"word":"vacation","definition":"a period of rest or travel","russian":"отпуск","example":"We are going on vacation next week.\nМы едем в отпуск на следующей неделе"},{"word":"pristine","definition":"in perfect original condition","russian":"первозданный, безупречный","example":"The beach was pristine and untouched.\nПляж был первозданным и нетронутым"},{"word":"priceless","definition":"extremely valuable, not measurable in money","russian":"бесценный","example":"Her support is priceless.\nЕё поддержка бесценна."},{"word":"shutty","definition":"closed or not open","russian":"(нечасто используется; лучше: shut / closed) — закрытый","example":"The shop was shut early.\nМагазин закрылся рано."},{"word":"buried","definition":"placed under ground","russian":"похороненный / закопанный","example":"The treasure was buried underground.\nСокровище было закопано под землёй."},{"word":"intact","definition":"not damaged","russian":"нетронутый, целый","example":"The building remained intact.\nЗдание осталось целым."},{"word":"vouch","definition":"to guarantee or support","russian":"поручиться","example":"I can vouch for his honesty.\nЯ могу поручиться за его честность."},{"word":"fuzzy","definition":"unclear or soft","russian":"нечёткий / пушистый","example":"The picture is fuzzy.\nКартинка нечёткая."},{"word":"misuse","definition":"use in the wrong way","russian":"неправильно использовать","example":"Don’t misuse this tool.\nНе используй этот инструмент неправильно."},{"word":"snuggle","definition":"to cuddle closely","russian":"прижиматься","example":"They snuggled under the blanket.\nОни прижались друг к другу под одеялом."},{"word":"sneak up on smb","definition":"to approach someone silently without them noticing","russian":"подкрадываться к кому-либо","example":"The cat snuck up on the bird.Кот подкрался к птице."},{"word":"apprehend","definition":"to arrest or capture someone; also: to understand or fear something","russian":"задерживать, арестовывать (официально)","example":"Police apprehended the suspect near the border.Полиция задержала подозреваемого у границы."},{"word":"fugitive","definition":"a person who has escaped and is hiding from the law","russian":"беглец, беглый преступник","example":"They were hunting fugitives across three states.Они преследовали беглецов в трёх штатах."},{"word":"swampy","definition":"wet, muddy, like a swamp","russian":"болотистый, топкий","example":"The swampy ground made it hard to walk.Болотистая почва мешала идти."},{"word":"suit yourself","definition":"do whatever you want — said when you don't care or are slightly annoyed","russian":"как хочешь, как знаешь","example":"\"I'm not coming.\" — \"Suit yourself.\"«Я не пойду.» — «Как хочешь.»"},{"word":"quench","definition":"to satisfy thirst or desire; to extinguish a fire","russian":"утолять (жажду), гасить (огонь, желание)","example":"Nothing could quench his thirst in that heat.Ничто не могло утолить его жажду в такую жару."},{"word":"rat smb out","definition":"to inform on someone, to betray them by telling authorities","russian":"доносить на кого-то, сдавать (предавать)","example":"He ratted his friends out to the police.Он сдал своих друзей полиции."},{"word":"filthy","definition":"extremely dirty; also used to mean morally disgusting","russian":"грязный (очень), мерзкий","example":"The streets were filthy after the festival.Улицы были ужасно грязными после фестиваля."},{"word":"gasbag","definition":"US: an old man (slightly dismissive); UK: just a guy / bloke","russian":"старикан (разг.), дядька (брит. сленг — просто «мужик»)","example":"Some old geezer was feeding pigeons in the park.Какой-то старикан кормил голубей в парке."},{"word":"mud","definition":"wet, soft earth or dirt","russian":"грязь, жижа (мокрая земля)","example":""},{"word":"woozy","definition":"feeling dizzy, unsteady, or slightly faint — from alcohol, illness, or a blow","russian":"головокружение, «поплыло» (чувствуешь себя неустойчиво)","example":"I felt woozy after standing up too fast.У меня поплыло в голове, когда я резко встал."},{"word":"hallucinate","definition":"to see, hear, or sense things that aren't really there","russian":"галлюцинировать, видеть галлюцинации","example":"The fever was so high he started hallucinating.Температура была такой высокой, что у него начались галлюцинации."},{"word":"carve","definition":"to cut into a material to shape it; also to slice meat at the table","russian":"вырезать, резать (из дерева, камня, мяса)","example":"He carved a bear out of a log.Он вырезал медведя из бревна."},{"word":"merchant","definition":"a person who buys and sells goods, especially in trade; also used in fantasy/historical contexts","russian":"торговец, купец","example":"Medieval merchants traveled long routes to sell their goods.Средневековые купцы преодолевали долгий путь, чтобы продать товары."},{"word":"destructive","definition":"causing great damage or harm","russian":"разрушительный, губительный","example":"The storm was the most destructive in decades.Буря была самой разрушительной за десятилетия."},{"word":"penetrate","definition":"to pass into or through something, especially something solid or defended","russian":"проникать, пробиваться сквозь что-либо","example":"The bullet failed to penetrate the armor.Пуля не смогла пробить броню."},{"word":"expunge","definition":"to erase or remove something completely, especially from a record","russian":"стирать, вычёркивать, полностью уничтожать (запись, память)","example":"His criminal record was expunged after ten years.Его судимость была аннулирована через десять лет."},{"word":"impenetrable","definition":"impossible to pass through or understand; also used for dense text or logic","russian":"непроницаемый, непробиваемый; непонятный","example":"The fortress walls were impenetrable.Стены крепости были непробиваемыми.im- (не) + penetrate = буквально «не поддающийся проникновению»"},{"word":"drill","definition":"to make a hole with a tool; to train soldiers repeatedly; a practice session","russian":"сверлить (инструмент) / муштровать, тренировать (военн.) / учения, тренировка","example":"The sergeant drilled the recruits every morning.Сержант муштровал новобранцев каждое утро."},{"word":"elite platoon","definition":"a highly trained, specially selected small military unit","russian":"элитный взвод","example":"An elite platoon was sent in to complete the mission.Для выполнения задания был направлен элитный взвод.platoon = взвод (обычно 20–50 солдат)"},{"word":"doomed","definition":"certain to fail, die, or suffer — no way out","russian":"обречённый (на провал, гибель)","example":"From the start, the mission felt doomed.С самого начала миссия казалась обречённой."},{"word":"get a hold of oneself","definition":"to regain control of your emotions; to stop panicking or acting irrationally","russian":"взять себя в руки, успокоиться","example":"He took a deep breath and got a hold of himself.Он глубоко вздохнул и взял себя в руки."},{"word":"flower in bloom","definition":"a flower that has fully opened; often used metaphorically for beauty or peak condition","russian":"цветок в расцвете, распустившийся цветок","example":"The garden was full of flowers in bloom.Сад был полон распустившихся цветов."},{"word":"cartwheeled","definition":"a sideways gymnastics move where you spin on your hands and feet; also: to spin or tumble wildly","russian":"делать колесо (гимнастика) / колесо (как движение)","example":"The car cartwheeled off the road and into the ditch.Машина перевернулась через колесо и вылетела в кювет."},{"word":"bangable","definition":"crude slang meaning sexually attractive — avoid in formal or polite contexts","russian":"привлекательный в сексуальном плане (грубо)","example":""},{"word":"elusive","definition":"hard to find, catch, or achieve","russian":"неуловимый, труднодостижимый","example":"Success remained elusive despite years of effort.Успех оставался недостижимым, несмотря на годы усилий."},{"word":"complement","definition":"to go well with something and make it complete (≠ compliment = похвала)","russian":"дополнять, хорошо сочетаться (глагол) / дополнение (сущ.)","example":"The sauce complements the dish perfectly.Соус отлично дополняет блюдо."},{"word":"deference","definition":"respectful submission or yielding to someone else's judgment or wishes","russian":"уважение, почтение (особенно к старшим/авторитетам)","example":"In deference to her wishes, they stayed quiet.Из уважения к её пожеланиям они помолчали."},{"word":"deterrence","definition":"the act of discouraging someone from doing something through fear of consequences","russian":"сдерживание, устрашение (чтобы предотвратить действие)","example":"Nuclear deterrence kept the two powers from open conflict.Ядерное сдерживание уберегло две державы от открытого конфликта."},{"word":"cogent","definition":"clear, logical, and convincing (used for arguments)","russian":"убедительный, логически обоснованный","example":"She made a cogent argument for changing the policy.Она привела убедительный аргумент в пользу изменения политики."},{"word":"proliferate","definition":"to increase rapidly in number or spread widely","russian":"стремительно распространяться, размножаться","example":"Fake news proliferates quickly on social media.Фейковые новости быстро распространяются в соцсетях."},{"word":"benevolent","definition":"kind, generous, and well-meaning toward others","russian":"доброжелательный, благосклонный, великодушный","example":"He was a benevolent ruler who cared for his people.Он был великодушным правителем, заботившимся о своём народе."},{"word":"furtive","definition":"done secretly, as if trying not to be noticed; shifty","russian":"украдкий, скрытный, подозрительно тихий","example":"She shot a furtive glance over her shoulder.Она украдкой бросила взгляд через плечо."},{"word":"diaphanous","definition":"light, delicate, and almost transparent — usually of fabric or mist","russian":"прозрачный, лёгкий (о ткани, тумане)","example":"She wore a diaphanous white veil.На ней была лёгкая, почти прозрачная белая вуаль."},{"word":"shush","definition":"to tell someone to be quiet; \"shush up\" = informal, slightly stronger","russian":"заткнись / тише! (просьба замолчать)","example":"She shushed the kids during the movie.Она попросила детей замолчать во время фильма."},{"word":"desperate","definition":"feeling or showing hopelessness; willing to do anything due to urgency","russian":"отчаянный, безнадёжный; очень нуждающийся","example":"He was desperate for any news about his family.Он отчаянно ждал любых новостей о своей семье."},{"word":"ferry ride","definition":"a trip across water on a ferry boat","russian":"поездка на пароме","example":"The ferry ride to the island took about 20 minutes.Поездка на пароме до острова заняла около 20 минут."},{"word":"liberate","definition":"to set someone free from imprisonment, oppression, or constraint","russian":"освобождать (из плена, угнетения)","example":"Allied forces liberated the city in 1944.Союзные войска освободили город в 1944 году."},{"word":"on the ferry","definition":"aboard a ferry boat","russian":"на пароме","example":"We met on the ferry crossing the bay.Мы познакомились на пароме, пересекая залив."},{"word":"imbecile","definition":"a very stupid person — used as an insult; originally a medical term (now offensive)","russian":"идиот, тупица (оскорбление)","example":"Those imbeciles broke the machine again.Эти тупицы снова сломали машину."},{"word":"crabby","definition":"irritable and grumpy, usually temporarily","russian":"раздражительный, сварливый, не в духе","example":"He's always crabby before his morning coffee.Он всегда сварливый до утреннего кофе."},{"word":"sleeveless","definition":"a garment with no sleeves","russian":"без рукавов","example":"She wore a sleeveless dress in the summer heat.В летнюю жару она надела платье без рукавов."},{"word":"Are you doing okay?","definition":"a caring question checking on someone's wellbeing — warmer than \"are you okay?\"","russian":"Ты в порядке? / Как ты?","example":"\"You look tired — are you doing okay?\" \"Yeah, just a long day.\"«Ты выглядишь уставшим — ты в порядке?» «Да, просто длинный день.»"},{"word":"belongings","definition":"the things you own, especially things you carry with you","russian":"вещи, пожитки, личные предметы","example":"She packed her belongings into one bag.Она сложила все свои вещи в одну сумку."},{"word":"lead through","definition":"to guide someone through a place or process","russian":"проводить через что-либо, вести сквозь","example":"She led us through the narrow alleyways.Она провела нас через узкие переулки."},{"word":"Thank you for your concern.","definition":"a polite reply to someone who has expressed worry — can be sincere or slightly dismissive depending on tone","russian":"Спасибо за беспокойство / заботу.","example":"\"You really should rest more.\" — \"Thank you for your concern.\"«Тебе правда нужно больше отдыхать.» — «Спасибо за беспокойство.»"},{"word":"overprotective","definition":"being too protective, not allowing enough freedom","russian":"чрезмерно опекающий, гиперопекающий","example":"His overprotective parents wouldn't let him travel alone.Его гиперопекающие родители не давали ему путешествовать одному."},{"word":"noble of smb","definition":"said when someone does something morally admirable or self-sacrificing","russian":"благородно с чьей-то стороны","example":"\"I'll cover for you.\" — \"That's noble of you.\"«Я тебя прикрою.» — «Это благородно с твоей стороны.»"},{"word":"humble","definition":"not arrogant; modest about one's abilities; as a verb: to make someone feel less proud","russian":"скромный, смиренный (прил.) / унижать, смирять (глагол)","example":"Despite his fame, he remained humble.Несмотря на славу, он оставался скромным."},{"word":"outcast","definition":"a person rejected or excluded by society or a group","russian":"изгой, отверженный","example":"He felt like an outcast in his new school.В новой школе он чувствовал себя изгоем."},{"word":"squishy-looking","definition":"appearing soft, squishy, or jelly-like in texture","russian":"выглядящий мягким и упругим, как желе","example":"That squishy-looking mushroom was actually dangerous.Этот мягкий на вид гриб оказался опасным."},{"word":"fuzzball","definition":"a small fluffy creature or a ball of fluff — usually said affectionately about animals","russian":"пушистик, меховой комочек (ласково о животном)","example":"Look at that little fuzzball — it's a baby hamster!Посмотри на этого пушистика — это же детёныш хомяка!"},{"word":"whip up","definition":"to make something quickly and easily; to beat eggs/cream; also: to stir up emotions","russian":"быстро приготовить / сделать на скорую руку; взбить (яйца, крем)","example":"I'll whip up something to eat in ten minutes.Я за десять минут что-нибудь приготовлю."},{"word":"poofy","definition":"light and full of air; excessively fluffy or puffy in shape","russian":"пышный, надутый, пузырчатый (о форме)","example":"She wore a poofy dress that took up half the seat.На ней было пышное платье, занявшее половину сиденья."},{"word":"braces","definition":"dental braces = metal brackets to straighten teeth; braces (UK) = suspenders for trousers","russian":"брекеты (зубные) / подтяжки (для брюк — брит.)","example":"He had braces for two years and now his teeth are perfect.Он носил брекеты два года, и теперь у него идеальные зубы.💡 US: braces = брекеты; UK: braces = подтяжки для брюк"},{"word":"disgrace / deference / grace","definition":"loss of respect or honour; a shameful situationpolite respect shown to someone of higher statuselegance of movement; also: kindness or goodwill (\"with good grace\")","russian":"позор, бесчестьепочтение, уважение к старшим / авторитетамизящество, грация; милость, благодать","example":"His behaviour was a disgrace to the whole team.Его поведение было позором для всей команды.In deference to the elders, he stayed silent.Из уважения к старшим он промолчал.She moved with incredible grace across the stage.Она двигалась по сцене с невероятной грацией.💡 Связь: grace (достоинство) → disgrace (потеря достоинства) → deference (уважение к чужому достоинству)"},{"word":"have it your way","definition":"do it the way you want — said when you disagree but give up arguing","russian":"как хочешь, пусть будет по-твоему (с лёгкой досадой)","example":"\"I'm not changing my mind.\" — \"Fine, have it your way.\"«Я не изменю своего мнения.» — «Ладно, пусть будет по-твоему.»"},{"word":"cut smth up","definition":"to cut something into pieces","russian":"разрезать на куски","example":"She cut up the vegetables before adding them to the pot.Она нарезала овощи перед тем, как добавить их в кастрюлю."},{"word":"be almost there","definition":"to be close to arriving somewhere, or close to finishing something","russian":"почти на месте; почти готово / почти сделано","example":"Keep going — we're almost there!Продолжай — мы почти у цели!"},{"word":"crew","definition":"a group working together (ship/plane crew); informally: your group of friends","russian":"экипаж; команда; компания (разг.)","example":"The whole crew showed up to help with the move.Вся компания пришла помочь с переездом."},{"word":"budge","definition":"to move slightly; or to change your opinion (usually in negative: won't budge)","russian":"сдвигаться с места; уступать (менять позицию)","example":"The rock wouldn't budge no matter how hard we pushed.Камень не сдвигался с места, сколько мы ни толкали.He refused to budge on the price.Он не уступил по цене."},{"word":"literally","definition":"in the exact sense of the word; informally used as an intensifier (even when not literal)","russian":"буквально (точное значение) / прям, реально (усилитель в разговорной речи)","example":"I literally ran into him on the street — we collided.Я буквально столкнулся с ним на улице — мы врезались друг в друга.That was literally the best pizza I've ever had. (informal intensifier)Это была реально лучшая пицца в моей жизни. (разг. усилитель)"},{"word":"disgusting","definition":"causing strong feelings of disgust or revulsion","russian":"отвратительный, омерзительный","example":"The smell coming from the bin was absolutely disgusting.Запах из мусорного ведра был просто отвратительным."},{"word":"sludge","definition":"thick, muddy, or semi-liquid waste material","russian":"жижа, тина, густая грязная масса","example":"The pipes were clogged with dark sludge.Трубы были забиты тёмной жижей."},{"word":"catch on","definition":"to begin to understand; or to become popular/widespread","russian":"понять, дойти (наконец понять) / войти в моду, прижиться","example":"It took him a while, but he finally caught on.Ему понадобилось время, но в итоге до него дошло.The trend caught on quickly across Europe.Тренд быстро распространился по всей Европе."},{"word":"kinda like that one","definition":"\"kinda\" = kind of (немного / вроде как); the whole phrase = something similar to that","russian":"что-то типа того / примерно как вот этот","example":"\"What kind of vibe are you going for?\" — \"Kinda like that one.\"«Какую атмосферу ты хочешь создать?» — «Что-то типа вот этого.»"},{"word":"jinx smth","definition":"to bring bad luck to something by speaking too confidently about it","russian":"сглазить, накликать беду","example":"Don't say we're going to win — you'll jinx it!Не говори, что мы победим — сглазишь!"},{"word":"mean-looking","definition":"appearing aggressive, intimidating, or scary in appearance","russian":"с угрожающей / злобной внешностью","example":"A mean-looking guard stood at the entrance.У входа стоял охранник с угрожающим видом."},{"word":"pop in","definition":"to visit briefly and casually","russian":"заскочить, забежать ненадолго","example":"I'll pop in after work to drop off the keys.Я заскочу после работы, чтобы отдать ключи"},{"word":"sneak in","definition":"to enter a place quietly without being noticed or permitted","russian":"прокрасться, войти незаметно","example":"They sneaked in through the back door.Они прокрались через заднюю дверь."},{"word":"pull off","definition":"to successfully do something difficult or impressive","russian":"провернуть, суметь сделать что-то сложное; удачно осуществить","example":"I can't believe she pulled it off — the event was perfect.Не верю, что она это провернула — мероприятие было идеальным."},{"word":"assault","definition":"a violent physical or verbal attack; legally: threatening or making unlawful contact","russian":"нападение, атака (физическая или словесная); нападать","example":"He was charged with assault after the fight.Ему предъявили обвинение в нападении после драки.⚠️ assault (угроза / попытка удара) vs battery (фактический удар) — юридическое различие в англ. праве"},{"word":"can't contain one's joy","definition":"to be so happy that you can't hide or suppress the feeling","russian":"не в силах сдержать радость","example":"She couldn't contain her joy when she found out she got the part.Она не могла сдержать радость, узнав, что получила роль.💡 contain здесь = сдерживать, подавлять (эмоцию). Часто в иронии: I can barely contain my joy = сарказм «какое счастье»"},{"word":"it's only been a day","definition":"used to remind someone that very little time has passed — be patient","russian":"прошёл всего один день","example":"\"Why hasn't he replied?\" \"Relax — it's only been a day.\"«Почему он не ответил?» «Успокойся — прошёл всего день.»"},{"word":"in jail","definition":"imprisoned; being held in a jail or prison","russian":"в тюрьме / за решёткой","example":"He spent three years in jail for fraud.Он провёл три года в тюрьме за мошенничество.💡 jail = короткое заключение / следственный изолятор; prison = для более длительных сроков"},{"word":"heritage","definition":"traditions, history, and culture passed down through generations; also: ethnic background","russian":"наследие, культурное достояние; происхождение","example":"The city takes great pride in its architectural heritage.Город очень гордится своим архитектурным наследием."},{"word":"blubber","definition":"to cry loudly and messily (informal); as a noun: thick fat layer under whale skin","russian":"реветь, рыдать навзрыд (разг.) / китовый жир, подкожный жир","example":"He was blubbering so hard I could barely understand him.Он рыдал так громко, что я еле его понимал."},{"word":"go away","definition":"to leave; to disappear; also used to tell someone to leave you alone","russian":"уйти, убраться; исчезнуть","example":"\"Go away — I need some time alone.\"«Уйди — мне нужно побыть одному.»"},{"word":"confront","definition":"to face someone or something difficult directly; to challenge someone about their behaviour","russian":"противостоять; напрямую столкнуться с кем-то/чем-то; поставить перед фактом","example":"She finally confronted him about the lies.Она наконец поставила его перед фактом о лжи.We must confront our fears to overcome them.Мы должны смотреть своим страхам в лицо, чтобы их преодолеть."},{"word":"prosperity","definition":"the state of being successful and wealthy; flourishing conditions","russian":"процветание, благополучие","example":"The region enjoyed decades of peace and prosperity.Регион наслаждался десятилетиями мира и процветания."},{"word":"various","definition":"of different kinds; several and diverse","russian":"различные, разнообразные, разные","example":"The menu offers various options for vegetarians.В меню предлагается множество вариантов для вегетарианцев."},{"word":"shuffle on","definition":"to keep moving slowly and wearily, usually shuffling your feet","russian":"шаркая, двигаться дальше; продолжать идти вперёд (медленно)","example":"The tired crowd shuffled on through the long corridor.Усталая толпа шаркающей походкой двигалась по длинному коридору."},{"word":"brainwashed","definition":"having been manipulated into believing something through repeated pressure or propaganda","russian":"промытый мозг; тот, кого убедили принять идеи без критического мышления","example":"He was so brainwashed by the cult that he cut off his family.Ему так промыли мозги в секте, что он порвал с семьёй."},{"word":"custody","definition":"legal guardianship of a child; or being held by police/authorities","russian":"опека (над ребёнком) / стражение, арест (юрид.)","example":"After the divorce, she was awarded full custody of the children.После развода ей присудили полную опеку над детьми.The suspect is currently in police custody.Подозреваемый в настоящее время находится под стражей."},{"word":"look inward","definition":"to examine your own thoughts, feelings, and motivations honestly","russian":"заглянуть внутрь себя, обратиться к саморефлексии","example":"Instead of blaming others, try to look inward and see your own role.Вместо того чтобы винить других, попробуй заглянуть в себя и увидеть свою роль."},{"word":"frustrating","definition":"causing annoyance or disappointment because things don't go as hoped","russian":"раздражающий, выводящий из себя","example":"It's frustrating when nobody listens to your ideas.Раздражает, когда никто не слушает твои идеи."},{"word":"consolidate","definition":"to combine several things into one stronger whole; to make more secure","russian":"укреплять, объединять, консолидировать","example":"The company consolidated its offices into one building.Компания объединила свои офисы в одном здании."},{"word":"contingent","definition":"dependent on something uncertain; a group representing a larger body","russian":"зависящий от чего-то; условный; группа (сущ.)","example":"The plan is contingent on the weather.План зависит от погоды."},{"word":"frustrating","definition":"causing annoyance or disappointment","russian":"раздражающий, выводящий из себя","example":"It's frustrating when nobody listens to your ideas.\nРаздражает, когда никто не слушает твои идеи."},{"word":"consolidate","definition":"to combine into one stronger whole; to make more secure","russian":"укреплять, объединять, консолидировать","example":"The company consolidated its offices into one building.\nКомпания объединила свои офисы в одном здании."},{"word":"contingent","definition":"dependent on something uncertain; a representative group","russian":"зависящий от чего-то; условный","example":"The plan is contingent on the weather.\nПлан зависит от погоды."},{"word":"embark","definition":"to board a ship; to begin a new project or journey","russian":"отправляться; приступать к чему-то новому","example":"They embarked on a two-year research project.\nОни приступили к двухлетнему исследовательскому проекту."},{"word":"melodious","definition":"having a pleasant, tuneful sound","russian":"мелодичный, приятный на слух","example":"Her melodious voice filled the whole room.\nЕё мелодичный голос заполнил всю комнату."},{"word":"first and foremost","definition":"most importantly; above everything else","russian":"прежде всего, в первую очередь","example":"First and foremost, we need to ensure everyone's safety.\nПрежде всего нам нужно обеспечить безопасность всех."},{"word":"indulge","definition":"to allow yourself to enjoy something pleasurable","russian":"потакать себе; баловать; позволять себе что-то","example":"She indulged in a long bath after a hard week.\nПосле тяжёлой недели она позволила себе долгую ванну."},{"word":"dive into","definition":"to start doing something enthusiastically without hesitation","russian":"с головой погрузиться во что-то, взяться за дело","example":"Let's dive into the data and see what we find.\nДавайте погрузимся в данные и посмотрим, что найдём."},{"word":"invigorating","definition":"making you feel fresh, energetic, and alive","russian":"бодрящий, придающий сил и энергии","example":"An invigorating morning run set the tone for the day.\nБодрящая утренняя пробежка задала тон всему дню."},{"word":"freshen up а","definition":"to wash and tidy yourself; to make something neater","russian":"привести себя в порядок, освежиться","example":"I need five minutes to freshen up before the meeting.\nМне нужно пять минут привести себя в порядок перед встречей."},{"word":"pamper","definition":"to treat someone with a lot of care and attention","russian":"баловать, холить и лелеять","example":"She spent the weekend pampering herself at the spa.\nОна провела выходные, балуя себя в спа."},{"word":"nourishing","definition":"providing the body with what it needs to be healthy","russian":"питательный, полезный (о еде)","example":"A warm nourishing soup is perfect after a long hike.\nТёплый питательный суп — то что надо после долгого похода."},{"word":"attire","definition":"clothing, especially formal or elegant dress","russian":"наряд, одежда (официально)","example":"Guests are expected to wear formal attire.\nГостям рекомендуется прийти в официальной одежде."},{"word":"wolf down","definition":"to eat something very quickly and greedily","russian":"есть жадно, проглотить не жуя","example":"He wolfed down his lunch in three minutes flat.\nОн проглотил обед за три минуты."},{"word":"immerse","definition":"to put in liquid; to involve yourself deeply in an activity","russian":"погружать(ся); полностью уходить во что-то","example":"She immersed herself in the local culture during her trip.\nВо время поездки она полностью погрузилась в местную культуру."},{"word":"prose","definition":"written language in its ordinary form, not poetry","russian":"проза (в отличие от поэзии)","example":"His prose is clear and elegant — a pleasure to read.\nЕго проза ясна и изящна — читать одно удовольствие."},{"word":"tackle","definition":"to deal with a difficult problem or task","russian":"браться за что-то сложное; решать проблему","example":"We need to tackle this issue before it gets worse.\nНужно разобраться с этой проблемой, пока она не усугубилась."},{"word":"no sooner","definition":"used to say one thing happened immediately after another","russian":"едва… как; не успел… как","example":"No sooner had I sat down than the phone rang.\nЕдва я сел, как зазвонил телефон."},{"word":"meticulously","definition":"in a very careful and precise way, paying attention to every detail","russian":"тщательно, скрупулёзно, с вниманием к деталям","example":"She meticulously checked every line of the contract.\nОна скрупулёзно проверила каждую строчку контракта."},{"word":"sneaking (suspicion)","definition":"a quiet feeling you have but aren't sure about","russian":"смутный, тайный (о подозрении, чувстве)","example":"I have a sneaking suspicion he already knows.\nУ меня смутное подозрение, что он уже знает."},{"word":"burden","definition":"a heavy load; a responsibility that is difficult to bear","russian":"бремя, груз, тяжесть","example":"She felt like a burden to her family during her illness.\nВо время болезни она чувствовала себя обузой для семьи."},{"word":"buoyant","definition":"able to float; cheerful and full of energy","russian":"держащийся на воде; жизнерадостный, оптимистичный","example":"Despite the setback, she remained buoyant and optimistic.\nНесмотря на неудачу, она оставалась жизнерадостной и оптимистичной."},{"word":"follow your passion","definition":"to pursue what you genuinely love doing","russian":"следовать своей страсти / призванию","example":"He left his corporate job to follow his passion for music.\nОн бросил корпоративную работу, чтобы следовать своей страсти к музыке."},{"word":"swirl","definition":"to move in a spinning or twisting pattern","russian":"кружиться, виться, клубиться","example":"Leaves swirled in the wind around the old house.\nЛистья кружились на ветру вокруг старого дома."},{"word":"reunion","definition":"a meeting of people who have been apart for a long time","russian":"воссоединение, встреча после разлуки","example":"The family reunion brought tears to everyone's eyes.\nСемейное воссоединение вызвало слёзы на глазах у всех."},{"word":"surrender yourself","definition":"to give yourself over fully to a feeling or experience","russian":"отдаться чему-то полностью, довериться","example":"Just surrender yourself to the music and enjoy the moment.\nПросто отдайся музыке и наслаждайся моментом."},{"word":"take charge","definition":"to assume control or responsibility for something","russian":"взять дело в свои руки, возглавить","example":"When the manager left, she stepped up and took charge.\nКогда менеджер ушёл, она взяла дело в свои руки."},{"word":"none taken","definition":"a reply to 'no offence' — meaning you didn't take it personally","russian":"не обиделся (ответ на «no offence»)","example":"\"No offence, but that was a bad idea.\" \"None taken.\"\n«Не в обиду, но идея была плохой.» «Не обиделся.»"},{"word":"flatter yourself","definition":"to think too highly of yourself or your own appeal","russian":"льстить себе, воображать о себе лишнее","example":"\"She was definitely flirting with me.\" \"Don't flatter yourself.\"\n«Она точно флиртовала со мной.» «Не льсти себе.»"},{"word":"redeem yourself","definition":"to do something good that makes up for a past mistake","russian":"реабилитировать себя, исправиться после ошибки","example":"He had one chance to redeem himself after the disaster.\nУ него был один шанс реабилитировать себя после провала."},{"word":"diligent","definition":"working carefully and with great effort","russian":"прилежный, усердный, старательный","example":"She was diligent in her studies and never missed a deadline.Она была прилежной в учёбе и никогда не пропускала дедлайны."},{"word":"buried in ash","definition":"covered completely by ash, often from a volcanic eruption or fire","russian":"погребённый под пеплом","example":"The ancient city was buried in ash after the eruption.\nДревний город был погребён под пеплом после извержения."},{"word":"stop on","definition":"to pause at a point; or to stay longer (British)","russian":"остановиться на чём-то; держаться","example":"Let's stop on this slide for a moment — it's important.\nДавайте остановимся на этом слайде — это важно."},{"word":"persistent","definition":"continuing firmly despite difficulty; refusing to give up","russian":"настойчивый, упорный; не прекращающийся","example":"Her persistent efforts finally paid off.\nЕё настойчивые усилия наконец окупились."},{"word":"lighten up","definition":"to become less serious or tense; stop worrying so much","russian":"расслабься, не бери так близко к сердцу","example":"Come on, lighten up — it was just a joke.\nНу же, расслабься — это была просто шутка."},{"word":"unprecedented","definition":"never having happened or existed before","russian":"беспрецедентный, не имеющий примеров в прошлом","example":"The pandemic caused unprecedented disruption to global travel.\nПандемия вызвала беспрецедентные нарушения в мировых поездках."},{"word":"occupy","definition":"to fill a space or position; to take control of a place by force","russian":"занимать (место, должность, территорию); оккупировать","example":"Enemy forces occupied the city for three years.\nВражеские войска занимали город три года."},{"word":"permanent","definition":"lasting or intended to last forever; not temporary","russian":"постоянный, навсегда, бессрочный","example":"The injury left a permanent scar on his knee.\nТравма оставила постоянный шрам на его колене."},{"word":"legacy","definition":"something handed down from the past; a long-lasting impact","russian":"наследие, наследство; то, что оставляют после себя","example":"Her greatest legacy was the school she founded.\nЕё величайшим наследием стала основанная ею школа."},{"word":"cleanse","definition":"to make thoroughly clean; to purify physically, morally, or spiritually","russian":"очищать, очистить (душу, тело, место)","example":"The rain seemed to cleanse the air after weeks of heat.\nДождь словно очистил воздух после недель жары."},{"word":"forethought","definition":"careful thought and planning done in advance","russian":"предусмотрительность, заблаговременное обдумывание","example":"With a little forethought, we could have avoided the whole mess.\nНемного предусмотрительности — и мы могли избежать всего этого."},{"word":"sneak attack","definition":"a surprise attack made without warning","russian":"внезапная атака, удар исподтишка","example":"The enemy launched a sneak attack at dawn.\nПротивник нанёс внезапную атаку на рассвете."},{"word":"mud pie","definition":"a ball or shape made of mud by children; also a rich chocolate dessert","russian":"куличик из грязи (детская игра); шоколадный пирог (десерт)","example":"The kids spent hours making mud pies in the garden.\nДети часами лепили куличики из грязи в саду."},{"word":"third wheel","definition":"a person who is unwanted or unnecessary in a group of two","russian":"третий лишний","example":"I felt like a total third wheel on their date.\nЯ чувствовал себя полным третьим лишним на их свидании."},{"word":"be off","definition":"to leave; for food to have gone bad; for a device to be switched off","russian":"уходить, отправляться; быть испорченным (о еде); быть выключенным","example":"I'm off — see you tomorrow!\nЯ ухожу — увидимся завтра!"},{"word":"make nice","definition":"to behave in a friendly way, often when you don't really feel it","russian":"притворяться дружелюбным, изображать мир","example":"Just make nice with his parents for one evening — you can do it.\nПросто побудь дружелюбным с его родителями один вечер — ты справишься."},{"word":"straighten up","definition":"to stand up straight; to tidy a place; to improve your behaviour","russian":"выпрямляться; навести порядок; взяться за ум","example":"Straighten up — the principal is coming.\nВыпрямись — директор идёт."},{"word":"sealed","definition":"closed tightly so nothing can get in or out; fate decided","russian":"запечатанный, герметичный; решённый (о судьбе)","example":"The deal is sealed — we sign tomorrow.\nСделка заключена — завтра подписываем."},{"word":"pull a scam","definition":"to carry out a dishonest scheme to trick someone out of money","russian":"провернуть мошенничество, развести на деньги","example":"He pulled a scam on tourists near the station.\nОн разводил туристов у вокзала."},{"word":"stinky","definition":"having a bad or unpleasant smell","russian":"вонючий, дурно пахнущий","example":"Those stinky socks need to go in the wash right now.\nЭти вонючие носки прямо сейчас нужно отправить в стирку."},{"word":"combustion","definition":"the process of burning; a chemical reaction producing heat and light","russian":"горение, сгорание; воспламенение","example":"The engine works by internal combustion.\nДвигатель работает за счёт внутреннего сгорания."},{"word":"push","definition":"to motivate or force someone to do something; to advocate for something","russian":"подталкивать, заставлять; настаивать, продвигать идею","example":"Her coach pushed her to train harder every day.\nЕё тренер подталкивал её тренироваться усерднее каждый день."},{"word":"habitable","definition":"suitable for people or animals to live in","russian":"пригодный для жизни, обитаемый","example":"Scientists are searching for habitable planets beyond our solar system.\nУчёные ищут пригодные для жизни планеты за пределами нашей солнечной системы."},{"word":"habitat","definition":"the natural environment where an animal or plant normally lives","russian":"среда обитания, естественная среда","example":"Deforestation is destroying the habitat of thousands of species.\nВырубка лесов уничтожает среду обитания тысяч видов."},{"word":"rule out","definition":"to decide that something is not possible or worth considering","russian":"исключать (вариант, возможность), отметать","example":"Doctors ruled out a serious illness after the tests came back clear.\nПосле чистых результатов анализов врачи исключили серьёзное заболевание."},{"word":"torchlight","definition":"the light produced by a torch or flashlight","russian":"свет факела; свет фонарика (брит.)","example":"They made their way through the cave by torchlight.\nОни пробирались через пещеру при свете факела."},{"word":"inn","definition":"a small hotel or pub, especially in the countryside; historically a place for travellers","russian":"постоялый двор, таверна, небольшая гостиница","example":"They stopped at a cosy inn on the edge of the village.\nОни остановились в уютной таверне на краю деревни."},{"word":"turn out","definition":"to happen to be; to end up being; to come or attend","russian":"оказываться, выясняться; получиться; прийти (о людях)","example":"It turned out she already knew the answer.\nОказалось, что она уже знала ответ."},{"word":"swimmingly","definition":"smoothly and without any problems","russian":"гладко, как по маслу, без сучка без задоринки","example":"The interview went swimmingly — I got the job on the spot.\nСобеседование прошло как по маслу — меня взяли на месте."},{"word":"at heart","definition":"used to describe what someone is really like deep down","russian":"в душе, по натуре, в глубине души","example":"He seems tough, but he's a romantic at heart.\nОн кажется жёстким, но в душе он романтик."},{"word":"embrace","definition":"to hug someone; to accept something willingly and enthusiastically","russian":"обнимать; принять, открыться чему-то; объятие","example":"He embraced the challenge instead of running from it.\nОн принял вызов вместо того, чтобы бежать от него."},{"word":"fatigue","definition":"extreme tiredness, especially after effort or stress","russian":"усталость, изнеможение","example":"After three days without sleep, the fatigue was overwhelming.\nПосле трёх дней без сна усталость была подавляющей."},{"word":"affection","definition":"a gentle feeling of fondness or liking toward someone","russian":"привязанность, нежность, тёплые чувства","example":"She showed great affection for her students.\nОна проявляла большую привязанность к своим ученикам."},{"word":"ferocious","definition":"savagely fierce and violent; extremely intense","russian":"свирепый, лютый, неистовый","example":"The ferocious storm destroyed dozens of homes overnight.\nСвирепый шторм разрушил десятки домов за ночь."},{"word":"endow","definition":"to give someone a quality naturally; to provide money to an institution","russian":"наделять (качеством, способностью); жертвовать (деньги)","example":"She was endowed with extraordinary musical talent.\nОна была наделена необычайным музыкальным талантом."},{"word":"shore","definition":"the land along the edge of a sea, lake, or wide river","russian":"берег (моря, озера, реки); побережье","example":"They walked along the shore as the sun went down.\nОни шли вдоль берега на закате солнца."},{"word":"reconquer","definition":"to conquer again; to take back territory or something that was lost","russian":"отвоевать обратно, возвратить силой","example":"The army fought to reconquer the lost territories.\nАрмия сражалась, чтобы отвоевать утраченные территории."},{"word":"take one's time","definition":"to do something slowly and without rushing","russian":"не торопиться, делать в своём темпе","example":"Take your time — there's no rush at all.\nНе торопись — никакой спешки нет."},{"word":"come on out","definition":"an invitation or command to come outside or emerge from somewhere","russian":"выходи давай, вылезай, выбирайся","example":"\"Come on out — we know you're in there!\"\n«Выходи давай — мы знаем, что ты там!»"},{"word":"aye aye","definition":"a naval/military reply meaning 'yes, I understand and will comply'","russian":"есть! слушаюсь! (морское / военное согласие)","example":"\"Get this ship moving!\" \"Aye aye, Captain!\"\n«Отплываем!» «Есть, капитан!»"},{"word":"bend / bent / unbendable","definition":"to bend (verb); bent or curved (adj); refusing to change position (unbendable)","russian":"гнуть, сгибать; согнутый, кривой; несгибаемый, непреклонный","example":"Her will was unbendable — nobody could change her mind.\nЕё воля была несгибаемой — никто не мог изменить её мнение."},{"word":"butt-whooped","definition":"informal: thoroughly beaten or defeated","russian":"получить по заслугам, огрести, быть разгромленным","example":"We got completely butt-whooped in that match — 0 to 5.\nНас полностью разгромили в том матче — 0:5."},{"word":"trim down","definition":"to reduce body weight; to reduce the size or amount of something","russian":"похудеть; урезать, сократить (бюджет, текст)","example":"He trimmed down by cutting out sugar and walking every day.\nОн похудел, отказавшись от сахара и гуляя каждый день."},{"word":"decrement","definition":"to reduce by a set amount, especially by 1 in programming","russian":"уменьшать, убывать; декремент","example":"Decrement the counter each time the button is pressed.\nУменьшай счётчик каждый раз при нажатии кнопки."},{"word":"succinct","definition":"expressed clearly and briefly, without unnecessary words","russian":"краткий, лаконичный, ёмкий","example":"Her answer was succinct — one sentence, perfectly clear.\nЕё ответ был лаконичным — одно предложение, абсолютно ясное."},{"word":"convention","definition":"an accepted way of doing things; a large meeting; an agreement between countries","russian":"конвенция, соглашение; съезд; традиция, устоявшаяся норма","example":"By convention, the chairman speaks first.\nПо традиции первым выступает председатель."},{"word":"deliberate","definition":"done on purpose; slow and careful in manner","russian":"намеренный, умышленный; неторопливый","example":"It was a deliberate attempt to mislead the public.\nЭто была намеренная попытка ввести общественность в заблуждение."},{"word":"forth","definition":"forward in time, place, or order — used in fixed expressions","russian":"вперёд, далее (вперёд во времени или пространстве)","example":"And so forth — you get the idea.\nИ так далее — суть понятна."},{"word":"specify","definition":"to state something exactly and clearly","russian":"указывать точно, уточнять, конкретизировать","example":"Please specify which size you'd like to order.\nПожалуйста, укажите, какой размер хотите заказать."},{"word":"nitpicky","definition":"excessively focused on small, unimportant details","russian":"придирчивый, мелочный, цепляющийся к деталям","example":"My editor is so nitpicky — she corrected every comma.\nМой редактор такой придирчивый — исправил каждую запятую."},{"word":"weld","definition":"to join metal pieces together using heat; to unite firmly","russian":"сваривать (металл); прочно соединять","example":"The pipes were welded together on site.\nТрубы были сварены прямо на месте."},{"word":"chilly","definition":"unpleasantly cold, but not freezing","russian":"прохладно, свежо (неприятно холодно)","example":"It's a bit chilly today — take a jacket.\nСегодня немного прохладно — возьми куртку."},{"word":"crisp","definition":"pleasantly cold and fresh (weather); firm and crunchy (food)","russian":"свежий, бодрящий (о воздухе); хрустящий","example":"A crisp autumn morning — perfect for a walk.\nСвежее осеннее утро — идеально для прогулки."},{"word":"sleet","definition":"a mix of rain and snow falling together","russian":"мокрый снег, дождь со снегом","example":"The sleet made the roads dangerously slippery.\nМокрый снег сделал дороги опасно скользкими."},{"word":"drizzle","definition":"light, fine rain falling in very small drops","russian":"морось, мелкий дождик","example":"Just a light drizzle — you won't even need an umbrella.\nПросто лёгкая морось — зонт даже не понадобится."},{"word":"shower","definition":"a brief period of rain; heavier than drizzle but shorter than steady rain","russian":"кратковременный дождь, ливень","example":"There'll be scattered showers in the afternoon.\nВо второй половине дня ожидаются кратковременные дожди."},{"word":"overcast","definition":"c
