<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avatar: The Last Airbender — Vocabulary Deck</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #0a1628;
    --sky2: #0d1f3c;
    --air: #e8f4f8;
    --fire: #e85d26;
    --fire2: #f59e3f;
    --earth: #4a7c3f;
    --water: #2d7bbd;
    --gold: #c9a84c;
    --gold2: #f0d080;
    --text: #e8dcc8;
    --text-dim: #9a8e7a;
    --border: rgba(201,168,76,0.2);
    --card-bg: rgba(255,255,255,0.03);
    --card-hover: rgba(201,168,76,0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--sky);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(45,123,189,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(232,93,38,0.08) 0%, transparent 50%),
      radial-gradient(ellipse 100% 80% at 50% 50%, rgba(10,22,40,0) 0%, #060e1a 100%);
    pointer-events: none;
    z-index: 0;
  }

  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--dur, 3s) ease-in-out infinite var(--delay, 0s);
  }
  @keyframes twinkle {
    0%,100%{opacity:var(--min,0.1);}
    50%{opacity:var(--max,0.7);}
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 52px 24px 36px;
    border-bottom: 1px solid var(--border);
  }

  .deck-badge {
    display: inline-block;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 16px;
    opacity: 0.8;
  }

  header h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(22px, 5vw, 42px);
    font-weight: 700;
    color: var(--gold2);
    letter-spacing: 2px;
    line-height: 1.2;
    text-shadow: 0 0 40px rgba(201,168,76,0.4), 0 2px 4px rgba(0,0,0,0.8);
    margin-bottom: 8px;
  }

  header p {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 16px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  /* Four nations ornament */
  .ornament {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 20px 0 0;
  }
  .nation-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    opacity: 0.7;
  }
  .nd-air  { background: var(--air);   box-shadow: 0 0 8px var(--air); }
  .nd-fire { background: var(--fire);  box-shadow: 0 0 8px var(--fire); }
  .nd-earth{ background: var(--earth); box-shadow: 0 0 8px var(--earth);}
  .nd-water{ background: var(--water); box-shadow: 0 0 8px var(--water);}

  /* Search bar */
  .search-wrap {
    position: sticky;
    top: 0;
    z-index: 20;
    padding: 16px 20px;
    background: rgba(6,14,26,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .search-inner {
    max-width: 720px;
    margin: 0 auto;
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    color: var(--gold);
    opacity: 0.6;
    pointer-events: none;
  }

  #q {
    width: 100%;
    padding: 12px 16px 12px 42px;
    background: rgba(201,168,76,0.06);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 3px;
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    font-size: 17px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  #q:focus {
    border-color: rgba(201,168,76,0.55);
    background: rgba(201,168,76,0.09);
  }
  #q::placeholder { color: var(--text-dim); font-style: italic; }

  .search-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    max-width: 720px;
    margin-left: auto;
    margin-right: auto;
  }

  /* Cards list */
  .cards-wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 8px 20px 60px;
    position: relative;
    z-index: 10;
  }

  .entry {
    border-bottom: 1px solid var(--border);
    padding: 16px 4px;
    transition: background 0.15s;
    animation: fadeIn 0.3s ease both;
    cursor: default;
  }
  .entry:hover {
    background: var(--card-hover);
    border-radius: 4px;
    padding-left: 12px;
    padding-right: 12px;
    margin: 0 -8px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .entry-top {
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 4px;
  }

  .headword {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--gold2);
    letter-spacing: 0.5px;
  }

  .meaning {
    font-size: 13px;
    font-style: italic;
    color: var(--text-dim);
    flex: 1;
  }

  .ru {
    font-size: 15px;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.5;
  }

  .ex {
    border-left: 2px solid rgba(201,168,76,0.3);
    padding-left: 12px;
    margin-top: 6px;
  }
  .ex-en {
    font-size: 13px;
    font-style: italic;
    color: rgba(232,220,200,0.75);
    line-height: 1.5;
  }
  .ex-ru {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
    line-height: 1.4;
  }

  /* No results */
  .empty {
    text-align: center;
    padding: 60px 20px;
    font-style: italic;
    color: var(--text-dim);
    font-size: 18px;
  }
  .empty span { display: block; font-size: 32px; margin-bottom: 12px; }

  /* Highlight match */
  mark {
    background: rgba(201,168,76,0.3);
    color: var(--gold2);
    border-radius: 2px;
    padding: 0 1px;
  }

  /* Footer */
  footer {
    text-align: center;
    padding: 24px;
    font-size: 12px;
    color: rgba(154,142,122,0.4);
    letter-spacing: 1px;
    font-family: 'Cinzel', serif;
    position: relative;
    z-index: 10;
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<header>
  <div class="deck-badge">Vocabulary Deck</div>
  <h1>Avatar: The Last Airbender</h1>
  <p>423 words &amp; expressions from the series</p>
  <div class="ornament">
    <div class="nation-dot nd-air"></div>
    <div class="nation-dot nd-fire"></div>
    <div class="nation-dot nd-earth"></div>
    <div class="nation-dot nd-water"></div>
  </div>
</header>

<div class="search-wrap">
  <div class="search-inner">
    <span class="search-icon">⟡</span>
    <input type="text" id="q" placeholder="Search in English or Russian…" oninput="filter()" autocomplete="off" spellcheck="false">
  </div>
  <div class="search-meta">
    <span id="cnt"></span>
    <span>EN · RU · meaning</span>
  </div>
</div>

<div class="cards-wrap">
  <div id="list"></div>
</div>

<footer>✦ &nbsp; The four nations lived in harmony &nbsp; ✦</footer>

<script>
// Generate stars
(function(){
  var s=document.getElementById('stars');
  for(var i=0;i<120;i++){
    var d=document.createElement('div');
    d.className='star';
    var sz=Math.random()<0.7?1:Math.random()<0.5?1.5:2;
    d.style.cssText='width:'+sz+'px;height:'+sz+'px;top:'+Math.random()*100+'%;left:'+Math.random()*100+'%;'
      +'--dur:'+(2+Math.random()*4)+'s;--delay:'+(Math.random()*5)+'s;'
      +'--min:'+(0.05+Math.random()*0.1)+';--max:'+(0.3+Math.random()*0.6)+';';
    s.appendChild(d);
  }
})();

{en:"study closely",meaning:"examine carefully",ru:"тщательно изучать",ex_en:"B2: Study it closely. — Изучи это внимательно.",ex_ru:"B2+: Scientists studied the phenomenon closely to understand its underlying causes. — Учёные тщательно изучили явление."},
{en:"stow away",meaning:"hide on a vehicle to travel secretly",ru:"пробраться тайком (на корабль/самолёт)",ex_en:"B2: He stowed away on a ship. — Он тайком пробрался на корабль.",ex_ru:"B2+: The boy stowed away on a cargo ship hoping to start a new life in another country. — Мальчик тайком пробрался на грузовое судно."},
{en:"peasant",meaning:"poor farmer (historical)",ru:"крестьянин",ex_en:"B1: He was a peasant. — Он был крестьянином.",ex_ru:"B2: The story describes the life of peasants in medieval times. — История описывает жизнь крестьян в средневековье."},
{en:"confused",meaning:"not understanding",ru:"запутанный / в замешательстве",ex_en:"B1: I am confused. — Я запутался.",ex_ru:"B2: He looked confused after hearing the complicated explanation. — Он выглядел растерянным после сложного объяснения."},
{en:"want someone to do something",meaning:"to desire that another person performs an action",ru:"хотеть, чтобы кто-то что-то сделал",ex_en:"B2: I want you to finish the report. — Я хочу, чтобы ты закончил отчет.",ex_ru:"C1: Although they were tired, the manager wanted them to complete the project by midnight to meet the strict deadline.Несмотря на усталость, менеджер хотел, чтобы они завершили проект к полуночи, чтобы уложиться в строгий дедлайн."},
{en:"in order to / so that",meaning:"showing the purpose or reason for an action",ru:"для того чтобы / так чтобы",ex_en:"B2: Use a map so that you don't get lost. — Используй карту, чтобы не заблудиться.",ex_ru:"C1: He deliberately arrived early in order to prepare the hall so that the presentation would run successfully without any technical issues.Он намеренно пришел пораньше, чтобы подготовить зал, дабы презентация прошла успешно и без технических сбоев."},
{en:"make someone do / be made to do",meaning:"to force someone to act / to be forced to act",ru:"заставлять / быть вынужденным",ex_en:"B2: My boss made me work late. — Босс заставил меня работать допоздна.",ex_ru:"C1: While parents often make their children do chores, the students were made to redo the entire assignment because it was done ineffectively.В то время как родители часто заставляют детей делать работу по дому, студентов заставили переделать все задание, так как оно было выполнено неэффективно."},
{en:"have something done",meaning:"to arrange for someone else to do something for you",ru:"когда что-то делают за/для тебя (услуга)",ex_en:"B2: I need to have my car repaired. — Мне нужно отремонтировать машину (в сервисе).",ex_ru:"C1: To ensure the house is stable, they decided to have the foundation checked by a professional before the weather becomes unstable.Чтобы убедиться в устойчивости дома, они решили проверить фундамент у профессионала, прежде чем погода станет нестабильной."},
{en:"used to do / get used to (accustomed to)",meaning:"past habit / the process of becoming familiar with something",ru:"раньше делал / привыкать",ex_en:"B2: I used to drink coffee, but now I'm getting used to tea. — Раньше я пил кофе, но сейчас привыкаю к чаю.",ex_ru:"C1: She used to live in a quiet village, so she is still getting accustomed to the highly noisy and currently overcrowded city life.Раньше она жила в тихой деревушке, поэтому до сих пор привыкает к очень шумной и в настоящее время переполненной городской жизни."},
{en:"would prefer to / would sooner / would rather / had better",meaning:"expressing preferences or giving strong advice",ru:"предпочтения и советы",ex_en:"B2: I’d rather stay home. You’d better go now. — Я бы лучше остался дома. Тебе бы лучше идти сейчас.",ex_ru:"C1: I would sooner quit than work under such pressure; frankly, you had better talk to the director before the situation gets worse.Я бы скорее уволился, чем работал под таким давлением; честно говоря, вам бы лучше поговорить с директором, пока ситуация не ухудшилась."},
{en:"deliberately / on purpose",meaning:"intentionally, not by accident",ru:"намеренно / специально",ex_en:"B2: Did you do that on purpose? — Ты сделал это специально?",ex_ru:"C1: It doesn't mean that he failed by mistake; he deliberately ignored the instructions on purpose to see what would happen.Это не значит, что он ошибся случайно; он намеренно проигнорировал инструкции специально, чтобы посмотреть, что произойдет"},
{en:"mostly / mainly because of",meaning:"for the most part; primarily due to",ru:"в основном / главным образом из-за",ex_en:"B2: I'm late mostly because of the traffic. — Я опоздал в основном из-за пробок.",ex_ru:"C1: The project was mainly successful because of the team's ability to stay calm, even though the system was temporarily unstable.Проект был в основном успешным благодаря способности команды сохранять спокойствие, даже когда система была временно нестабильна."},
{en:"highly appreciate / significantly",meaning:"to value something very much / in a sufficiently great way",ru:"высоко ценить / значительно",ex_en:"B2: I highly appreciate your help. — Я высоко ценю вашу помощь.",ex_ru:"C1: The company's profits increased significantly, and the board members highly appreciate the effort you put into the marketing campaign.Прибыль компании значительно выросла, и члены правления высоко ценят усилия, которые вы вложили в маркетинговую кампанию."},
{en:"frankly / to be frank / naturally",meaning:"used to express honesty / as expected",ru:"честно говоря / естественно",ex_en:"B2: Frankly, I don't care. — Честно говоря, мне все равно.",ex_ru:"C1: To be frank, the task was relatively easy, but naturally, some employees struggled because the software was currently unavailable.Честно говоря, задача была относительно легкой, но, естественно, некоторые сотрудники столкнулись с трудностями, так как ПО было временно недоступно."},
{en:"no doubt / undoubtedly / nevertheless",meaning:"certainly / however; despite that",ru:"без сомнения / тем не менее",ex_en:"B2: No doubt he is right. — Без сомнения, он прав.",ex_ru:"C1: There is no doubt that the situation is difficult; nevertheless, we must complete the work perfectly to maintain our reputation.Нет сомнений в том, что ситуация сложная; тем не менее, мы должны выполнить работу идеально, чтобы сохранить свою репутацию."},
{en:"be allowed to do / let someone do",meaning:"to have permission to do something",ru:"иметь разрешение / позволять",ex_en:"B2: You are not allowed to smoke here. — Здесь нельзя курить.",ex_ru:"C1: Although they were allowed to use the library, the librarian made them keep quiet so that others could focus on their work.Хотя им разрешили пользоваться библиотекой, библиотекарь заставил их соблюдать тишину, чтобы остальные могли сосредоточиться на работе"},
{en:"mostly / especially / particularly",meaning:"mainly or to a great extent; more than usual",ru:"в основном / особенно",ex_en:"B2: I like fruit, especially apples. — Я люблю фрукты, особенно яблоки.",ex_ru:"C1: The results were mostly positive, especially considering that the team had to work under such hard conditions with relatively little support.Результаты были в основном положительными, особенно если учесть, что команде пришлось работать в таких тяжелых условиях при сравнительно небольшой поддержке."},
{en:"hard / hardly",meaning:"with a lot of effort / almost not at all",ru:"усердно / едва ли (совсем нет)",ex_en:"B2: He works hard. I can hardly hear you. — Он много работает. Я тебя почти не слышу.",ex_ru:"C1: She worked hard all night, but she had hardly finished the first chapter when the power went out, making it ineffective to continue.Она усердно работала всю ночь, но едва закончила первую главу, как отключили свет, из-за чего продолжать было бессмысленно (неэффективно)."},
{en:"actually / it doesn't mean that",meaning:"in fact / used to clarify that a conclusion might be wrong",ru:"на самом деле / это не значит, что",ex_en:"B2: Actually, I'm busy. — Вообще-то я занят.",ex_ru:"C1: Actually, the data is relatively accurate; it doesn't mean that we can stop checking, but it is undoubtedly a good start.На самом деле данные относительно точны; это не значит, что мы можем прекратить проверку, но это, несомненно, хорошее начало."},
{en:"currently / unavailable",meaning:"at the present time / not possible to get or use",ru:"в настоящее время / недоступен",ex_en:"B2: This service is currently unavailable. — Эта услуга сейчас недоступна.",ex_ru:"C1: To be short, the system is currently unavailable due to maintenance, which is highly frustrating for those who need it urgently.Короче говоря, система в данный момент недоступна из-за техобслуживания, что крайне досадно для тех, кому она нужна срочно."},
{en:"thanks to / hopefully",meaning:"because of someone or something / used to express a wish",ru:"благодаря / надеюсь, что",ex_en:"B2: Thanks to your help, I finished. — Благодаря твоей помощи я закончил.",ex_ru:"C1: Thanks to the significant investment, we will hopefully be able to stabilize the market by the end of the year.Благодаря значительным инвестициям, мы, надеюсь, сможем стабилизировать рынок к концу года."},
{en:"shortly / to be short",meaning:"in a short time / briefly",ru:"вскоре / короче говоря",ex_en:"B2: The train will arrive shortly. — Поезд прибудет в ближайшее время.",ex_ru:"C1: To be short, the manager will contact you shortly regarding the partly finished project.Короче говоря, менеджер вскоре свяжется с вами по поводу частично завершенного проекта."},
{en:"slightly / partly / finally",meaning:"a little bit / not completely / after a long time",ru:"слегка / частично / наконец",ex_en:"B2: The price is slightly higher. — Цена немного выше.",ex_ru:"C1: The plan was only partly successful because the budget was slightly underestimated; however, we finally reached an agreement.План был успешен лишь частично, так как бюджет был слегка недооценен; тем не менее, мы наконец пришли к соглашению."},
{en:"I would sooner / I would rather (+ verb)",meaning:"to prefer one thing over another",ru:"я бы скорее / я бы лучше",ex_en:"B2: I would rather stay home than go out in the rain. — Я бы лучше остался дома, чем шел гулять под дождем.",ex_ru:"C1: To be frank, I would sooner resign than accept such unethical terms, as I highly appreciate integrity in business.Честно говоря, я бы скорее уволился, чем принял такие неэтичные условия, так как я высоко ценю честность в бизнесе."},
{en:"I had better (+ verb)",meaning:"used to give strong advice or tell someone what to do",ru:"мне бы лучше (совет/предупреждение)",ex_en:"B2: You’d better see a doctor. — Тебе бы лучше сходить к врачу.",ex_ru:"C1: We had better double-check the contract, as it contains some relatively complex clauses that could lead to unstable legal ground.Нам бы лучше перепроверить контракт, так как он содержит довольно сложные пункты, которые могут привести к нестабильной правовой позиции."},
{en:"perfectly / definitely / mostly",meaning:"in a faultless way / without doubt / for the most part",ru:"совершенно / определенно / в основном",ex_en:"B2: It is perfectly normal. — Это совершенно нормально.",ex_ru:"C1: I definitely think we should proceed, as the system is perfectly capable of handling the current load, even if it is mostly manual for now.Я определенно считаю, что нам нужно продолжать, так как система совершенно способна справиться с текущей нагрузкой, даже если сейчас она в основном ручная."},
{en:"especially / occasionally / successfully",meaning:"particularly / from time to time / in a way that achieves results",ru:"особенно / изредка / успешно",ex_en:"B2: We meet occasionally for coffee. — Мы изредка встречаемся выпить кофе.",ex_ru:"C1: The team successfully launched the app, which is especially impressive given that the main server was unavailable for half the day.Команда успешно запустила приложение, что особенно впечатляет, учитывая, что основной сервер был недоступен полдня."},
{en:"actually / it doesn't mean that",meaning:"used to correct a misconception or add detail",ru:"на самом деле / это не значит, что",ex_en:"B2: Actually, I have already seen this film. — На самом деле, я уже видел этот фильм.",ex_ru:"C1: The results were slightly lower than expected, but actually, it doesn't mean that the strategy failed; it was mainly because of external factors.Результаты были чуть ниже ожидаемых, но на самом деле это не значит, что стратегия провалилась; это произошло в основном из-за внешних факторов."},
{en:"natural(ly) / contain / relatively",meaning:"as expected / to have inside / to a certain degree",ru:"eстественно / содержать / относительно",ex_en:"B2: Naturally, he was angry. — Естественно, он был зол.",ex_ru:"C1: This product contains organic ingredients, so it is naturally more expensive, though still relatively easy to find in local shops.Этот продукт содержит органические ингредиенты, поэтому он, естественно, дороже, хотя его всё же относительно легко найти в местных магазинах."},
{en:"nearly / near / nevertheless",meaning:"almost / close to / despite what has just been said",ru:"почти / рядом / тем не менее",ex_en:"B2: It’s nearly 10 o’clock. — Уже почти 10 часов.",ex_ru:"C1: We have nearly finished the project; nevertheless, some parts remain partly incomplete, which is undoubtedly a concern for the client.Мы почти закончили проект; тем не менее, некоторые части остаются частично незавершенными, что, несомненно, беспокоит клиента."},
{en:"final(ly) / no doubt / undoubtedly",meaning:"after a long time / used to emphasize that something is true",ru:"наконец / без сомнения / несомненно",ex_en:"B2: Finally, the bus arrived. — Наконец-то приехал автобус.",ex_ru:"C1: There is no doubt that she is the best candidate; she will undoubtedly lead the company to a more stable future.Нет сомнений, что она — лучший кандидат; она, несомненно, приведет компанию к более стабильному будущему."},
{en:"delve / dive (into)",meaning:"to explore or examine deeply",ru:"углубляться, погружаться",ex_en:"She decided to delve into the topic in more detail.",ex_ru:"Она решила глубже изучить тему."},
{en:"put something to work",meaning:"to use something effectively",ru:"пустить в дело, использовать",ex_en:"He put his skills to work on the project.",ex_ru:"Он применил свои навыки в проекте."},
{en:"two-tiered",meaning:"having two levels or parts",ru:"двухуровневый",ex_en:"They introduced a two-tiered system.",ex_ru:"Они внедрили двухуровневую систему."},
{en:"to be given the sack",meaning:"to be fired from a job",ru:"быть уволенным",ex_en:"He was given the sack for being late too often.",ex_ru:"Его уволили за частые опоздания."},
{en:"to be provided with the bag (лучше: left holding the bag)",meaning:"to be left responsible unfairly",ru:"остаться крайним",ex_en:"He was left holding the bag after the deal failed.",ex_ru:"В итоге он остался крайним после провала сделки."},
{en:"remotely",meaning:"in a distant or slight way",ru:"отдалённо, хоть сколько-нибудь",ex_en:"I’m not even remotely interested.",ex_ru:"Мне это совсем не интересно."},
{en:"fraction",meaning:"a small part of something",ru:"доля, часть",ex_en:"Only a fraction of people agreed.",ex_ru:"Лишь малая часть людей согласилась"},
{en:"downplay",meaning:"to make something seem less important",ru:"преуменьшать",ex_en:"He tried to downplay the issue.",ex_ru:"Он попытался преуменьшить проблему."},
{en:"daydream",meaning:"to think pleasant thoughts instead of focusing",ru:"мечтать наяву",ex_en:"She tends to daydream during lectures.",ex_ru:"Она часто мечтает на лекциях."},
{en:"enthuse",meaning:"to express excitement",ru:"восторгаться, говорить с энтузиазмом",ex_en:"He enthused about the new idea.",ex_ru:"Он с энтузиазмом говорил о новой идее."},
{en:"step into",meaning:"to take a role or position",ru:"вступать, принимать на себя",ex_en:"She stepped into a leadership role.",ex_ru:"Она взяла на себя роль лидера."},
{en:"hang on tight",meaning:"hold firmly",ru:"держись крепче",ex_en:"Hang on tight, it’s going to be a rough ride.",ex_ru:"Держись крепче, поездка будет жёсткой."},
{en:"wish for",meaning:"to want something strongly",ru:"желать",ex_en:"She wished for success.",ex_ru:"Она желала успеха."},
{en:"count someone in",meaning:"to include someone",ru:"включить кого-то",ex_en:"Count me in for the trip.",ex_ru:"Запиши меня в поездку."},
{en:"take it from here",meaning:"I will handle it now",ru:"дальше я сам",ex_en:"You can relax, I’ll take it from here.",ex_ru:"Можешь расслабиться, дальше я сам."},
{en:"you’ve gotta be kidding me",meaning:"expression of disbelief",ru:"ты, должно быть, шутишь",ex_en:"You’ve gotta be kidding me, that can’t be true.",ex_ru:"Ты, должно быть, шутишь, этого не может быть."},
{en:"what of it",meaning:"why does it matter",ru:"ну и что",ex_en:"So I was late — what of it?",ex_ru:"Ну да, я опоздал — и что?"},
{en:"twilight",meaning:"time between day and night",ru:"сумерки",ex_en:"They walked during twilight.",ex_ru:"Они гуляли в сумерках."},
{en:"halt something",meaning:"to stop something",ru:"остановить",ex_en:"The police halted the operation.",ex_ru:"Полиция остановила операцию."},
{en:"daybreak",meaning:"the start of the day",ru:"рассвет",ex_en:"They left at daybreak.",ex_ru:"Они ушли на рассвете."},
{en:"squeeze through",meaning:"to pass through a tight space",ru:"протиснуться",ex_en:"He squeezed through the narrow gap.",ex_ru:"Он протиснулся через узкий проход."},
{en:"nag someone",meaning:"to keep complaining",ru:"пилить, надоедать",ex_en:"Stop nagging me about it.",ex_ru:"Перестань меня пилить из-за этого."},
{en:"perks",meaning:"extra benefits",ru:"бонусы, привилегии",ex_en:"The job comes with great perks.",ex_ru:"У этой работы хорошие бонусы."},
{en:"self-absorbed weasel",meaning:"selfish and sneaky person",ru:"самовлюблённый подлец",ex_en:"He’s just a self-absorbed weasel.",ex_ru:"Он просто самовлюблённый подлец."},
{en:"tranquil",meaning:"calm and peaceful",ru:"спокойный",ex_en:"It was a tranquil place by the lake.",ex_ru:"Это было спокойное место у озера."},
{en:"cross over",meaning:"to move from one side to another",ru:"переходить",ex_en:"They crossed over the bridge.",ex_ru:"Они перешли через мост."},
{en:"resist the inevitable",meaning:"to try to stop something unavoidable",ru:"сопротивляться неизбежному",ex_en:"He tried to resist the inevitable change.",ex_ru:"Он пытался сопротивляться неизбежным изменениям."},
{en:"come up with",meaning:"to think of an idea",ru:"придумать",ex_en:"She came up with a great solution.",ex_ru:"Она придумала отличное решение."},
{en:"hold on to",meaning:"to keep something",ru:"держаться за",ex_en:"Hold on to your dreams.",ex_ru:"Держись за свои мечты."},
{en:"leave the gathering",meaning:"to go away from an event",ru:"покинуть встречу",ex_en:"He left the gathering early.",ex_ru:"Он рано покинул встречу."},
{en:"inappropriately",meaning:"in a wrong or improper way",ru:"неподобающим образом",ex_en:"He behaved inappropriately.",ex_ru:"Он вёл себя неподобающим образом."},
{en:"backbite",meaning:"to speak badly about someone secretly",ru:"злословить за спиной",ex_en:"They tend to backbite their colleagues.",ex_ru:"Они склонны обсуждать коллег за спиной."},
{en:"fallout",meaning:"bad results of a situation",ru:"последствия, негативный результат",ex_en:"There was serious fallout after the decision.",ex_ru:"После решения были серьёзные последствия."},
{en:"shove oneself",meaning:"to push oneself forward",ru:"проталкиваться",ex_en:"He shoved himself into the crowd.",ex_ru:"Он протолкался в толпу."},
{en:"behold",meaning:"to look at something impressive",ru:"узреть, вот",ex_en:"Behold the beauty of nature.",ex_ru:"Узри красоту природы."},
{en:"conquer",meaning:"to defeat or overcome",ru:"завоёвывать, преодолевать",ex_en:"He conquered his fears.",ex_ru:"Он преодолел свои страхи."},
{en:"miserable",meaning:"трепетал, порхал",ru:"жалкий, несчастный",ex_en:"He felt miserable after the loss.",ex_ru:"Он чувствовал себя несчастным после поражения."},
{en:"fluttered",meaning:"to move lightly and quickly",ru:"трепетал, порхал",ex_en:"Her heart fluttered with excitement.",ex_ru:"Её сердце затрепетало от волнения."},
{en:"albeit",meaning:"although",ru:"хотя, несмотря на то что",ex_en:"He is confident, albeit a little nervous.",ex_ru:"Он уверенный, хотя немного нервный."},
{en:"reluctantly",meaning:"unwillingly",ru:"неохотно",ex_en:"She reluctantly agreed to help.",ex_ru:"Она неохотно согласилась помочь."},
{en:"infamous",meaning:"well known for something bad",ru:"печально известный",ex_en:"The city is infamous for its crime rate.",ex_ru:"Город печально известен уровнем преступности."},
{en:"gauge",meaning:"to measure or judge",ru:"измерять, оценивать",ex_en:"It’s hard to gauge his reaction.",ex_ru:"Трудно оценить его реакцию."},
{en:"wobble",meaning:"to move unsteadily",ru:"шататься",ex_en:"The table wobbled on the uneven floor.",ex_ru:"Стол шатался на неровном полу."},
{en:"precarious",meaning:"unstable or dangerous",ru:"ненадёжный, шаткий",ex_en:"He stood on a precarious ledge.",ex_ru:"Он стоял на шатком выступе."},
{en:"while also",meaning:"at the same time adding another action",ru:"при этом также",ex_en:"He studies hard while also working part-time.",ex_ru:"Он усердно учится, при этом также работает."},
{en:"set aside something for something",meaning:"to reserve or save",ru:"откладывать / выделять",ex_en:"She set aside money for travel.",ex_ru:"Она отложила деньги на путешествие."},
{en:"prepping",meaning:"prepping",ru:"подготовка",ex_en:"They are prepping for the exam.",ex_ru:"Они готовятся к экзамену."},
{en:"speculate",meaning:"to guess without certainty",ru:"предполагать, строить догадки",ex_en:"We can only speculate about the outcome.",ex_ru:"Мы можем только строить догадки о результате."},
{en:"shoot in the dark",meaning:"a random guess",ru:"пальцем в небо",ex_en:"It was just a shot in the dark.",ex_ru:"Это было просто предположение наугад."},
{en:"amiss",meaning:"wrong or suspicious",ru:"не так, неправильно",ex_en:"Something felt amiss.",ex_ru:"Что-то казалось не так"},
{en:"to a halt",meaning:"to stop completely",ru:"до полной остановки",ex_en:"The train came to a halt.",ex_ru:"Поезд полностью остановился."},
{en:"shelter",meaning:"protection from danger or weather",ru:"укрытие",ex_en:"They found shelter from the storm.",ex_ru:"Они нашли укрытие от шторма."},
{en:"blizzard",meaning:"severe snowstorm",ru:"метель",ex_en:"We got caught in a blizzard.",ex_ru:"Мы попали в метель."},
{en:"stumble upon",meaning:"to find accidentally",ru:"наткнуться",ex_en:"I stumbled upon an old photo.",ex_ru:"Я случайно наткнулся на старое фото."},
{en:"thrilled with",meaning:"very excited or happy about something",ru:"в восторге от",ex_en:"She was thrilled with the results.",ex_ru:"Она была в восторге от результатов."},
{en:"slay",meaning:"to do something extremely well",ru:"разнести / сделать идеально (сленг)",ex_en:"She slayed the performance.",ex_ru:"Она выступила просто идеально."},
{en:"to be here awhile",meaning:"to stay for some time",ru:"быть здесь какое-то время",ex_en:"I’ll be here awhile, so we can talk.",ex_ru:"Я побуду здесь какое-то время, так что мы можем поговорить."},
{en:"good riddance",meaning:"relief that someone/something is gone",ru:"туда ему и дорога / наконец-то ушёл",ex_en:"He finally quit, good riddance.",ex_ru:"Он наконец уволился — туда ему и дорога."},
{en:"good to be back",meaning:"it feels nice to return somewhere",ru:"приятно вернуться",ex_en:"Good to be back home after the trip.",ex_ru:"Приятно вернуться домой после поездки."},
{en:"faint",meaning:"very weak or to lose consciousness",ru:"слабый / терять сознание",ex_en:"She felt faint and had to sit down.",ex_ru:"Ей стало плохо, и она была вынуждена сесть."},
{en:"plead",meaning:"to beg or make an emotional request",ru:"умолять / заявлять (в суде)",ex_en:"He pleaded for another chance.",ex_ru:"Он умолял дать ему ещё один шанс."},
{en:"invincible",meaning:"impossible to defeat",ru:"непобедимый",ex_en:"He felt invincible after his victory.",ex_ru:"Он чувствовал себя непобедимым после победы."},
{en:"on you tenfold",meaning:"something will come back much stronger",ru:"вернётся тебе в десятикратном размере",ex_en:"Whatever you do will come back on you tenfold.",ex_ru:"Всё, что ты делаешь, вернётся тебе в десятикратном размере."},
{en:"disgrace",meaning:"a situation causing shame",ru:"позор",ex_en:"The scandal was a disgrace to the company.",ex_ru:"Скандал стал позором для компании."},
{en:"via",meaning:"by way of or through",ru:"через, посредством",ex_en:"We traveled to Paris via Berlin.",ex_ru:"Мы поехали в Париж через Берлин."},
{en:"by way of",meaning:"through a place or method",ru:"через, посредством",ex_en:"He sent the package by way of courier.",ex_ru:"Он отправил посылку через курьера."},
{en:"dodgy",meaning:"not trustworthy or unsafe",ru:"подозрительный, сомнительный",ex_en:"That deal sounds a bit dodgy.",ex_ru:"Эта сделка звучит подозрительно."},
{en:"inherently",meaning:"in a natural or essential way",ru:"по своей природе",ex_en:"The system is inherently flawed.",ex_ru:"Система по своей природе несовершенна."},
{en:"substitute for",meaning:"to take the place of something",ru:"заменять",ex_en:"You can substitute sugar for honey in this recipe.",ex_ru:"Ты можешь заменить сахар мёдом в этом рецепте."},
{en:"banish",meaning:"to send someone away permanently",ru:"изгнать",ex_en:"He was banished from the kingdom.",ex_ru:"Его изгнали из королевства."},
{en:"disgraced",meaning:"having lost respect or honor",ru:"опозоренный",ex_en:"The official was disgraced after the scandal.",ex_ru:"Чиновник был опозорен после скандала."},
{en:"hesitate",meaning:"to pause before doing something",ru:"колебаться",ex_en:"Don’t hesitate to ask questions.",ex_ru:"Не стесняйся задавать вопросы."},
{en:"tides",meaning:"the rise and fall of the sea",ru:"приливы и отливы",ex_en:"The tides change twice a day.",ex_ru:"Приливы меняются два раза в день."},
{en:"pull someone in",meaning:"to attract or involve someone",ru:"втягивать, привлекать",ex_en:"The story pulled me in immediately.",ex_ru:"История сразу меня увлекла."},
{en:"mighty",meaning:"very powerful or strong",ru:"могущественный, сильный",ex_en:"He is a mighty warrior.",ex_ru:"Он могущественный воин."},
{en:"meathead",meaning:"a stupid or insensitive person",ru:"тупица (разговорное)",ex_en:"Don’t be such a meathead.",ex_ru:"Не будь таким тупицей."},
{en:"go ahead and glow it up",meaning:"improve or upgrade something",ru:"давай, сделай это лучше / прокачай",ex_en:"Go ahead and glow it up, make it look amazing.",ex_ru:"Давай, прокачай это, сделай круто."},
{en:"induce",meaning:"to cause something",ru:"вызывать, приводить к",ex_en:"The medicine may induce sleep.",ex_ru:"Лекарство может вызвать сон."},
{en:"tenfold",meaning:"ten times more",ru:"в десять раз",ex_en:"The effort paid off tenfold.",ex_ru:"Усилия окупились в десять раз."},
{en:"escort",meaning:"to go with someone for protection or guidance",ru:"сопровождать",ex_en:"He escorted her to the door.",ex_ru:"Он проводил её до двери."},
{en:"run off to",meaning:"to leave quickly for a place",ru:"убежать / быстро уйти куда-то",ex_en:"He ran off to the store without saying anything.",ex_ru:"Он убежал в магазин, ничего не сказав."},
{en:"snazzy (for)",meaning:"fashionable and attractive",ru:"стильный, эффектный",ex_en:"That’s a snazzy outfit for the party.",ex_ru:"Это стильный наряд для вечеринки."},
{en:"affecting someone",meaning:"having an impact on someone",ru:"влиять на кого-то",ex_en:"The news is deeply affecting her.",ex_ru:"Эта новость сильно влияет на неё."},
{en:"to cover ground",meaning:"to cover ground",ru:"покрывать расстояние, продвигаться",ex_en:"B1: We covered a lot of ground on our hike today. — Мы прошли большое расстояние во время похода сегодня.",ex_ru:"B2: Despite the tight deadline, the team managed to cover significant ground on the project by working overtime. — Несмотря на сжатые сроки, команда смогла существенно продвинуться в проекте, работая сверхурочно."},
{en:"far apart",meaning:"separated by a large distance",ru:"далеко друг от друга",ex_en:"B1: My best friend and I live far apart now. — Мы с лучшим другом сейчас живём далеко друг от друга.",ex_ru:"B2: Although they were born far apart in age, the siblings have always been incredibly close. — Хотя между ними большая разница в возрасте, эти братья и сёстры всегда были невероятно близки."},
{en:"nomad",meaning:"a person who moves from place to place without a permanent home",ru:"кочевник",ex_en:"B1: He lives like a modern nomad, traveling constantly. — Он живёт как современный кочевник, постоянно путешествуя.",ex_ru:"B2: Digital nomads are redefining the traditional workplace by earning a living while exploring different countries. — Цифровые кочевники переопределяют традиционное рабочее место, зарабатывая на жизнь и исследуя разные страны."},
{en:"delectable",meaning:"delicious; extremely pleasant to taste",ru:"восхитительный, изысканный (о еде)",ex_en:"B1: The chocolate cake was absolutely delectable! — Шоколадный торт был абсолютно восхитительным!",ex_ru:"B2: The Michelin-starred restaurant served a delectable tasting menu that highlighted seasonal ingredients. — Ресторан, отмеченный звездой Мишлен, подавал восхитительное дегустационное меню, подчёркивающее сезонные ингредиенты."},
{en:"deadly",meaning:"causing or able to cause death; extremely harmful",ru:"смертельный, смертоносный",ex_en:"B1: Some mushrooms are deadly if you eat them. — Некоторые грибы смертельны, если их съесть.",ex_ru:"B2: The combination of speed and reckless driving proved deadly, resulting in a tragic accident on the highway. — Сочетание скорости и безрассудного вождения оказалось смертельным, что привело к трагической аварии на шоссе."},
{en:"something it is / that's what it is",meaning:"used to accept a situation as it is; that's the reality",ru:"вот так вот; такова реальность",ex_en:"B1: I don't like it, but that's what it is. — Мне это не нравится, но что поделать.",ex_ru:"B2: The job isn't perfect and the hours are long, but that's what it is when you're climbing the corporate ladder. — Работа не идеальна, и часы длинные, но такова реальность, когда ты поднимаешься по карьерной лестнице."},
{en:"refugee",meaning:"a person forced to leave their country due to war, persecution, or disaster",ru:"беженец",ex_en:"B1: Many refugees are seeking safety in neighboring countries. — Многие беженцы ищут безопасность в соседних странах.",ex_ru:"B2: The refugee crisis has prompted humanitarian organizations to establish emergency shelters and provide essential services. — Кризис беженцев побудил гуманитарные организации создать экстренные убежища и предоставить основные услуги."},
{en:"declare (declare – declared – declared)",meaning:"to announce officially or publicly",ru:"объявлять, заявлять",ex_en:"B1: The president declared a national holiday. — Президент объявил национальный праздник.",ex_ru:"B2: After reviewing all the evidence, the jury declared the defendant not guilty on all charges. — После рассмотрения всех доказательств присяжные объявили подсудимого невиновным по всем обвинениям."},
{en:"destination",meaning:"место назначения, пункт назначения",ru:"место назначения, пункт назначения",ex_en:"B1: Paris is a popular tourist destination. — Париж — популярное туристическое направление.",ex_ru:"B2: Despite several flight delays and layovers, we finally arrived at our destination exhausted but excited. — Несмотря на несколько задержек рейсов и пересадок, мы наконец прибыли в пункт назначения уставшие, но взволнованные."},
{en:"staple",meaning:"a main or important element; a basic food item",ru:"основной продукт; главный элемент",ex_en:"B1: Rice is a staple food in many Asian countries. — Рис — основной продукт питания во многих азиатских странах.",ex_ru:"B2: Coffee has become such a staple of office culture that most companies provide it free to employees. — Кофе стал настолько важным элементом офисной культуры, что большинство компаний предоставляют его бесплатно сотрудникам"},
{en:"fall out of something",meaning:"to drop or come out of something accidentally",ru:"выпасть из чего-то",ex_en:"B1: My phone fell out of my pocket. — Мой телефон выпал из кармана.",ex_ru:"B2: When I opened the old photo album, several handwritten letters fell out of the pages, revealing a hidden family story. — Когда я открыл старый фотоальбом, несколько рукописных писем выпали из страниц, открывая скрытую семейную историю."},
{en:"integral part",meaning:"an essential or fundamental component",ru:"неотъемлемая часть",ex_en:"B1: Teamwork is an integral part of success. — Командная работа — неотъемлемая часть успеха.",ex_ru:"B2: Regular exercise and balanced nutrition have become integral parts of my daily routine since I started prioritizing my health. — Регулярные упражнения и сбалансированное питание стали неотъемлемыми частями моего ежедневного распорядка с тех пор, как я начал уделять приоритет здоровью."},
{en:"to be in for a shock",meaning:"about to experience something surprising or unpleasant",ru:"ждёт шок; будет неприятно удивлён",ex_en:"B1: If you think this test is easy, you're in for a shock! — Если ты думаешь, что этот тест лёгкий, тебя ждёт сюрприз!",ex_ru:"B2: Anyone expecting a relaxing vacation at that resort is in for a shock when they discover it's under major construction. — Любой, кто ожидает расслабляющий отпуск на том курорте, будет шокирован, когда обнаружит, что там идёт капитальный ремонт."},
{en:"tweak (tweak – tweaked – tweaked)",meaning:"to make small adjustments or improvements",ru:"подкорректировать, слегка изменить",ex_en:"B1: I need to tweak this essay before submitting it. — Мне нужно подкорректировать это эссе перед сдачей.",ex_ru:"B2: After tweaking the marketing strategy based on customer feedback, we saw a 30% increase in engagement. — После корректировки маркетинговой стратегии на основе отзывов клиентов мы увидели 30% рост вовлечённости."},
{en:"pump (pump – pumped – pumped)",meaning:"to move liquid or gas using a pump; to fill with air",ru:"качать, накачивать",ex_en:"B1: I need to pump air into my bicycle tires. — Мне нужно накачать шины велосипеда.",ex_ru:"B2: The gym was pumping energetic music to motivate the early morning workout crowd. — Спортзал качал энергичную музыку, чтобы мотивировать утреннюю тренировочную толпу."},
{en:"stock",meaning:"goods available for sale; shares in a company; broth for cooking",ru:"запас; акции; бульон",ex_en:"B1: This item is out of stock right now. — Этого товара сейчас нет в наличии.",ex_ru:"B2: The company's stock plummeted after the CEO announced unexpected quarterly losses during the earnings call. — Акции компании резко упали после того, как генеральный директор объявил о неожиданных квартальных убытках во время отчётного звонка."},
{en:"mouthful",meaning:"a large amount of food in the mouth; something difficult to say",ru:"полный рот; труднопроизносимое слово",ex_en:"B1: That's quite a mouthful — can I just call you by your nickname? — Это трудно выговорить — могу я просто называть тебя по прозвищу?",ex_ru:"B2: Her official job title is such a mouthful that even she prefers to simplify it when introducing herself. — Её официальное название должности настолько труднопроизносимо, что даже она предпочитает упрощать его при представлении."},
{en:"investigate (investigate – investigated – investigated)",meaning:"to examine or research something carefully",ru:"расследовать, исследовать",ex_en:"B1: The police are investigating the robbery. — Полиция расследует ограбление.",ex_ru:"B2: The committee was appointed to investigate allegations of corruption within the department before making policy recommendations. — Комитет был назначен для расследования обвинений в коррупции внутри департамента перед составлением политических рекомендаций."},
{en:"from someone's perspective",meaning:"according to someone's point of view",ru:"с чьей-то точки зрения",ex_en:"B1: From my perspective, the plan won't work. — С моей точки зрения, план не сработает.",ex_ru:"B2: From the customer's perspective, the new return policy seems unnecessarily restrictive and inconvenient. — С точки зрения клиента, новая политика возврата кажется излишне ограничительной и неудобной."},
{en:"facilitate (facilitate – facilitated – facilitated)",meaning:"to make something easier or help it happen",ru:"способствовать, облегчать",ex_en:"B1: Technology can facilitate learning. — Технологии могут облегчить обучение.",ex_ru:"B2: The new communication platform is designed to facilitate seamless collaboration between international teams across different time zones. — Новая коммуникационная платформа разработана для облегчения беспрепятственного сотрудничества между международными командами в разных часовых поясах."},
{en:"on gaining supremacy",meaning:"focused on achieving dominance or superiority",ru:"в достижении превосходства",ex_en:"B1: The team is focused on gaining supremacy in the league. — Команда сосредоточена на достижении превосходства в лиге.",ex_ru:"B2: The tech giant's strategy has always centered on gaining market supremacy through continuous innovation rather than aggressive pricing. — Стратегия технологического гиганта всегда была сосредоточена на достижении рыночного превосходства через постоянные инновации, а не агрессивное ценообразование."},
{en:"exquisite",meaning:"extremely beautiful and delicate; of exceptional quality",ru:"изысканный, утончённый",ex_en:"B1: The jewelry is exquisite. — Украшения изысканные.",ex_ru:"B2: The art gallery featured exquisite paintings from the Renaissance period, each piece meticulously restored to its original glory. — Художественная галерея представляла изысканные картины эпохи Ренессанса, каждое произведение тщательно восстановлено в первоначальном великолепии."},
{en:"scrumptious",meaning:"extremely tasty and appetizing",ru:"восхитительный, аппетитный",ex_en:"B1: This dessert looks scrumptious! — Этот десерт выглядит восхитительно!",ex_ru:"B2: The bakery's window display featured an array of scrumptious pastries that made it impossible to walk by without stopping. — Витрина пекарни демонстрировала массу аппетитных выпечек, мимо которых было невозможно пройти, не остановившись."},
{en:"let the ideas flow",meaning:"allow creativity to happen naturally without restriction",ru:"дать идеям литься; позволить идеям течь свободно",ex_en:"B1: Just relax and let the ideas flow. — Просто расслабься и дай идеям течь.",ex_ru:"B2: During brainstorming sessions, it's crucial to let the ideas flow freely without judgment before evaluating their feasibility. — Во время мозговых штурмов крайне важно позволить идеям свободно литься без осуждения, прежде чем оценивать их осуществимость."},
{en:"what else",meaning:"asking for additional information or items",ru:"что ещё",ex_en:"B1: What else do you need from the store? — Что ещё тебе нужно из магазина?",ex_ru:"B2: We've covered the budget, timeline, and deliverables — what else should we discuss before finalizing the proposal? — Мы рассмотрели бюджет, сроки и результаты — что ещё нам следует обсудить перед финализацией предложения?"},
{en:"petite",meaning:"(of a woman) small and slender",ru:"миниатюрная, хрупкая",ex_en:"B1: She's petite but very strong. — Она миниатюрная, но очень сильная.",ex_ru:"B2: Despite her petite frame, she's an accomplished martial artist who has won numerous national championships. — Несмотря на миниатюрное телосложение, она опытная мастер боевых искусств, выигравшая множество национальных чемпионатов."},
{en:"monetary",meaning:"relating to money or currency",ru:"денежный, финансовый",ex_en:"B1: The company offers monetary rewards for good performance. — Компания предлагает денежные вознаграждения за хорошую производительность.",ex_ru:"B2: The central bank's monetary policy adjustments have far-reaching implications for inflation rates and economic stability. — Корректировки денежно-кредитной политики центрального банка имеют далеко идущие последствия для уровня инфляции и экономической стабильности."},
{en:"check this out",meaning:"B1: Check this out — I found your favorite snack! — Зацени — я нашёл твою любимую закуску!\n\nB2: You won't believe what just arrived in the mail — check this out, it's the limited edition we've been waiting for! — Ты не поверишь, что только что пришло по почте — зацени, это лимитированное издание, которое мы ждали!",ru:"зацени это; посмотри на это",ex_en:"",ex_ru:""},
{en:"to be enticing",meaning:"to be attractive and tempting",ru:"быть заманчивым, привлекательным",ex_en:"B1: The job offer sounds very enticing. — Предложение работы звучит очень заманчиво.",ex_ru:"B2: While the startup's salary package is enticing, the lack of job security and long hours make it a risky proposition. — Хотя зарплатный пакет стартапа заманчив, отсутствие гарантии занятости и длинные часы делают его рискованным предложением."},
{en:"knock something out of the park (knock – knocked – knocked)",meaning:"to do something exceptionally well; to exceed expectations",ru:"сделать что-то на отлично; превзойти ожидания",ex_en:"B1: You really knocked that presentation out of the park! — Ты действительно великолепно провёл эту презентацию!",ex_ru:"B2: The marketing team absolutely knocked the campaign out of the park, generating triple the expected engagement in the first week. — Маркетинговая команда совершенно блестяще провела кампанию, создав тройную ожидаемую вовлечённость в первую неделю."},
{en:"take one's leave (take – took – taken)",meaning:"to say goodbye and depart (formal)",ru:"откланяться, попрощаться и уйти",ex_en:"B1: I must take my leave now, it's getting late. — Я должен откланяться, уже поздно.",ex_ru:"B2: After thanking the hosts for their generous hospitality, the ambassador took his leave and returned to the embassy. — Поблагодарив хозяев за щедрое гостеприимство, посол откланялся и вернулся в посольство."},
{en:"reward (reward – rewarded – rewarded)",meaning:"награда; вознаграждение",ru:"награда; вознаграждение",ex_en:"B1: Hard work always brings its rewards. — Тяжёлый труд всегда приносит свои награды.",ex_ru:"B2: The company implemented a comprehensive reward system to recognize exceptional performance and incentivize employee retention. — Компания внедрила комплексную систему вознаграждений для признания исключительной производительности и стимулирования удержания сотрудников."},
{en:"devoted butler",meaning:"a loyal and dedicated personal servant",ru:"преданный дворецкий",ex_en:"B1: The family had a devoted butler for many years. — У семьи был преданный дворецкий много лет.",ex_ru:"B2: The devoted butler had served the estate for four decades, becoming an indispensable part of the household and a trusted confidant. — Преданный дворецкий служил имению четыре десятилетия, став незаменимой частью домашнего хозяйства и доверенным лицом."},
{en:"seem effortless",meaning:"appear to require no effort; look easy",ru:"казаться лёгким; выглядеть без усилий",ex_en:"B1: She makes cooking seem effortless. — Она делает готовку такой, что кажется легко.",ex_ru:"B2: Professional dancers make complex choreography seem effortless, but years of rigorous training lie behind every graceful movement. — Профессиональные танцоры делают сложную хореографию как будто без усилий, но за каждым грациозным движением стоят годы строгих тренировок."},
{en:"fabulous",meaning:"extremely good; wonderful; extraordinary",ru:"потрясающий, великолепный",ex_en:"B1: You look fabulous in that dress! — Ты выглядишь потрясающе в этом платье!",ex_ru:"B2: The hotel offered fabulous ocean views and world-class amenities that exceeded all our expectations. — Отель предлагал потрясающие виды на океан и услуги мирового класса, которые превзошли все наши ожидания."},
{en:"ravishing",meaning:"extremely beautiful or attractive; stunning",ru:"восхитительный, ослепительный",ex_en:"B1: She looked ravishing at the party. — Она выглядела восхитительно на вечеринке.",ex_ru:"B2: The bride was absolutely ravishing in her custom-designed gown, capturing everyone's attention as she walked down the aisle. — Невеста была абсолютно ослепительна в своём платье на заказ, привлекая внимание всех, когда шла к алтарю."},
{en:"contagious",meaning:"(of a disease) spread by contact; (of emotions) likely to spread to others",ru:"заразный; заразительный",ex_en:"B1: Her laughter is contagious — everyone starts laughing too! — Её смех заразителен — все начинают смеяться тоже!",ex_ru:"B2: The team leader's enthusiasm was so contagious that even the most skeptical members became excited about the new project. — Энтузиазм руководителя команды был настолько заразительным, что даже самые скептически настроенные члены стали воодушевлены новым проектом."},
{en:"sewer",meaning:"an underground pipe that carries waste water and sewage",ru:"канализация, сточная труба",ex_en:"B1: The city is repairing the old sewer system. — Город ремонтирует старую канализационную систему.",ex_ru:"B2: After the heavy rainfall, the outdated sewer infrastructure couldn't handle the volume, causing flooding in several neighborhoods. — После сильного дождя устаревшая канализационная инфраструктура не справилась с объёмом, вызвав наводнение в нескольких районах."},
{en:"agile",meaning:"able to move quickly and easily; mentally quick",ru:"ловкий, проворный; гибкий",ex_en:"B1: Cats are very agile animals. — Кошки очень ловкие животные.",ex_ru:"B2: The company adopted an agile approach to software development, allowing teams to respond quickly to changing market demands. — Компания приняла гибкий подход к разработке программного обеспечения, позволяя командам быстро реагировать на меняющиеся требования рынка."},
{en:"fathom (fathom – fathomed – fathomed)",meaning:"to understand something; to measure the depth of water",ru:"постичь, понять; измерить глубину",ex_en:"B1: I can't fathom why he did that. — Я не могу понять, почему он это сделал.",ex_ru:"B2: Despite reading the report multiple times, she still couldn't fathom how such a critical error had gone unnoticed for months. — Несмотря на многократное чтение отчёта, она всё ещё не могла понять, как такая критическая ошибка оставалась незамеченной месяцами."},
{en:"unbearably bleak",meaning:"extremely depressing and hopeless; intolerably gloomy",ru:"невыносимо мрачный/безрадостный",ex_en:"B1: The weather was unbearably bleak all winter. — Погода была невыносимо мрачной всю зиму.",ex_ru:"B2: The documentary painted an unbearably bleak picture of life in war-torn regions, leaving viewers deeply moved and troubled. — Документальный фильм нарисовал невыносимо мрачную картину жизни в раздираемых войной регионах, оставив зрителей глубоко тронутыми и обеспокоенными."},
{en:"proposition",meaning:"a proposal or suggestion; a business offer; a statement to be proved",ru:"предложение; утверждение",ex_en:"B1: He made me an interesting business proposition. — Он сделал мне интересное деловое предложение.",ex_ru:"B2: The investment proposition seemed attractive on paper, but further analysis revealed significant hidden risks. — Инвестиционное предложение казалось привлекательным на бумаге, но дальнейший анализ выявил значительные скрытые риски."},
{en:"take someone's word for something (take – took – taken)",meaning:"to believe what someone says without proof",ru:"поверить кому-то на слово",ex_en:"B1: I'll take your word for it. — Я поверю тебе на слово.",ex_ru:"B2: Instead of taking the salesperson's word for the car's condition, I hired a mechanic to conduct a thorough inspection. — Вместо того чтобы поверить продавцу на слово о состоянии машины, я нанял механика для проведения тщательной проверки."},
{en:"invasion",meaning:"an act of invading a country or territory with armed forces; an unwelcome intrusion",ru:"вторжение, нашествие",ex_en:"B1: The invasion happened without warning. — Вторжение произошло без предупреждения.",ex_ru:"B2: The military invasion triggered a humanitarian crisis, forcing millions of civilians to flee their homes and seek refuge abroad. — Военное вторжение спровоцировало гуманитарный кризис, заставив миллионы мирных жителей покинуть свои дома и искать убежище за границей."},
{en:"surrender (surrender – surrendered – surrendered)",meaning:"to stop fighting and admit defeat; to give up something",ru:"сдаваться, капитулировать",ex_en:"B1: The enemy forces decided to surrender. — Вражеские силы решили сдаться.",ex_ru:"B2: After weeks of intense negotiations, the company was forced to surrender control of its overseas operations to settle the debt. — После недель интенсивных переговоров компания была вынуждена отдать контроль над своими зарубежными операциями для погашения долга."},
{en:"outnumbered",meaning:"having fewer people than the opposing group",ru:"в меньшинстве, в численном меньшинстве",ex_en:"B1: Our team was outnumbered three to one. — Наша команда была в меньшинстве три к одному.",ex_ru:"B2: Despite being heavily outnumbered by competitors, the small startup managed to capture significant market share through innovative marketing. — Несмотря на значительное численное превосходство конкурентов, небольшой стартап смог захватить значительную долю рынка благодаря инновационному маркетингу."},
{en:"plague",meaning:"a deadly infectious disease; something that causes continual trouble",ru:"чума; бедствие; мучить",ex_en:"B1: The city was hit by a plague centuries ago. — Город был поражён чумой века назад.",ex_ru:"B2: Technical glitches continued to plague the new software release, frustrating users and damaging the company's reputation. — Технические сбои продолжали преследовать новый релиз программного обеспечения, раздражая пользователей и нанося ущерб репутации компании."},
{en:"set the net",meaning:"to prepare a trap or strategy to catch someone/something",ru:"расставить сети, подготовить ловушку",ex_en:"B1: The fishermen set the net early in the morning. — Рыбаки расставили сети рано утром.",ex_ru:"B2: Investigators spent months setting the net before finally capturing the criminal organization's leaders in a coordinated raid. — Следователи потратили месяцы на расстановку сетей, прежде чем наконец захватить лидеров преступной организации в координированной облаве."},
{en:"head count",meaning:"a count of the number of people present or employed",ru:"подсчёт голов; численность персонала",ex_en:"B1: Let's do a quick head count before we leave. — Давайте быстро пересчитаем всех перед уходом.",ex_ru:"B2: The HR department conducted a comprehensive head count to determine staffing needs across all departments for the upcoming fiscal year. — Отдел кадров провёл комплексный подсчёт численности персонала для определения потребностей в кадрах по всем отделам на предстоящий финансовый год."},
{en:"exquisite",meaning:"extremely beautiful and delicate; showing great refinement",ru:"изысканный, утончённый",ex_en:"B1: The jewelry was absolutely exquisite. — Украшения были абсолютно изысканными.",ex_ru:"B2: The museum's collection includes exquisite examples of Ming Dynasty porcelain, each piece demonstrating exceptional craftsmanship. — Коллекция музея включает изысканные образцы фарфора династии Мин, каждое изделие демонстрирует исключительное мастерство."},
{en:"hostage",meaning:"a person held by captors to force others to comply with demands",ru:"заложник",ex_en:"B1: The criminals took three people hostage. — Преступники взяли трёх человек в заложники.",ex_ru:"B2: The tense hostage situation lasted for twelve hours before negotiators successfully secured the safe release of all captives. — Напряжённая ситуация с заложниками продолжалась двенадцать часов, прежде чем переговорщикам удалось обеспечить безопасное освобождение всех пленников."},
{en:"occur to someone (occur – occurred – occurred)",meaning:"(of a thought or idea) to come into someone's mind",ru:"прийти в голову кому-то",ex_en:"B1: It just occurred to me that I forgot my keys. — Мне только что пришло в голову, что я забыл ключи.",ex_ru:"B2: It never occurred to her that her colleague might be deliberately sabotaging the project until evidence emerged. — Ей никогда не приходило в голову, что её коллега может намеренно саботировать проект, пока не появились доказательства."},
{en:"way ahead of someone",meaning:"much more advanced or further along than someone else",ru:"намного впереди кого-то",ex_en:"B1: She's way ahead of the other students in math. — Она намного опережает других студентов по математике.",ex_ru:"B2: The company was way ahead of its competitors in adopting artificial intelligence, giving it a significant strategic advantage in the market. — Компания намного опережала своих конкурентов в применении искусственного интеллекта, что дало ей значительное стратегическое преимущество на рынке."},
{en:"swamp",meaning:"an area of soft, wet land with water and plants; to overwhelm with too much of something",ru:"болото; заваливать, переполнять",ex_en:"B1: We got lost in the swamp. — Мы заблудились в болоте.",ex_ru:"B2: After the product launch, customer service was swamped with inquiries and couldn't keep up with the overwhelming demand. — После запуска продукта служба поддержки клиентов была завалена запросами и не могла справиться с огромным спросом."},
{en:"ominous",meaning:"giving the impression that something bad is going to happen; threatening",ru:"зловещий, предвещающий беду",ex_en:"B1: The dark clouds looked ominous. — Тёмные облака выглядели зловеще.",ex_ru:"B2: The CEO's ominous warning about upcoming restructuring left employees anxious and uncertain about their job security. — Зловещее предупреждение генерального директора о предстоящей реструктуризации оставило сотрудников встревоженными и неуверенными в своей работе."},
{en:"nicer",meaning:"comparative form of \"nice\" = more pleasant, attractive, or kind",ru:"приятнее, лучше, добрее",ex_en:"B1: This apartment is nicer than the last one. — Эта квартира лучше, чем прошлая.",ex_ru:"B2: After receiving critical feedback, he made a conscious effort to be nicer to his colleagues and create a more positive work atmosphere. — После получения критических отзывов он сознательно старался быть добрее к коллегам и создать более позитивную рабочую атмосферу"},
{en:"except for someone",meaning:"not including; apart from",ru:"кроме кого-то, за исключением",ex_en:"B1: Everyone was there except for John. — Все были там, кроме Джона.",ex_ru:"B2: The project proceeded smoothly except for one team member who consistently missed deadlines and disrupted the workflow. — Проект продвигался гладко, за исключением одного члена команды, который постоянно пропускал сроки и нарушал рабочий процесс."},
{en:"sacred",meaning:"connected with God or a deity; regarded with great respect",ru:"священный, святой",ex_en:"B1: This is a sacred temple. — Это священный храм.",ex_ru:"B2: The indigenous community considers the ancient forest sacred and has fought to protect it from commercial development for generations. — Коренное сообщество считает древний лес священным и борется за его защиту от коммерческой застройки на протяжении поколений."},
{en:"chatty",meaning:"fond of talking in a friendly and informal way",ru:"разговорчивый, болтливый",ex_en:"B1: My neighbor is very chatty — she can talk for hours! — Моя соседка очень разговорчивая — она может говорить часами!",ex_ru:"B2: While most participants remained formal during the conference call, one particularly chatty attendee dominated the conversation with personal anecdotes. — Хотя большинство участников оставались формальными во время конференц-звонка, один особенно разговорчивый участник доминировал в разговоре личными историями."},
{en:"kin",meaning:"one's family and relations; relatives",ru:"родня, родственники",ex_en:"B1: She's visiting her kin this weekend. — Она навещает родню в эти выходные.",ex_ru:"B2: In many traditional societies, loyalty to one's kin takes precedence over individual ambitions and personal relationships. — Во многих традиционных обществах лояльность к своей родне имеет приоритет над личными амбициями и отношениями."},
{en:"greasy",meaning:"covered with or resembling grease or oil; slippery",ru:"жирный, масляный",ex_en:"B1: This pizza is too greasy for me. — Эта пицца слишком жирная для меня.",ex_ru:"B2: The mechanic's hands were greasy from working on engines all day, and he had to scrub them thoroughly before heading home. — Руки механика были жирными после целого дня работы с двигателями, и ему пришлось тщательно их отмыть перед тем, как отправиться домой."},
{en:"so long as / as long as",meaning:"provided that; on the condition that",ru:"при условии что, пока, до тех пор пока",ex_en:"B1: You can borrow my car so long as you drive carefully. — Ты можешь взять мою машину при условии, что будешь водить осторожно.",ex_ru:"B2: The company will continue to support remote work so long as employees maintain productivity and attend mandatory meetings. — Компания продолжит поддерживать удалённую работу при условии, что сотрудники сохранят продуктивность и будут посещать обязательные встречи."},
{en:"someone is up to something",meaning:"planning or doing something (often something secretive or mischievous)",ru:"кто-то что-то замышляет",ex_en:"B1: I think he's up to something — he's acting strange. — Я думаю, он что-то замышляет — он ведёт себя странно.",ex_ru:"B2: When the kids suddenly became quiet upstairs, their mother immediately suspected they were up to something and went to investigate. — Когда дети внезапно стали тихими наверху, их мать сразу заподозрила, что они что-то замышляют, и пошла проверить."},
{en:"porcelain",meaning:"a white, hard, translucent ceramic material; fine china",ru:"фарфор",ex_en:"B1: This vase is made of porcelain. — Эта ваза сделана из фарфора.",ex_ru:"B2: The museum's collection includes exquisite examples of Ming Dynasty porcelain, renowned for its delicate craftsmanship and vibrant glazes. — Коллекция музея включает изысканные образцы фарфора династии Мин, известного своим изящным мастерством и яркими глазурями."},
{en:"dethrone (dethrone – dethroned – dethroned)",meaning:"to remove from power or position of authority; to depose",ru:"свергнуть с престола, лишить власти",ex_en:"B1: The king was dethroned after the revolution. — Король был свергнут после революции.",ex_ru:"B2: The young challenger managed to dethrone the reigning champion in a stunning upset that shocked the entire sports world. — Молодому претенденту удалось свергнуть действующего чемпиона в ошеломляющей сенсации, которая потрясла весь спортивный мир."},
{en:"from now on",meaning:"starting from this moment and continuing into the future",ru:"с этого момента, отныне",ex_en:"B1: From now on, I'll study harder. — С этого момента я буду учиться усерднее.",ex_ru:"B2: After the security breach, the company announced that from now on, all employees must use two-factor authentication to access systems. — После утечки данных компания объявила, что отныне все сотрудники должны использовать двухфакторную аутентификацию для доступа к системам."},
{en:"unfried dough",meaning:"unfried dough",ru:"нежареное тесто, сырое тесто",ex_en:"B1: Don't eat the unfried dough — it's not ready yet. — Не ешь сырое тесто — оно ещё не готово.",ex_ru:"B2: The recipe calls for letting the unfried dough rest for at least an hour before cooking to allow the gluten to relax. — Рецепт требует, чтобы нежареное тесто отдохнуло как минимум час перед готовкой, чтобы позволить глютену расслабиться."},
{en:"pricey",meaning:"expensive; costing a lot of money (informal)",ru:"дорогой, дорогостоящий",ex_en:"B1: That restaurant is a bit pricey. — Тот ресторан немного дороговат.",ex_ru:"B2: While the boutique hotel was undeniably pricey, the exceptional service and stunning ocean views made it worth the splurge. — Хотя бутик-отель был, несомненно, дорогим, исключительное обслуживание и потрясающие виды на океан оправдали эту трату."},
{en:"none of your business",meaning:"something that doesn't concern you; not your concern (can be rude)",ru:"не твоё дело",ex_en:"B1: Where I go on weekends is none of your business. — Куда я хожу на выходных — не твоё дело.",ex_ru:"B2: When the nosy colleague asked about her salary, she politely but firmly replied that it was none of his business. — Когда любопытный коллега спросил о её зарплате, она вежливо, но твёрдо ответила, что это не его дело."},
{en:"pebble",meaning:"a small, smooth stone, especially one worn by water",ru:"галька, камешек",ex_en:"B1: Children were throwing pebbles into the lake. — Дети бросали камешки в озеро.",ex_ru:"B2: The garden path was beautifully designed with white pebbles arranged in intricate patterns between the stepping stones. — Садовая дорожка была красиво оформлена белой галькой, выложенной в замысловатые узоры между камнями для ходьбы."},
{en:"get/keep one's eye on someone",meaning:"to watch someone carefully; to monitor",ru:"приглядывать за кем-то, следить за кем-то",ex_en:"B1: Can you keep your eye on my bag while I'm gone? — Можешь присмотреть за моей сумкой, пока меня нет?",ex_ru:"B2: The manager asked the senior employee to keep an eye on the new intern and make sure she understood the company procedures. — Менеджер попросил старшего сотрудника присмотреть за новой стажёркой и убедиться, что она понимает процедуры компании."},
{en:"twinkle toes",meaning:"someone who is light on their feet; a good dancer (often used playfully or sarcastically)",ru:"лёгкий на ногу; хороший танцор (игривое прозвище)",ex_en:"B1: Look at twinkle toes over there dancing! — Посмотри на этого танцора, как он танцует!",ex_ru:"B2: Despite his large build, he moved across the dance floor with surprising grace, earning him the nickname \"twinkle toes\" from his friends. — Несмотря на крупное телосложение, он двигался по танцполу с удивительной грацией, что принесло ему прозвище «лёгкий на ногу» от друзей."},
{en:"let's call a truce",meaning:"let's agree to stop fighting or arguing; make peace temporarily",ru:"давай заключим перемирие, давай помиримся",ex_en:"B1: We've been arguing all day — let's call a truce. — Мы спорим весь день — давай заключим перемирие.",ex_ru:"B2: After weeks of heated debates, the two departments finally agreed to call a truce and work together on the project. — После недель жарких дебатов два отдела наконец согласились заключить перемирие и работать вместе над проектом."},
{en:"fragile",meaning:"easily broken or damaged; delicate",ru:"хрупкий, ломкий",ex_en:"B1: Be careful — this glass is very fragile. — Будь осторожен — это стекло очень хрупкое.",ex_ru:"B2: The ancient manuscript was so fragile that museum curators could only handle it while wearing special gloves in controlled conditions. — Древняя рукопись была настолько хрупкой, что кураторы музея могли обращаться с ней только в специальных перчатках в контролируемых условиях."},
{en:"speaking of which",meaning:"used to introduce a related topic that was just mentioned",ru:"кстати о том; кстати говоря",ex_en:"B1: I need to buy groceries. Speaking of which, did you make a shopping list? — Мне нужно купить продукты. Кстати, ты составил список покупок?",ex_ru:"B2: The meeting went well, and we finalized the budget. Speaking of which, have you received approval from the finance department yet? — Встреча прошла хорошо, и мы утвердили бюджет. Кстати говоря, ты уже получил одобрение от финансового отдела?"},
{en:"we are even / we're even",meaning:"neither person owes the other anything; the score is settled",ru:"мы квиты, мы в расчёте",ex_en:"B1: You helped me yesterday, I helped you today — now we're even. — Ты помог мне вчера, я помог тебе сегодня — теперь мы квиты.",ex_ru:"B2: After she returned the favor by covering his shift, he smiled and said, \"I guess we're even now,\" acknowledging their mutual support. — После того как она ответила услугой, заменив его на смене, он улыбнулся и сказал: «Думаю, теперь мы квиты», признавая их взаимную поддержку."},
{en:"whereabouts",meaning:"the place where someone or something is",ru:"местонахождение",ex_en:"Do you know his whereabouts?",ex_ru:"Ты знаешь, где он находится?"},
{en:"go way back",meaning:"to have a long history together",ru:"знать друг друга давно",ex_en:"We go way back to school days.",ex_ru:"Мы знакомы ещё со школы."},
{en:"step in",meaning:"to get involved to help",ru:"вмешаться",ex_en:"She stepped in to solve the problem.",ex_ru:"Она вмешалась, чтобы решить проблему."},
{en:"to be on the house",meaning:"free of charge",ru:"за счёт заведения",ex_en:"Don’t worry, drinks are on the house.",ex_ru:"Не переживай, напитки за счёт заведения."},
{en:"fabulous",meaning:"extremely good",ru:"потрясающий",ex_en:"That was a fabulous performance.",ex_ru:"Это было потрясающее выступление."},

function hl(text, q) {
  if (!q) return text;
  var re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function render(items, q) {
  var cnt = document.getElementById('cnt');
  var list = document.getElementById('list');
  cnt.textContent = items.length + ' card' + (items.length !== 1 ? 's' : '');
  if (items.length === 0) {
    list.innerHTML = '<div class="empty"><span>☁</span>No results found</div>';
    return;
  }
  list.innerHTML = items.map(function(d, i) {
    var en = hl(d.en, q);
    var ru = hl(d.ru, q);
    var meaning = hl(d.meaning, q);
    var exHtml = '';
    if (d.ex_en) {
      exHtml = '<div class="ex"><div class="ex-en">' + d.ex_en + '</div>' +
        (d.ex_ru ? '<div class="ex-ru">' + d.ex_ru + '</div>' : '') + '</div>';
    }
    return '<div class="entry" style="animation-delay:' + Math.min(i * 0.015, 0.4) + 's">' +
      '<div class="entry-top"><span class="headword">' + en + '</span>' +
      (d.meaning ? '<span class="meaning">' + meaning + '</span>' : '') + '</div>' +
      '<div class="ru">' + ru + '</div>' +
      exHtml + '</div>';
  }).join('');
}

function filter() {
  var q = document.getElementById('q').value.toLowerCase().trim();
  var filtered = q ? data.filter(function(d) {
    return d.en.toLowerCase().indexOf(q) >= 0 ||
           d.ru.toLowerCase().indexOf(q) >= 0 ||
           d.meaning.toLowerCase().indexOf(q) >= 0;
  }) : data;
  render(filtered, q);
}

render(data, '');
</script>
