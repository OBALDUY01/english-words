<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Error Log</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c10;--s1:#131318;--s2:#1a1a22;--s3:#22222e;--border:#2e2e3e;--border2:#3d3d52;--acc:#7c6af7;--text:#e8e8f2;--dim:#8888aa;--dim2:#5a5a78;--ok:#4ade80;--err:#f87171;--warn:#fb923c;--info:#60a5fa}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text)}
.hdr{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;flex-shrink:0;background:var(--s1)}
.hdr-title{font-size:20px;font-weight:600;letter-spacing:-0.5px}
.hdr-title span{color:var(--acc)}
.hdr-stats{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap}
.hdr-stat{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);background:var(--s2);padding:3px 10px;border-radius:20px;border:1px solid var(--border)}
.hdr-stat strong{color:var(--acc)}
.layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 49px)}
.sidebar{width:190px;flex-shrink:0;border-right:1px solid var(--border);background:var(--s1);display:flex;flex-direction:column;overflow:hidden}
.snav{padding:10px 8px;flex-shrink:0;border-bottom:1px solid var(--border)}
.nb{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--dim);transition:all .15s;margin-bottom:2px;border:none;background:transparent;width:100%;text-align:left}
.nb:hover{color:var(--text);background:var(--s3)}
.nb.on{color:var(--acc);background:rgba(124,106,247,0.1);font-weight:500}
.sword{flex:1;overflow-y:auto;padding:8px}
.sword::-webkit-scrollbar{width:3px}
.sword::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.wlbl{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim2);letter-spacing:2px;text-transform:uppercase;padding:4px 8px 4px}
.wchip{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--dim);transition:all .15s;border:1px solid transparent}
.wchip:hover{color:var(--text);background:var(--s3)}
.wchip.on{color:var(--acc);background:rgba(124,106,247,0.1);border-color:rgba(124,106,247,0.3)}
.wcnt{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim2);background:var(--s3);padding:1px 5px;border-radius:10px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.toolbar{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-shrink:0;background:var(--s1);flex-wrap:wrap}
.srch{flex:1;min-width:140px;background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:6px 12px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:13px;outline:none;transition:border-color .15s}
.srch:focus{border-color:var(--acc)}
.srch::placeholder{color:var(--dim2)}
.ftabs{display:flex;gap:4px;flex-wrap:wrap}
.ft{font-family:'JetBrains Mono',monospace;font-size:10px;padding:4px 10px;border-radius:5px;border:1px solid var(--border);cursor:pointer;color:var(--dim);background:transparent;transition:all .15s;white-space:nowrap}
.ft:hover{border-color:var(--border2);color:var(--text)}
.ft.on{background:var(--acc);color:white;border-color:var(--acc)}
.cntlbl{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim2);margin-left:auto;white-space:nowrap}
.pwrap{display:flex;gap:0;flex:1;overflow:hidden}
.pmain{flex:1;overflow-y:auto;padding:14px 16px}
.pmain::-webkit-scrollbar{width:4px}
.pmain::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.wpanel{width:300px;flex-shrink:0;border-left:1px solid var(--border);background:var(--s1);overflow-y:auto;display:none;flex-direction:column}
.wpanel.open{display:flex}
.wpanel::-webkit-scrollbar{width:3px}
.wpanel::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.wphead{padding:14px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--s1);z-index:1}
.wpclose{float:right;cursor:pointer;color:var(--dim);font-size:20px;line-height:1;transition:color .15s}
.wpclose:hover{color:var(--text)}
.wptitle{font-family:'JetBrains Mono',monospace;font-size:16px;color:var(--acc);margin-bottom:6px}
.wplvl{font-size:11px;font-family:'JetBrains Mono',monospace;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:8px}
.wpdef{font-size:13px;color:var(--text);line-height:1.6;margin-bottom:4px}
.wpsec{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim2);letter-spacing:2px;text-transform:uppercase;margin:12px 14px 6px}
.wprule{background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:10px 12px;margin:0 14px 8px;font-size:12px;font-family:'JetBrains Mono',monospace;line-height:1.8;color:var(--dim)}
.wprule .ok{color:var(--ok)}
.wprule .no{color:var(--err)}
.wpsc{background:var(--s2);border:1px solid var(--border);border-radius:7px;margin:0 14px 7px;cursor:pointer;transition:border-color .15s}
.wpsc:hover{border-color:var(--border2)}
.wpsci{padding:10px 12px}
.wpscn{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim2);margin-bottom:4px}
.wpscw{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--err);text-decoration:line-through;text-decoration-color:rgba(248,113,113,0.4);margin-bottom:3px;line-height:1.4}
.wpscr{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--ok);line-height:1.4}
.wprel{display:flex;flex-wrap:wrap;gap:6px;padding:0 14px 14px}
.wprelc{font-size:11px;font-family:'JetBrains Mono',monospace;padding:3px 10px;border-radius:20px;border:1px solid var(--border);color:var(--dim);cursor:pointer;transition:all .15s}
.wprelc:hover{border-color:var(--acc);color:var(--acc)}
.page{display:none;height:100%}
.page.on{display:block;overflow-y:auto;padding:14px 16px}
#pg-sentences.on{display:flex;flex-direction:column;padding:0}
.scard{background:var(--s1);border:1px solid var(--border);border-radius:9px;margin-bottom:9px;overflow:hidden;transition:border-color .15s}
.scard:hover{border-color:var(--border2)}
.scard.hl{border-color:var(--acc);box-shadow:0 0 0 1px rgba(124,106,247,0.2)}
.schead{display:flex;gap:10px;padding:12px 14px;cursor:pointer;align-items:flex-start}
.scnum{font-family:'JetBrains Mono',monospace;font-size:18px;color:var(--acc);opacity:.22;line-height:1;min-width:24px;flex-shrink:0}
.scsents{flex:1;display:flex;flex-direction:column;gap:4px}
.scw{font-size:12px;font-family:'JetBrains Mono',monospace;padding:4px 8px;background:rgba(248,113,113,0.06);color:#fca5a5;border-radius:4px;text-decoration:line-through;text-decoration-color:rgba(248,113,113,0.3);line-height:1.4}
.scr{font-size:12px;font-family:'JetBrains Mono',monospace;padding:4px 8px;background:rgba(74,222,128,0.06);color:#86efac;border-radius:4px;line-height:1.4}
.sctags{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap}
.sctag{font-size:9px;font-family:'JetBrains Mono',monospace;padding:2px 6px;border-radius:10px;letter-spacing:.5px;text-transform:uppercase}
.sctog{font-size:11px;color:var(--dim2);padding:3px 7px;border:1px solid var(--border);border-radius:4px;flex-shrink:0;transition:all .15s;align-self:flex-start}
.scard:hover .sctog{border-color:var(--border2);color:var(--dim)}
.scbody{display:none;border-top:1px solid var(--border);padding:11px 14px}
.scbody.open{display:block}
.scerrs{display:flex;flex-direction:column;gap:6px}
.scer{display:flex;gap:7px;font-size:12px;line-height:1.5;align-items:flex-start}
.et{font-size:9px;font-family:'JetBrains Mono',monospace;padding:2px 6px;border-radius:3px;flex-shrink:0;letter-spacing:.5px;white-space:nowrap;margin-top:1px}
.etg{background:rgba(96,165,250,0.1);color:#93c5fd;border:1px solid rgba(96,165,250,0.2)}
.etv{background:rgba(248,180,106,0.1);color:#fcd34d;border:1px solid rgba(248,180,106,0.2)}
.eti{background:rgba(167,139,250,0.1);color:#c4b5fd;border:1px solid rgba(167,139,250,0.2)}
.ets{background:rgba(248,113,200,0.1);color:#f9a8d4;border:1px solid rgba(248,113,200,0.2)}
.etp{background:rgba(106,247,200,0.1);color:#6ee7b7;border:1px solid rgba(106,247,200,0.2)}
.eto{background:rgba(74,222,128,0.1);color:#86efac;border:1px solid rgba(74,222,128,0.2)}
.etx{background:rgba(248,113,113,0.15);color:#fca5a5;border:1px solid rgba(248,113,113,0.3)}
.em{color:#fca5a5;font-family:'JetBrains Mono',monospace;font-size:11px}
.es{color:#86efac;font-family:'JetBrains Mono',monospace;font-size:11px}
.scwds{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;padding-top:8px;border-top:1px solid var(--border)}
.swlbl{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--dim2);align-self:center;flex-shrink:0}
.wtag{font-size:11px;font-family:'JetBrains Mono',monospace;padding:3px 9px;border-radius:20px;border:1px solid rgba(124,106,247,0.3);color:var(--acc);cursor:pointer;transition:all .15s;background:rgba(124,106,247,0.05)}
.wtag:hover{background:rgba(124,106,247,0.15)}
.tg-g{background:rgba(96,165,250,0.08);color:#93c5fd;border:1px solid rgba(96,165,250,0.2)}
.tg-v{background:rgba(248,180,106,0.08);color:#fcd34d;border:1px solid rgba(248,180,106,0.2)}
.tg-i{background:rgba(167,139,250,0.08);color:#c4b5fd;border:1px solid rgba(167,139,250,0.2)}
.tg-s{background:rgba(248,113,200,0.08);color:#f9a8d4;border:1px solid rgba(248,113,200,0.2)}
.tg-p{background:rgba(106,247,200,0.08);color:#6ee7b7;border:1px solid rgba(106,247,200,0.2)}
.tg-o{background:rgba(74,222,128,0.08);color:#86efac;border:1px solid rgba(74,222,128,0.2)}
.tg-x{background:rgba(248,113,113,0.08);color:#fca5a5;border:1px solid rgba(248,113,113,0.2)}
.pc{background:var(--s1);border:1px solid var(--border);border-radius:9px;padding:14px;display:flex;gap:12px;margin-bottom:9px;transition:border-color .15s}
.pc:hover{border-color:var(--border2)}
.picon{font-size:20px;min-width:26px;flex-shrink:0}
.ptitle{font-size:14px;font-weight:500;margin-bottom:7px}
.pexs{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.pb{font-size:11px;font-family:'JetBrains Mono',monospace;padding:3px 8px;border-radius:4px;background:rgba(248,113,113,0.08);color:#fca5a5;border:1px solid rgba(248,113,113,0.2)}
.pg{font-size:11px;font-family:'JetBrains Mono',monospace;padding:3px 8px;border-radius:4px;background:rgba(74,222,128,0.08);color:#86efac;border:1px solid rgba(74,222,128,0.2)}
.pnote{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--dim2);margin-top:7px}
.pcnt{font-size:11px;font-family:'JetBrains Mono',monospace;padding:2px 7px;background:var(--s3);border-radius:10px;color:var(--dim);margin-left:8px}
.wgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.wc{background:var(--s1);border:1px solid var(--border);border-radius:9px;padding:14px;cursor:pointer;transition:all .2s}
.wc:hover{border-color:var(--acc);transform:translateY(-1px)}
.wctit{font-size:16px;font-weight:500;color:var(--acc);margin-bottom:3px;font-family:'JetBrains Mono',monospace}
.wcmeta{display:flex;gap:5px;margin-bottom:8px}
.wccnt{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--dim2);background:var(--s3);padding:2px 7px;border-radius:10px}
.wcdef{font-size:12px;color:var(--dim);line-height:1.5;margin-bottom:8px}
.wcrule{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--dim2);border-top:1px solid var(--border);padding-top:8px;line-height:1.7}
.wcrule .ok{color:#86efac}
.wcrule .no{color:#fca5a5}
.rc{background:var(--s1);border:1px solid var(--border);border-radius:9px;padding:14px 16px;display:flex;gap:12px;margin-bottom:9px;transition:border-color .15s}
.rc:hover{border-color:var(--border2)}
.rnum{font-family:'JetBrains Mono',monospace;font-size:20px;color:var(--acc);opacity:.25;line-height:1;min-width:28px}
.rtit{font-size:14px;font-weight:500;margin-bottom:7px}
.rexs{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.rnote{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--dim2);margin-top:6px}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:20px}
.pcard{background:var(--s1);border:1px solid var(--border);border-radius:9px;padding:14px}
.ptitlep{font-size:12px;color:var(--dim);margin-bottom:6px}
.pnum{font-size:28px;font-weight:500}
.psub{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--dim2);margin-top:2px}
.sb{margin-bottom:14px}
.sbrow{display:flex;justify-content:space-between;margin-bottom:5px;font-size:13px}
.sbv{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--dim)}
.sbtr{height:3px;background:var(--s3);border-radius:2px;overflow:hidden}
.sbf{height:100%;border-radius:2px;transition:width 1.2s ease}
.tl{position:relative;padding-left:22px}
.tl::before{content:'';position:absolute;left:4px;top:0;bottom:0;width:1px;background:var(--border)}
.tli{position:relative;margin-bottom:20px}
.tld{position:absolute;left:-19px;top:5px;width:10px;height:10px;border-radius:50%;border:1.5px solid var(--border2);background:var(--bg);transition:all .2s}
.tli:hover .tld{border-color:var(--acc);background:var(--acc)}
.tll{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--acc);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.tlti{font-size:14px;font-weight:500;margin-bottom:3px}
.tlde{font-size:12px;color:var(--dim);line-height:1.6;max-width:500px}
.bdg{display:inline-block;font-size:11px;font-family:'JetBrains Mono',monospace;padding:2px 9px;border-radius:10px;margin-top:5px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-title">Error<span>.</span>Log</div>
  <div class="hdr-stats">
    <div class="hdr-stat">Предложений: <strong id="tc">0</strong></div>
    <div class="hdr-stat">Уровень: <strong>B2+</strong></div>
    <div class="hdr-stat">Цель: <strong style="color:var(--ok)">C1</strong></div>
  </div>
</div>
<div class="layout">
<div class="sidebar">
  <div class="snav">
    <button class="nb on" onclick="navTo('sentences',this)">📋 Предложения</button>
    <button class="nb" onclick="navTo('patterns',this)">⚠️ Паттерны</button>
    <button class="nb" onclick="navTo('words',this)">📖 Словарь</button>
    <button class="nb" onclick="navTo('rules',this)">✅ Правила</button>
    <button class="nb" onclick="navTo('progress',this)">📈 Прогресс</button>
  </div>
  <div class="sword" id="sw"><div class="wlbl">Слова</div></div>
</div>
<div class="main">
  <div id="pg-sentences" class="page on">
    <div class="toolbar">
      <input class="srch" type="text" placeholder="Поиск..." oninput="doSearch(this.value)" id="si">
      <div class="ftabs">
        <div class="ft on" onclick="doFilt(this,'all')">Все</div>
        <div class="ft" onclick="doFilt(this,'g')">Грамм</div>
        <div class="ft" onclick="doFilt(this,'v')">Лексика</div>
        <div class="ft" onclick="doFilt(this,'i')">Идиомы</div>
        <div class="ft" onclick="doFilt(this,'s')">Орфогр</div>
        <div class="ft" onclick="doFilt(this,'p')">Предлоги</div>
        <div class="ft" onclick="doFilt(this,'o')">✓ Верные</div>
        <div class="ft" onclick="doFilt(this,'x')">⚠ Паттерн</div>
      </div>
      <div class="cntlbl" id="vc"></div>
    </div>
    <div class="pwrap">
      <div class="pmain" id="cw"></div>
      <div class="wpanel" id="wp">
        <div class="wphead">
          <span class="wpclose" onclick="closeP()">×</span>
          <div class="wptitle" id="wpt"></div>
          <div id="wpl"></div>
          <div class="wpdef" id="wpd"></div>
        </div>
        <div id="wpb"></div>
      </div>
    </div>
  </div>
  <div id="pg-patterns" class="page"><div id="patg"></div></div>
  <div id="pg-words" class="page"><div class="wgrid" id="wg"></div></div>
  <div id="pg-rules" class="page"><div id="rl"></div></div>
  <div id="pg-progress" class="page"><div id="pro"></div></div>
</div>
</div>

{ic:"🟢",ti:"Предлоги фраз. глаголов — улучшилось",cnt:"",bad:["abide the rules","immersed into"],good:["abide by the rules","immersed in"],note:"// 9 ошибок → 1-2 на блок"},
{ic:"🟢",ti:"Контаминация выражений",cnt:"",bad:["last straw of his patience","started embarking"],good:["the last straw","embarked on"],note:"// Смешение двух правильных = ошибка"},
{ic:"✅",ti:"Capable of withstanding — ИСПРАВЛЕНО к ч.22!",cnt:"",bad:["capable of withstand"],good:["capable of withstanding"],note:"// Усвоено ✓"},
];

const RLS=[
{n:"01",ti:"WHAT после существительного = ОШИБКА (×6)",bad:["idea what she had"],good:["idea that she had"],note:"Главная системная ошибка!"},
{n:"02",ti:"Feel like + noun",bad:["felt an outcast"],good:["felt like an outcast"],note:"5 повторений"},
{n:"03",ti:"While vs Before",bad:["while it gets worse"],good:["before it gets worse"],note:"while = одновременность / before = до события"},
{n:"04",ti:"Stative Verbs — никогда в Continuous",bad:["had been knowing"],good:["had known"],note:"know/love/believe/want/own"},
{n:"05",ti:"Притяжательный падеж",bad:["her sister voice"],good:["her sister's voice"],note:"Одушевлённый → 's"},
{n:"06",ti:"Every + единственное число",bad:["every meetings"],good:["every meeting"],note:"every + ед.ч. / all + мн.ч."},
{n:"07",ti:"In vs Into",bad:["got in a car","immersed into"],good:["got into a car","immersed in"],note:"in = состояние / into = движение"},
{n:"08",ti:"Born into",bad:["born this family"],good:["born into this family"],note:"фиксированный предлог"},
{n:"09",ti:"Await без предлога",bad:["await for news"],good:["await news","wait for news"],note:"await = формальный без for"},
{n:"10",ti:"Million без -s",bad:["66 millions years"],good:["66 million years"],note:"После числа — без -s"},
{n:"11",ti:"Exceed vs Surpass",bad:["exceed other pupils"],good:["surpass other pupils"],note:"exceed = норму / surpass = людей"},
{n:"12",ti:"Healthier (не more healthy)",bad:["more healthy"],good:["healthier"],note:"Одно/двусложные → -er"},
{n:"13",ti:"Наречие — позиция",bad:["told explicitly them"],good:["explicitly told them"],note:"Не между глаголом и дополнением"},
{n:"14",ti:"On the outskirts (не in)",bad:["in the outskirts"],good:["on the outskirts"],note:"Фиксированный предлог on"},
{n:"15",ti:"Make a profit",bad:["got a profit"],good:["made a profit"],note:"make/generate/turn a profit"},
{n:"16",ti:"Worth + gerund",bad:["worth to watch"],good:["worth watching"],note:"worth всегда + gerund"},
{n:"17",ti:"Идиомы — фиксированные предлоги",bad:["mountain from molehill","attack to rivals"],good:["mountain out of molehill","attack on rivals"],note:"Предлог нельзя менять"},
{n:"18",ti:"Bring oneself to do",bad:["felt difficulties to try"],good:["couldn't bring herself to try"],note:"Заставить себя"},
{n:"19",ti:"In human history",bad:["of humans history"],good:["in human history"],note:"Фиксированная конструкция"},
{n:"20",ti:"Re- = снова",bad:["resurfaced again"],good:["resurfaced"],note:"Приставка re- уже означает 'снова'"},
];

let cFilt='all', cSrch='';
const TLM={g:'ГРАММ',v:'ЛЕКСИКА',i:'ИДИОМА',s:'ОРФОГР',p:'ПРЕДЛОГ',o:'ВЕРНО',x:'ПАТТЕРН'};

function buildAll(){
  buildCards(); buildSidebar(); buildPats(); buildWords(); buildRules(); buildProg();
  document.getElementById('tc').textContent=S.length;
  document.getElementById('vc').textContent=S.length+' / '+S.length;
}

function buildCards(){
  const cw=document.getElementById('cw');
  cw.innerHTML=S.map(s=>{
    const wh=(s.wds&&s.wds.length)?`<div class="scwds"><span class="swlbl">СЛОВА:</span>${s.wds.map(w=>`<span class="wtag" onclick="openW('${w}');event.stopPropagation()">${w}</span>`).join('')}</div>`:'';
    return `<div class="scard" data-tags="${s.t.join(' ')}" data-n="${s.n}" data-p="${s.p}">
      <div class="schead" onclick="tog(this)">
        <div class="scnum">${String(s.n).padStart(3,'0')}</div>
        <div class="scsents">
          ${s.w?`<div class="scw">${s.w}</div>`:''}
          <div class="scr">${s.r}</div>
          <div class="sctags">
            ${s.t.map(t=>`<span class="sctag tg-${t}">${TLM[t]||t}</span>`).join('')}
            <span class="sctag" style="background:rgba(124,106,247,0.1);color:#a78bfa;border:1px solid rgba(124,106,247,0.2)">Ч.${s.p}</span>
          </div>
        </div>
        <div class="sctog">▸</div>
      </div>
      <div class="scbody">
        <div class="scerrs">${s.e.map(e=>`<div class="scer"><span class="et et${e.t}">${e.l}</span><span>${e.x}</span></div>`).join('')}</div>
        ${wh}
      </div>
    </div>`;
  }).join('');
}

function buildSidebar(){
  const sw=document.getElementById('sw');
  const wkeys=Object.keys(WDB).sort();
  sw.innerHTML='<div class="wlbl">Слова '+wkeys.length+'</div>'+
    wkeys.map(w=>{
      const cnt=S.filter(s=>(s.wds||[]).includes(w)).length;
      return `<div class="wchip" onclick="openW('${w}')" id="wc-${w}">${w}<span class="wcnt">${cnt}</span></div>`;
    }).join('');
}

function buildPats(){
  document.getElementById('patg').innerHTML=PATS.map(p=>`
    <div class="pc"><div class="picon">${p.ic}</div><div style="flex:1">
      <div class="ptitle">${p.ti}${p.cnt?`<span class="pcnt">${p.cnt}</span>`:''}</div>
      <div class="pexs">${p.bad.map(b=>`<span class="pb">${b}</span>`).join('')}${p.good.map(g=>`<span class="pg">${g}</span>`).join('')}</div>
      <div class="pnote">${p.note}</div>
    </div></div>`).join('');
}

function buildWords(){
  const lc={'C1':'rgba(124,106,247,0.1)','C1+':'rgba(74,222,128,0.1)','B2':'rgba(96,165,250,0.1)'};
  const lt={'C1':'#c4b5fd','C1+':'#86efac','B2':'#93c5fd'};
  document.getElementById('wg').innerHTML=Object.entries(WDB).map(([k,v])=>{
    const cnt=S.filter(s=>(s.wds||[]).includes(k)).length;
    return `<div class="wc" onclick="openW('${k}')">
      <div class="wctit">${k}</div>
      <div class="wcmeta">
        <span class="wccnt" style="background:${lc[v.lv]||'var(--s3)'};color:${lt[v.lv]||'var(--dim)'}">${v.lv}</span>
        <span class="wccnt">×${cnt}</span>
      </div>
      <div class="wcdef">${v.def}</div>
      <div class="wcrule">${v.rule.replace(/\n/g,'<br>').replace(/✓/g,'<span class="ok">✓</span>').replace(/❌/g,'<span class="no">❌</span>')}</div>
    </div>`;
  }).join('');
}

function buildRules(){
  document.getElementById('rl').innerHTML=RLS.map(r=>`
    <div class="rc"><div class="rnum">${r.n}</div><div style="flex:1">
      <div class="rtit">${r.ti}</div>
      <div class="rexs">${r.bad.map(b=>`<span class="pb">${b}</span>`).join('')}${r.good.map(g=>`<span class="pg">${g}</span>`).join('')}</div>
      <div class="rnote">${r.note}</div>
    </div></div>`).join('');
}

function buildProg(){
  const ok=S.filter(s=>s.t.includes('o')).length;
  document.getElementById('pro').innerHTML=`
    <div class="pgrid">
      <div class="pcard"><div class="ptitlep">Предложений</div><div class="pnum">${S.length}</div><div class="psub">из 400+ разобранных</div></div>
      <div class="pcard"><div class="ptitlep">Верных</div><div class="pnum">${ok}</div><div class="psub">${Math.round(ok/S.length*100)}% от всех</div></div>
      <div class="pcard"><div class="ptitlep">Слов</div><div class="pnum">${Object.keys(WDB).length}</div><div class="psub">в словаре</div></div>
      <div class="pcard"><div class="ptitlep">Уровень</div><div class="pnum" style="color:var(--acc)">B2+</div><div class="psub">Цель: C1</div></div>
    </div>
    ${[['Грамматика','B1→B2',72,'#60a5fa'],['Лексика','B1+→C1',88,'#f59e0b'],['Идиомы','A2→C1',91,'#10b981'],['Орфография','B1→B2+',75,'#8b5cf6'],['Общий','B1→B2+',78,'#06b6d4']].map(([l,v,p,c])=>`
    <div class="sb"><div class="sbrow"><span>${l}</span><span class="sbv">${v}</span></div><div class="sbtr"><div class="sbf" style="width:${p}%;background:${c}"></div></div></div>`).join('')}
    <div class="tl">
      ${[['Части 1–3','Базовый уровень','Много ошибок, но уже видна смелость.','B1','rgba(248,180,106,0.15)','#fcd34d'],
      ['Части 4–8','Рост лексики','proliferate, cogent, flabbergasted. Первые идиомы.','B1+','rgba(248,180,106,0.15)','#fcd34d'],
      ['Части 9–13','Переход на B2','Первые полностью верные предложения.','B2','rgba(96,165,250,0.15)','#93c5fd'],
      ['Части 14–18','Стабилизация B2','40–50% верных. Идиомы уверенно.','B2','rgba(96,165,250,0.15)','#93c5fd'],
      ['Части 19–22','Академические конструкции','forethought, epiphany, unbeknownst. 50%+ верных.','B2','rgba(96,165,250,0.15)','#93c5fd'],
      ['Части 23–29 · Сейчас','Уверенный B2+','60–70% верных. Ошибки точечные.','B2+','rgba(124,106,247,0.15)','#c4b5fd'],
      ['Цель','C1 — один шаг','which/that, feel like + noun, орфография сложных слов.','C1 ←','rgba(74,222,128,0.15)','#86efac'],
      ].map(([lb,ti,de,b,bc,tc])=>`<div class="tli"><div class="tld"></div><div class="tll">${lb}</div><div class="tlti">${ti}</div><div class="tlde">${de}</div><span class="bdg" style="background:${bc};color:${tc};border:1px solid ${tc}40">${b}</span></div>`).join('')}
    </div>`;
}

function navTo(p,el){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(x=>x.classList.remove('on'));
  document.getElementById('pg-'+p).classList.add('on');
  el.classList.add('on'); closeP();
}

function tog(h){
  const b=h.nextElementSibling,tg=h.querySelector('.sctog');
  b.classList.contains('open')?(b.classList.remove('open'),tg.textContent='▸'):(b.classList.add('open'),tg.textContent='▾');
}

function doFilt(btn,tag){
  document.querySelectorAll('.ft').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on'); cFilt=tag; applyF();
}

function doSearch(q){ cSrch=q.toLowerCase(); applyF(); }

function applyF(){
  let v=0;
  document.querySelectorAll('.scard').forEach(c=>{
    const tags=c.dataset.tags||'', txt=c.textContent.toLowerCase();
    const show=(cFilt==='all'||tags.includes(cFilt))&&(!cSrch||txt.includes(cSrch));
    c.style.display=show?'block':'none';
    if(show)v++;
  });
  document.getElementById('vc').textContent=v+' / '+S.length;
}

function openW(key){
  const d=WDB[key]; if(!d) return;
  document.querySelectorAll('.wchip').forEach(c=>c.classList.remove('on'));
  const ch=document.getElementById('wc-'+key);
  if(ch){ch.classList.add('on');ch.scrollIntoView({block:'nearest'});}
  document.getElementById('wpt').textContent=key;
  const lc={'C1':'rgba(124,106,247,0.15)','C1+':'rgba(74,222,128,0.15)','B2':'rgba(96,165,250,0.15)'};
  const lt={'C1':'#c4b5fd','C1+':'#86efac','B2':'#93c5fd'};
  document.getElementById('wpl').innerHTML=`<span class="wplvl" style="background:${lc[d.lv]||'var(--s2)'};color:${lt[d.lv]||'var(--dim)'};border:1px solid ${(lt[d.lv]||'var(--border)')}40">${d.lv}</span>`;
  document.getElementById('wpd').textContent=d.def;
  const sents=S.filter(s=>(s.wds||[]).includes(key));
  let html='';
  if(d.rule){
    html+='<div class="wpsec">ПРАВИЛО</div>';
    html+=`<div class="wprule">${d.rule.replace(/\n/g,'<br>').replace(/✓/g,'<span class="ok">✓</span>').replace(/❌/g,'<span class="no">❌</span>')}</div>`;
  }
  if(sents.length){
    html+=`<div class="wpsec">ПРИМЕРЫ (${sents.length})</div>`;
    sents.forEach(s=>{
      html+=`<div class="wpsc" onclick="hlCard(${s.n})"><div class="wpsci">
        <div class="wpscn">№${s.n} · Часть ${s.p}</div>
        ${s.w?`<div class="wpscw">${s.w}</div>`:''}
        <div class="wpscr">${s.r}</div>
      </div></div>`;
    });
  }
  if((d.rel||[]).length){
    html+='<div class="wpsec">СВЯЗАННЫЕ СЛОВА</div>';
    html+=`<div class="wprel">${d.rel.map(r=>`<span class="wprelc" onclick="openW('${r}')">${r}</span>`).join('')}</div>`;
  }
  document.getElementById('wpb').innerHTML=html;
  document.getElementById('wp').classList.add('open');
  if(!document.getElementById('pg-sentences').classList.contains('on')){
    document.querySelectorAll('.page').forEach(x=>x.classList.remove('on'));
    document.querySelectorAll('.nb').forEach(x=>x.classList.remove('on'));
    document.getElementById('pg-sentences').classList.add('on');
    document.querySelector('.nb').classList.add('on');
  }
  document.querySelectorAll('.scard').forEach(c=>c.classList.remove('hl'));
  sents.forEach(s=>{
    const c=document.querySelector(`.scard[data-n="${s.n}"]`);
    if(c)c.classList.add('hl');
  });
}

function closeP(){
  document.getElementById('wp').classList.remove('open');
  document.querySelectorAll('.scard').forEach(c=>c.classList.remove('hl'));
  document.querySelectorAll('.wchip').forEach(c=>c.classList.remove('on'));
}

function hlCard(n){
  const c=document.querySelector(`.scard[data-n="${n}"]`); if(!c) return;
  cFilt='all'; cSrch=''; document.getElementById('si').value='';
  document.querySelectorAll('.ft').forEach(t=>t.classList.remove('on'));
  document.querySelector('.ft').classList.add('on');
  applyF();
  c.scrollIntoView({behavior:'smooth',block:'center'});
  const b=c.querySelector('.scbody'),tg=c.querySelector('.sctog');
  if(!b.classList.contains('open')){b.classList.add('open');tg.textContent='▾';}
}

buildAll();
</script></body></html>
